/* ============================================================

   Built on v3 foundation:
   1. Settings tab (font size, bold, theme color, custom couple rows)
   2. Media & Investigations Center (JPEG/PDF upload, OCR via Tesseract.js)
   3. Bilingual side-by-side Wife/Husband intake table in Infertility
   4. Auto-generated Patient ID (SK-YYYY-NNN) + Auto-calculated age
   5. All data + media persists in localStorage
   v6.8 upgrades preserved:
   • True Lab Pivot — every unique lab is one row; multiple visits
     append horizontally as separate dated pills (no overwriting).
   • Editable Phrase Library + per-item Auto-Flag toggle.
   • GPA Sync — Para = NVD+CS, A = Miscarriage+Abortion, G = P+A+1.
   • Global Scan Labs (Tesseract) + Add Lab picker in every template.
   v7 upgrades preserved:

     the Sticky Header with internal Show/Hide collapse.

   • Global "Schedule Surgery" button on the Sticky Header — works
     from any patient template, auto-fills patient name + ID into

   • Unified Master Diary tab (replaces "Scheduling") — daily view

   • Bilingual WhatsApp confirmation buttons retained on every

   • Secretary Portal has full access to the Master Diary for

const T_DEFAULT = {
  ink: "#0E2A2B", inkSoft: "#365052",
  paper: "#FBF7F0", paperWarm: "#F4ECDD",
  card: "#FFFFFF", line: "#D9CFB8", lineSoft: "#E8DFC9",
  teal: "#0F5E5E", tealDeep: "#0A4242", tealSoft: "#D9ECEA",

};

// Mutable theme — replaced when the user picks a new accent color.
let T = { ...T_DEFAULT };

// Recompute T when settings change. We export a recompute function
// so the theme picker can mutate the shared T object.
function applyThemeColor(hex) {
  if (!hex) { T = { ...T_DEFAULT }; return; }
  T = { ...T_DEFAULT, teal: hex, tealDeep: shadeColor(hex, -18), tealSoft: tintColor(hex, 0.85) };
}

// Color helpers — used by applyThemeColor.
function shadeColor(hex, percent) {
  const h = hex.replace("#", "");
  let r = parseInt(h.slice(0, 2), 16);
  let g = parseInt(h.slice(2, 4), 16);
  let b = parseInt(h.slice(4, 6), 16);
  r = Math.max(0, Math.min(255, r + Math.round(255 * percent / 100)));
  g = Math.max(0, Math.min(255, g + Math.round(255 * percent / 100)));
  b = Math.max(0, Math.min(255, b + Math.round(255 * percent / 100)));
  return "#" + [r, g, b].map(x => x.toString(16).padStart(2, "0")).join("");
}
function tintColor(hex, lightness) {
  // lightness 0..1 — 1 = white
  const h = hex.replace("#", "");
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  const tr = Math.round(r + (255 - r) * lightness);
  const tg = Math.round(g + (255 - g) * lightness);
  const tb = Math.round(b + (255 - b) * lightness);
  return "#" + [tr, tg, tb].map(x => x.toString(16).padStart(2, "0")).join("");
}

  if (Number.isNaN(d.getTime())) return iso;
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "2-digit" })
    .replace(/ /g, "-");

const daysBetween = (aISO, bISO) => {
  if (!aISO || !bISO) return null;
  const a = new Date(aISO), b = new Date(bISO);
  if (Number.isNaN(a.getTime()) || Number.isNaN(b.getTime())) return null;
  return Math.round((b - a) / (1000 * 60 * 60 * 24));
};
const ageFromDOB = (dob) => {
  if (!dob) return "";
  const d = new Date(dob);
  if (Number.isNaN(d.getTime())) return "";
  const t = new Date();
  let a = t.getFullYear() - d.getFullYear();
  const m = t.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < d.getDate())) a--;
  return a >= 0 ? a : "";
};

// Patient ID generator — format SK-YYYY-NNN (e.g. SK-2026-001)
// Looks at all existing patients with a properly-formatted patientId in the
// current year and bumps the counter; falls back to 1 for the first patient
// of the year.
const generatePatientId = (existingPatients) => {
  const year = new Date().getFullYear();
  const re = new RegExp("^SK-" + year + "-(\\d{3,})$");
  let max = 0;
  (existingPatients || []).forEach(p => {
    if (!p || !p.patientId) return;
    const m = String(p.patientId).match(re);
    if (m) {
      const n = parseInt(m[1], 10);
      if (n > max) max = n;
    }
  });
  const next = max + 1;
  return `SK-${year}-${String(next).padStart(3, "0")}`;
};

const gaFromLMP = (lmpISO, refISO) => {
  if (!lmpISO) return null;
  const lmp = new Date(lmpISO);
  const ref = refISO ? new Date(refISO) : new Date();
  if (Number.isNaN(lmp.getTime())) return null;
  const days = Math.floor((ref - lmp) / 86400000);
  if (days < 0) return null;
  const w = Math.floor(days / 7);
  const d = days % 7;
  return { weeks: w, days: d, label: `${w}+${d}`, totalDays: days };
};
const eddFromLMP = (lmpISO) => {
  if (!lmpISO) return "";
  const lmp = new Date(lmpISO);
  if (Number.isNaN(lmp.getTime())) return "";
  const edd = new Date(lmp.getTime() + 280 * 86400000);
  return edd.toISOString().slice(0, 10);
};
const ORIGIN_OPTIONS = [
  { key: "LMP",   label: "LMP",         arLabel: "آخر دورة" },
  { key: "EDD",   label: "EDD",         arLabel: "موعد الولادة" },
  { key: "ET3",   label: "ET Day 3",    arLabel: "نقل اليوم ٣" },
  { key: "ET5",   label: "ET Day 5",    arLabel: "نقل اليوم ٥" },
];
const originToLMP = (originKey, anchorISO) => {
  if (!anchorISO) return "";
  const d = new Date(anchorISO);
  if (Number.isNaN(d.getTime())) return "";
  let offsetDays = 0;
  if (originKey === "EDD") offsetDays = -280;
  else if (originKey === "ET3") offsetDays = -17;
  else if (originKey === "ET5") offsetDays = -19;
  return new Date(d.getTime() + offsetDays * 86400000).toISOString().slice(0, 10);
};
const eddFromOrigin = (originKey, anchorISO) => {
  const lmp = originToLMP(originKey, anchorISO);
  return lmp ? eddFromLMP(lmp) : "";
};
const gaFromOrigin = (originKey, anchorISO, refISO) => {
  const lmp = originToLMP(originKey, anchorISO);
  return lmp ? gaFromLMP(lmp, refISO) : null;
};
const eddFromFET = (transferISO, embryoDay) => {
  // EDD = transfer date + 266 - (embryo day) days
  // Day 5: 266-5 = 261 days. Day 3: 266-3 = 263 days.
  if (!transferISO) return "";
  const d = new Date(transferISO);
  if (Number.isNaN(d.getTime())) return "";
  const days = 266 - (parseInt(embryoDay, 10) || 5);
  return new Date(d.getTime() + days * 86400000).toISOString().slice(0, 10);
};
const parseBP = (s) => {
  if (!s) return null;
  const m = String(s).match(/(\d{2,3})\s*[\/\-]\s*(\d{2,3})/);
  if (!m) return null;
  const sys = parseInt(m[1], 10), dia = parseInt(m[2], 10);
  if (Number.isNaN(sys) || Number.isNaN(dia)) return null;
  return { sys, dia };
};
const isBPHigh = (s) => {
  const bp = parseBP(s);
  if (!bp) return false;
  return bp.sys > 140 || bp.dia > 90;
};
const isRhNegative = (bg) => bg ? /-$/.test(bg.trim()) : false;
const isAntiDWindow = (gaInfo) => gaInfo ? (gaInfo.totalDays >= 196 && gaInfo.totalDays <= 230) : false;

const findActiveObsEpisode = (patient) => {
  if (!patient || !patient.episodes) return null;
  const obs = patient.episodes
    .filter(e => e.kind === "Obstetrics")
    .sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  return obs[0] || null;
};

const setPatientAlerts = (patient, updatePatient, next) =>
  updatePatient(patient.id, { alerts: next });
const upsertAlert = (patient, updatePatient, alert) => {
  const list = patient.alerts || [];
  const idx = list.findIndex(a => a.source === alert.source);
  let next;
  if (idx >= 0) next = list.map((a, i) => i === idx ? { ...a, ...alert } : a);
  else next = [...list, alert];
  setPatientAlerts(patient, updatePatient, next);
};
const removeAlert = (patient, updatePatient, source) => {
  const list = patient.alerts || [];
  setPatientAlerts(patient, updatePatient, list.filter(a => a.source !== source));
};
const isFlaggedSource = (patient, source) => {
  if (!patient.alerts) return false;
  return patient.alerts.some(a => a.source === source);
};
const getFieldLabel = (patient, scope, key, fallback) => {
  const overrides = patient.fieldLabels?.[scope];
  if (overrides && typeof overrides[key] === "string" && overrides[key].trim()) {
    return overrides[key];
  }
  return fallback;
};
const setFieldLabel = (patient, updatePatient, scope, key, label) => {
  const next = {
    ...(patient.fieldLabels || {}),
    [scope]: {
      ...((patient.fieldLabels || {})[scope] || {}),
      [key]: label,

const hadlockEFW = ({ bpd, hc, ac, fl }) => {
  const b = parseFloat(bpd), h = parseFloat(hc), a = parseFloat(ac), f = parseFloat(fl);
  if ([b, h, a, f].some((v) => Number.isNaN(v) || v <= 0)) return null;
  const log10 = 1.3596
    - 0.00386 * a * f
    + 0.0064 * h
    + 0.00061 * b * a
    + 0.0424 * a
    + 0.174 * f;
  return Math.round(Math.pow(10, log10));
};

// hex with alpha
function hexAlpha(hex, alpha) {
  const h = hex.replace("#", "");
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

const appendLine = (existing, addition) => {
  if (!addition) return existing || "";
  if (!existing || !existing.trim()) return addition;
  return existing.trimEnd() + "\n· " + addition;
};

const fileToBase64 = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result); // data URL
  reader.onerror = () => reject(reader.error);
  reader.readAsDataURL(file);
});
const formatBytes = (bytes) => {
  if (!bytes && bytes !== 0) return "—";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(2) + " MB";
};
const dataUrlByteSize = (dataUrl) => {
  if (!dataUrl) return 0;
  const idx = dataUrl.indexOf(",");
  if (idx === -1) return dataUrl.length;
  const b64 = dataUrl.slice(idx + 1);
  return Math.floor(b64.length * 3 / 4);
};

// Build reverse lookup (lowercased English → Arabic)
const NAME_EN_TO_AR = {};
Object.keys(NAME_AR_TO_EN).forEach(ar => {
  const en = NAME_AR_TO_EN[ar].toLowerCase();
  if (!NAME_EN_TO_AR[en]) NAME_EN_TO_AR[en] = ar;
  // Common alternate spellings
  const alts = {
    "mohamed": ["mohammed", "muhammad", "mohammad"],
    "ahmed":   ["ahmad"],
    "hassan":  ["hasan"],
    "hussein": ["hussain", "husain", "hosseyn"],
    "youssef": ["yousef", "yusuf", "yousuf", "yusef"],
    "khaled":  ["khalid"],
    "omar":    ["umar"],
    "ibrahim": ["ebrahim"],
    "fatima":  ["fatema", "fatma"],
    "mariam":  ["maryam", "mariem"],
    "aisha":   ["ayesha"],
    "khadija": ["khadeeja"],
    "zainab":  ["zaynab", "zeinab"],
    "sara":    ["sarah"],
    "nour":    ["noor"],
    "yasmin":  ["yasmine", "jasmine"],
    "iman":    ["eman", "imaan"],
  };
  if (alts[en]) alts[en].forEach(alt => { if (!NAME_EN_TO_AR[alt]) NAME_EN_TO_AR[alt] = ar; });
});

// Character-level Arabic → Latin map (used as fallback for unknown words)
const AR_CHAR_MAP = {
  "ا":"a","أ":"a","إ":"e","آ":"aa","ٱ":"a",
  "ب":"b","ت":"t","ث":"th",
  "ج":"g","ح":"h","خ":"kh",
  "د":"d","ذ":"dh",
  "ر":"r","ز":"z",
  "س":"s","ش":"sh",
  "ص":"s","ض":"d","ط":"t","ظ":"z",
  "ع":"a","غ":"gh",
  "ف":"f","ق":"q","ك":"k","ل":"l",
  "م":"m","ن":"n","ه":"h","ة":"a",
  "و":"w","ؤ":"o","ي":"y","ى":"a","ئ":"e",
  "ء":"","ٰ":"","ـ":"",
  // Diacritics → drop
  "َ":"","ُ":"","ِ":"","ْ":"","ّ":"","ً":"","ٌ":"","ٍ":"",
  // Digits & punctuation
  "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
  "،":",","؛":";","؟":"?",
};

const transliterateArWordToEn = (word) => {
  if (!word) return "";
  // Try dictionary first
  const dictHit = NAME_AR_TO_EN[word];
  if (dictHit) return dictHit;
  // Char-level fallback
  let out = "";
  for (const ch of word) {
    if (AR_CHAR_MAP[ch] !== undefined) out += AR_CHAR_MAP[ch];
    else out += ch;
  }
  // Cleanup: collapse repeated chars, capitalize first letter
  out = out.replace(/(.)\1{2,}/g, "$1$1"); // max 2 of same char
  return out.charAt(0).toUpperCase() + out.slice(1);
};

const transliterateEnWordToAr = (word) => {
  if (!word) return "";
  const lower = word.toLowerCase();
  if (NAME_EN_TO_AR[lower]) return NAME_EN_TO_AR[lower];
  return ""; // unknown English word → leave blank (do NOT corrupt input)
};

// Transliterate full names (whitespace-separated)
const transliterateArToEn = (text) => {
  if (!text) return "";
  return text.trim().split(/\s+/).map(transliterateArWordToEn).filter(Boolean).join(" ");
};
const transliterateEnToAr = (text) => {
  if (!text) return "";
  const words = text.trim().split(/\s+/);
  const out = [];
  let anyHit = false;
  for (const w of words) {
    const ar = transliterateEnWordToAr(w);
    if (ar) { out.push(ar); anyHit = true; }
    else out.push(w); // unknown → keep as-is
  }
  return anyHit ? out.join(" ") : ""; // require at least one dictionary hit
};

const parseTime = (hhmm) => {
  if (!hhmm) return null;
  const [h, m] = hhmm.split(":").map(n => parseInt(n, 10));
  if (Number.isNaN(h) || Number.isNaN(m)) return null;
  return h * 60 + m;
};
const fmtTime = (mins) => {
  const h = Math.floor(mins / 60), m = mins % 60;
  return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
};
const buildSlots = (settings) => {
  const s = settings || DEFAULT_CLINIC_SETTINGS;
  const startM = parseTime(s.startTime);
  const endM = parseTime(s.endTime);
  const dur = Math.max(5, parseInt(s.slotDuration, 10) || 30);
  if (startM === null || endM === null || endM <= startM) return [];
  const out = [];
  for (let t = startM; t + dur <= endM + 0.0001; t += dur) {
    out.push(fmtTime(t));
  }
  return out;
};

const formatClinicBrandingBlock = (cs) => {
  if (!cs || typeof cs !== "object") return "";
  const lines = [];
  const clip = (s) => ((s != null && String(s).trim()) ? String(s).trim() : "");
  if (clip(cs.doctorName)) lines.push(clip(cs.doctorName));
  if (clip(cs.specialty)) lines.push(clip(cs.specialty));
  if (clip(cs.clinicName)) lines.push(clip(cs.clinicName));
  return lines.join("\n");
};
const waFooterFromClinic = (cs) => {
  const b = formatClinicBrandingBlock(cs);
  return b ? `\n\n—\n${b}` : "";
};

const appointmentDurationMinutes = (reasonObj, fallbackMin) => {
  const fb = Math.max(5, parseInt(fallbackMin, 10) || 30);
  if (!reasonObj || typeof reasonObj !== "object") return fb;
  const d = parseInt(reasonObj.defaultDurationMin, 10);
  if (Number.isFinite(d) && d >= 5 && d <= 480) return d;
  return fb;
};

const normalizeLocationOption = (x) => {
  if (typeof x === "string") return { name: x, details: "", phone: "" };
  const o = x || {};
  return {
    name: String(o.name != null ? o.name : (o.label != null ? o.label : "")),
    details: String(o.details != null ? o.details : (o.address != null ? o.address : "")),
    phone: String(o.phone != null ? o.phone : ""),
  };
};
const locationOptionLabel = (x) => {
  const L = normalizeLocationOption(x);
  const bits = [L.details, L.phone].filter((s) => s && String(s).trim());
  return bits.length ? `${L.name} · ${bits.join(" · ")}` : L.name;
};

const STORAGE_VERSION = 3;

const safeStorageGet = () => {
  try {
    if (typeof window === "undefined" || !window.localStorage) return null;
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed && parsed.__v === STORAGE_VERSION) return parsed;
    return null;
  } catch (err) {
    return null;
  }
};
const safeStorageSet = (state) => {
  try {
    if (typeof window === "undefined" || !window.localStorage) return false;
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify({ __v: STORAGE_VERSION, ...state }));
    return true;
  } catch (err) {
    // Quota error most likely — surface gracefully
    console.warn("Storage write failed:", err);
    return false;
  }
};

// usePersistentState — same contract as in v2.
function usePersistentState(persistKey, initializer) {
  const [value, setValue] = useState(() => {
    const stored = safeStorageGet();
    if (stored && Object.prototype.hasOwnProperty.call(stored, persistKey)) {
      return stored[persistKey];
    }
    return typeof initializer === "function" ? initializer() : initializer;
  });
  useEffect(() => {
    const stored = safeStorageGet() || {};
    safeStorageSet({ ...stored, [persistKey]: value });
    // eslint-disable-next-line
  }, [value]);
  return [value, setValue];
}

function makeSupabaseProvider({ url, anonKey, role, onStatus }) {
  if (!window.supabase || !window.supabase.createClient) {
    throw new Error("Supabase library not loaded. Reload with internet access.");
  }
  const client = window.supabase.createClient(url, anonKey, {
    auth: { persistSession: false },
    realtime: { params: { eventsPerSecond: 10 } },
  });
  const seesClinical = role === "doctor";
  const channels = [];
  const status = (s, detail) => { try { onStatus && onStatus(s, detail); } catch (e) {} };
  status("connecting");

  const errFmt = (table, err) => {
    if (!err) return null;
    return `${table}: ${err.code || ""} ${err.message || err}`.trim();
  };

  return {
    kind: "supabase",
    role,
    isOnline: () => true,
    client,

    async load() {
      const tasks = [
        client.from("patients_demographics").select("id, data, updated_at"),
        client.from("appts").select("id, data, updated_at"),
        client.from("bills").select("id, data, updated_at"),
        client.from("app_state").select("key, data, updated_at"),
      ];
      if (seesClinical) {
        tasks.push(client.from("patients_clinical").select("id, data, updated_at"));
      }
      const results = await Promise.all(tasks);
      const failures = [];
      const [demoRes, apptRes, billRes, stateRes, clinRes] = results;
      [["patients_demographics", demoRes], ["appts", apptRes], ["bills", billRes],
       ["app_state", stateRes], seesClinical ? ["patients_clinical", clinRes] : null]
        .filter(Boolean)
        .forEach(([t, r]) => { const e = errFmt(t, r.error); if (e) failures.push(e); });
      if (failures.length) {
        status("error", failures.join(" · "));
        throw new Error("Could not load from cloud: " + failures.join(" · "));
      }
      const demoMap = {};
      (demoRes.data || []).forEach(row => { demoMap[row.id] = row.data; });
      const clinMap = {};
      if (seesClinical) {
        (clinRes.data || []).forEach(row => { clinMap[row.id] = row.data; });
      }
      const patientIds = new Set([...Object.keys(demoMap), ...Object.keys(clinMap)]);
      const patients = [...patientIds].map(id =>
        mergePatient({ ...(demoMap[id] || {}), id }, seesClinical ? clinMap[id] : {})
      );
      const appts = (apptRes.data || []).map(r => r.data);
      const bills = (billRes.data || []).map(r => r.data);
      let globalDict = null, clinicSettings = null, appSettings = null;
      (stateRes.data || []).forEach(row => {
        if (row.key === "globalDict") globalDict = row.data;
        if (row.key === "clinicSettings") clinicSettings = row.data;
        if (row.key === "appSettings") appSettings = row.data;
      });
      status("connected");
      return { patients, appts, bills, globalDict, clinicSettings, appSettings };
    },

    async upsertPatient(patient) {
      const { demo, clin } = splitPatient(patient);
      const tasks = [
        client.from("patients_demographics").upsert(
          { id: patient.id, data: demo, updated_at: new Date().toISOString() },
          { onConflict: "id" }
        ),
      ];
      if (seesClinical && Object.keys(clin).length > 0) {
        tasks.push(
          client.from("patients_clinical").upsert(
            { id: patient.id, data: clin, updated_at: new Date().toISOString() },
            { onConflict: "id" }
          )
        );
      }
      const out = await Promise.all(tasks);
      out.forEach((r, i) => { if (r.error) { status("error", errFmt(i ? "patients_clinical" : "patients_demographics", r.error)); }});
    },
    async deletePatient(id) {
      const tasks = [
        client.from("patients_demographics").delete().eq("id", id),
      ];
      if (seesClinical) {
        tasks.push(client.from("patients_clinical").delete().eq("id", id));
      }
      await Promise.all(tasks);
    },
    async upsertAppt(appt) {
      const { error } = await client.from("appts").upsert(
        { id: appt.id, data: appt, updated_at: new Date().toISOString() },
        { onConflict: "id" }
      );
      if (error) status("error", errFmt("appts", error));
    },
    async deleteAppt(id) {
      await client.from("appts").delete().eq("id", id);
    },
    async upsertBill(bill) {
      const { error } = await client.from("bills").upsert(
        { id: bill.id, data: bill, updated_at: new Date().toISOString() },
        { onConflict: "id" }
      );
      if (error) status("error", errFmt("bills", error));
    },
    async deleteBill(id) {
      await client.from("bills").delete().eq("id", id);
    },
    async setSingleton(key, value) {
      const { error } = await client.from("app_state").upsert(
        { key, data: value, updated_at: new Date().toISOString() },
        { onConflict: "key" }
      );
      if (error) status("error", errFmt("app_state", error));
    },

    subscribe(callbacks) {
      const handleDemoEvent = (payload) => {
        if (payload.eventType === "DELETE") {
          callbacks.onPatientDelete?.(payload.old.id);
          return;
        }
        const row = payload.new;
        callbacks.onPatientChange?.({ id: row.id, demo: row.data });
      };
      const handleClinEvent = (payload) => {
        if (payload.eventType === "DELETE") return;
        const row = payload.new;
        callbacks.onPatientChange?.({ id: row.id, clin: row.data });
      };
      const handleApptEvent = (payload) => {
        if (payload.eventType === "DELETE") {
          callbacks.onApptDelete?.(payload.old.id);
        } else {
          callbacks.onApptUpsert?.(payload.new.data);
        }
      };
      const handleBillEvent = (payload) => {
        if (payload.eventType === "DELETE") {
          callbacks.onBillDelete?.(payload.old.id);
        } else {
          callbacks.onBillUpsert?.(payload.new.data);
        }
      };
      const handleStateEvent = (payload) => {
        if (payload.eventType === "DELETE") return;
        const row = payload.new;
        if (row.key === "globalDict") callbacks.onGlobalDict?.(row.data);
        if (row.key === "clinicSettings") callbacks.onClinicSettings?.(row.data);
        if (row.key === "appSettings") callbacks.onAppSettings?.(row.data);
      };

      const ch = client.channel("clinic-sync-" + uid());
      ch.on("postgres_changes", { event: "*", schema: "public", table: "patients_demographics" }, handleDemoEvent);
      if (seesClinical) {
        ch.on("postgres_changes", { event: "*", schema: "public", table: "patients_clinical" }, handleClinEvent);
      }
      ch.on("postgres_changes", { event: "*", schema: "public", table: "appts" }, handleApptEvent);
      ch.on("postgres_changes", { event: "*", schema: "public", table: "bills" }, handleBillEvent);
      ch.on("postgres_changes", { event: "*", schema: "public", table: "app_state" }, handleStateEvent);
      ch.subscribe((s, err) => {
        if (s === "SUBSCRIBED") status("connected");
        else if (s === "CHANNEL_ERROR" || s === "TIMED_OUT") status("error", err?.message || s);
        else if (s === "CLOSED") status("offline");
      });
      channels.push(ch);

      return () => {
        try { client.removeChannel(ch); } catch (e) {}
      };
    },

    async destroy() {
      channels.forEach(c => { try { client.removeChannel(c); } catch (e) {} });
    },
  };
}

function makeGynaeTrunk() {
  return {
    id: uid(),
    date: todayISO(),
    kind: "Gynecology",
    isTrunk: true,
    summary: "Gynae chart",
    data: { visits: [] },
  };
}

/** Ensures each patient has exactly one Gynecology episode with isTrunk true. Idempotent. */
function migratePatients(arr) {
  if (!Array.isArray(arr)) return [];
  if (arr.length === 0) return arr;
  const next = arr.map(migratePatient);
  for (let i = 0; i < arr.length; i++) {
    if (arr[i] !== next[i]) return next;
  }
  return arr;
}

function migratePatient(p) {
  const episodes = Array.isArray(p.episodes) ? p.episodes : [];
  const gynIdxs = [];
  episodes.forEach((ep, i) => {
    if (ep && ep.kind === "Gynecology") gynIdxs.push(i);
  });

  if (gynIdxs.length === 0) {
    return { ...p, episodes: [makeGynaeTrunk(), ...episodes] };
  }

  if (gynIdxs.length === 1) {
    const i = gynIdxs[0];
    const ep = episodes[i];
    if (ep.isTrunk === true) return p;
    const nextEpisodes = episodes.slice();
    nextEpisodes[i] = { ...ep, isTrunk: true };
    return { ...p, episodes: nextEpisodes };
  }

  let oldestI = gynIdxs[0];
  let oldestDate = episodes[oldestI].date;
  for (let k = 1; k < gynIdxs.length; k++) {
    const i = gynIdxs[k];
    const d = episodes[i].date;
    const cmp = String(d || "").localeCompare(String(oldestDate || ""));
    if (cmp < 0 || (cmp === 0 && i < oldestI)) {
      oldestI = i;
      oldestDate = d;
    }
  }

  let changed = false;
  const nextEpisodes = episodes.map((ep, i) => {
    if (!ep || ep.kind !== "Gynecology") return ep;
    const shouldTrunk = i === oldestI;
    if (shouldTrunk) {
      if (ep.isTrunk === true) return ep;
      changed = true;
      return { ...ep, isTrunk: true };
    }
    if (ep.isTrunk === true) {
      changed = true;
      return { ...ep, isTrunk: false };
    }
    return ep;
  });
  if (!changed) return p;
  return { ...p, episodes: nextEpisodes };
}

// ============================================================
// v6.8 — EDITABLE SEEDS + AUTO-FLAG HELPERS
// Resolve the seed groups for a given dictionary key. Honors the
// user's `appSettings.phraseSeeds[key]` override; falls back to
// the built-in DICT_DEFAULTS shipped in this file.
// ============================================================
const resolveSeedGroups = (appSettings, key) => {
  const overrides = appSettings && appSettings.phraseSeeds;
  if (overrides && Array.isArray(overrides[key])) return overrides[key];
  return DICT_DEFAULTS[key] || [];
};

// All phrases (item strings) that have been flagged for a given
// dictionary key. Returned as a Set for fast membership tests.
const flaggedPhrasesFor = (appSettings, key) => {
  const map = (appSettings && appSettings.phraseFlags && appSettings.phraseFlags[key]) || {};
  const out = new Set();
  Object.keys(map).forEach(item => { if (map[item]) out.add(item); });
  return out;
};

// Whether a specific phrase is flagged for a dictionary key.
const isPhraseFlagged = (appSettings, key, phrase) => {
  const map = (appSettings && appSettings.phraseFlags && appSettings.phraseFlags[key]) || {};
  return !!map[phrase];
};

// Whether a lab in the Lab Library is flagged for auto-pin.
const isLabFlagged = (appSettings, lab) => {
  if (!lab) return false;
  if (lab.flag === true) return true;
  return false;
};

// Toggle/Set the flag state for one phrase.
const setPhraseFlag = (appSettings, setAppSettings, key, phrase, on) => {
  setAppSettings(prev => {
    const flags = { ...(prev.phraseFlags || {}) };
    const inner = { ...(flags[key] || {}) };
    if (on) inner[phrase] = true;
    else delete inner[phrase];
    flags[key] = inner;
    return { ...prev, phraseFlags: flags };
  });
};

// Replace seeds for a key in appSettings (creates phraseSeeds[key] override).
const writePhraseSeeds = (appSettings, setAppSettings, key, groups) => {
  setAppSettings(prev => {
    const seeds = { ...(prev.phraseSeeds || {}) };
    seeds[key] = groups;
    return { ...prev, phraseSeeds: seeds };
  });
};

// Restore the original built-in seeds for a key (removes the override).
const resetPhraseSeeds = (appSettings, setAppSettings, key) => {
  setAppSettings(prev => {
    const seeds = { ...(prev.phraseSeeds || {}) };
    delete seeds[key];
    return { ...prev, phraseSeeds: seeds };
  });
};

// ============================================================
// OCR — extract structured suggestions from raw text
// ============================================================
// Common lab patterns: "TSH: 2.4", "Hemoglobin 12.3 g/dL", "AMH 1.4 ng/mL"
// Returns an array of { label, value, raw, kind }
const OCR_PATTERNS = [
  { label: "TSH",          re: /\bTSH\s*[:\-]?\s*([\d.]+)\s*(mIU\/L|uIU\/mL)?/i },
  { label: "Hemoglobin",   re: /\b(?:Hb|Hgb|Hemoglobin|HEMOGLOBIN)\s*[:\-]?\s*([\d.]+)\s*(g\/dL|g\/L)?/i },
  { label: "Hematocrit",   re: /\b(?:HCT|Hematocrit)\s*[:\-]?\s*([\d.]+)\s*%?/i },
  { label: "Platelets",    re: /\b(?:Platelets|PLT)\s*[:\-]?\s*([\d,]+)\s*(?:x?10\^?3)?/i },
  { label: "WBC",          re: /\bWBC\s*[:\-]?\s*([\d.,]+)/i },
  { label: "FBS / Glucose",re: /\b(?:FBS|Glucose|Fasting Glucose)\s*[:\-]?\s*([\d.]+)\s*(mg\/dL|mmol\/L)?/i },
  { label: "HbA1c",        re: /\b(?:HbA1c|A1C)\s*[:\-]?\s*([\d.]+)\s*%?/i },
  { label: "AMH",          re: /\bAMH\s*[:\-]?\s*([\d.]+)\s*(ng\/mL|pmol\/L)?/i },
  { label: "FSH",          re: /\bFSH\s*[:\-]?\s*([\d.]+)\s*(mIU\/mL|IU\/L)?/i },
  { label: "LH",           re: /\bLH\s*[:\-]?\s*([\d.]+)\s*(mIU\/mL|IU\/L)?/i },
  { label: "Estradiol",    re: /\b(?:E2|Estradiol)\s*[:\-]?\s*([\d.]+)\s*(pg\/mL|pmol\/L)?/i },
  { label: "Progesterone", re: /\bProgesterone\s*[:\-]?\s*([\d.]+)\s*(ng\/mL|nmol\/L)?/i },
  { label: "Prolactin",    re: /\bProlactin\s*[:\-]?\s*([\d.]+)\s*(ng\/mL|µIU\/mL)?/i },
  { label: "Vitamin D",    re: /\b(?:Vit\.?\s*D|Vitamin D|25-OH)\s*[:\-]?\s*([\d.]+)\s*(ng\/mL|nmol\/L)?/i },
  { label: "Beta hCG",     re: /\b(?:β-?hCG|Beta hCG|HCG)\s*[:\-]?\s*([\d.,]+)\s*(mIU\/mL)?/i },
  { label: "Blood Group",  re: /\b(?:Blood Group|ABO)\s*[:\-]?\s*(A|B|AB|O)\s*(\+|-|positive|negative|Pos|Neg)/i },
  { label: "Sperm count",  re: /\b(?:Sperm count|Concentration)\s*[:\-]?\s*([\d.]+)\s*(?:million|M)?\/?\s*(?:mL)?/i },
  { label: "Motility",     re: /\b(?:Motility|Progressive motility)\s*[:\-]?\s*([\d.]+)\s*%/i },
  { label: "Morphology",   re: /\b(?:Morphology|Normal forms)\s*[:\-]?\s*([\d.]+)\s*%/i },
  { label: "Volume (semen)", re: /\bVolume\s*[:\-]?\s*([\d.]+)\s*(?:mL|ml)/i },
];
const extractOCRSuggestions = (text) => {
  if (!text) return [];
  const out = [];
  const seen = new Set();
  OCR_PATTERNS.forEach(p => {
    const m = text.match(p.re);
    if (m && !seen.has(p.label)) {
      const value = m[2] && /\+|-|positive|negative|pos|neg/i.test(m[2])
        ? `${m[1]} ${m[2]}`
        : (m[2] ? `${m[1]} ${m[2]}` : m[1]);
      out.push({ label: p.label, value, raw: m[0] });
      seen.add(p.label);
    }
  });
  return out;
};

// ============================================================
// LAB LIBRARY HELPERS
// Parse free-text "investigations" fields against the user's
// configured Lab Library (appSettings.labChips). Each chip is
// { id, label, unit } — we build a generic regex per chip:
//
//   \bLABEL\s*[:\-=]?\s*([\d.,]+)\s*([a-zA-Z%/μµ]+)?
//
// to match "TSH: 2.1 mIU/L", "TSH 2.1", "TSH = 2.1", etc. The
// matched value (with unit if captured) is returned per visit.
// ============================================================
// Helper: append OCR-confirmed lab lines to a free-text investigations
// string with a date stamp. Used by every investigation cell that
// stores results as plain text (not structured v.labs).
const applyOCRToText = (currentText, confirmedLines) => {
  if (!confirmedLines || confirmedLines.length === 0) return currentText;
  const stamp = `[Scanned ${fmtDateLab(todayISO())}]`;
  const block = `${stamp}\n${confirmedLines.join("\n")}`;
  if (!currentText || !currentText.trim()) return block;
  return currentText.trimEnd() + "\n\n" + block;
};

function readIxBundlesFromStorage() {

    const raw = window.localStorage.getItem(IX_BUNDLES_KEY);
    const arr = raw ? JSON.parse(raw) : null;
    if (Array.isArray(arr) && arr.length) {
      return arr
        .map((b) => ({ name: String(b.name || "").trim(), labs: Array.isArray(b.labs) ? b.labs.map(String) : [] }))
        .filter((b) => b.name);
    }
  } catch {}
  return DEFAULT_IX_BUNDLES.map((b) => ({ name: b.name, labs: [...b.labs] }));
}

function useIxBundlesLive() {
  const [bundles, setBundles] = useState(readIxBundlesFromStorage);
  useEffect(() => {
    const sync = () => setBundles(readIxBundlesFromStorage());
    window.addEventListener("storage", sync);
    window.addEventListener("fms-ix-catalog-updated", sync);
    return () => {
      window.removeEventListener("storage", sync);
      window.removeEventListener("fms-ix-catalog-updated", sync);
    };
  }, []);
  return bundles;
}

const matchLibraryLabByName = (library, name) => {
  const n = String(name || "").trim().toLowerCase();
  if (!n) return null;
  const lib = library || [];
  const exact = lib.find((l) => (l.label || "").toLowerCase() === n);
  if (exact) return exact;
  return lib.find((l) => {
    const ll = (l.label || "").toLowerCase();
    if (!ll) return false;
    return n.includes(ll) || ll.includes(n);
  }) || null;
};

const applyIxBundleLabsToVisitForObs = (library, visitLabs, investigations, bundle) => {
  const labs = bundle && Array.isArray(bundle.labs) ? bundle.labs : [];
  const existingIds = new Set((visitLabs || []).map((l) => l.labelId));
  const additions = [];
  const loose = [];
  labs.forEach((label) => {
    const chip = matchLibraryLabByName(library, String(label));
    if (chip && !existingIds.has(chip.id)) {
      additions.push({
        id: uid(),
        labelId: chip.id,
        label: chip.label,
        unit: chip.unit || "",
        value: "",
      });
      existingIds.add(chip.id);
    } else if (!chip) {
      loose.push(String(label).trim());
    }
  });
  let nextInv = investigations || "";
  if (loose.length) {
    const block = loose.filter(Boolean).join(", ");
    nextInv = (nextInv || "").trim() ? `${nextInv.trim()}\n${block}` : block;
  }
  return { labs: [...(visitLabs || []), ...additions], investigations: nextInv };
};

const applyIxBundleToFreeText = (currentText, bundle) => {
  const lines = bundle && Array.isArray(bundle.labs) ? bundle.labs.map((s) => String(s).trim()).filter(Boolean) : [];
  if (!lines.length) return currentText;
  const hn = String(bundle.name || "").trim() || "Bundle";
  const head = `[Ix bundle · ${hn}]`;
  const block = `${head}\n${lines.join("\n")}`;
  const base = (currentText || "").trim();
  return base ? `${base}\n\n${block}` : block;
};

function IxBundleSelect({ bundles, onPick, accent }) {
  const [val, setVal] = useState("");
  const list = bundles && bundles.length ? bundles : [];
  if (!list.length) return null;
  const c = accent || T.tealDeep;
  return (
    <select
      aria-label="Apply investigation bundle from Tower"
      value={val}
      onChange={(e) => {
        const name = e.target.value;
        if (!name) {
          setVal("");
          return;
        }
        const b = list.find((x) => String(x.name) === name);
        if (b && typeof onPick === "function") onPick(b);
        setVal("");
      }}
      title="Ix bundles · Master Control Tower"
      style={{
        maxWidth: 220, flex: "1 1 140px", fontSize: 11.5, fontWeight: 600,
        padding: "4px 8px", borderRadius: 6,
        border: `1px solid ${hexAlpha(c, 0.4)}`,
        background: hexAlpha(c, 0.07),
        color: T.ink,
        cursor: "pointer",
      }}>
      <option value="">Ix bundle…</option>
      {list.map((b) => (
        <option key={b.name} value={b.name}>{b.name}</option>
      ))}
    </select>
  );
}

const escapeRegex = (s) => String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
const buildLabRegex = (label) =>
  new RegExp("\\b" + escapeRegex(label) + "\\s*[:\\-=]?\\s*([\\d.,]+)\\s*([a-zA-Z%/μµ]+)?", "i");
// Returns { value, unit } or null if not found in text.
const matchLabInText = (label, text) => {
  if (!text || !label) return null;
  const re = buildLabRegex(label);
  const m = String(text).match(re);
  if (!m) return null;
  return { value: m[1], unit: (m[2] || "").trim() };
};


// ============================================================
// ROOT
// ============================================================
function App() {
  const [role, setRole] = usePersistentState("role", () => "secretary");

  // Cloud sync configuration
  const [cloudConfig, setCloudConfig] = useState(() => safeCloudGet());
  const [syncStatus, setSyncStatus] = useState({ kind: cloudConfig ? "connecting" : "local", detail: "" });
  const providerRef = useRef(null);
  const remoteOriginRef = useRef(false);

  // App state
  const [patients, setPatientsRaw] = usePersistentState("patients", () => migratePatients(seedPatients()));
  const [appts, setApptsRaw] = usePersistentState("appts", () => []);
  const [bills, setBillsRaw] = usePersistentState("bills", seedBills);
  const [globalDict, setGlobalDictRaw] = usePersistentState("globalDict", seedGlobalDict);
  const [clinicSettings, setClinicSettingsRaw] = usePersistentState("clinicSettings", () => DEFAULT_CLINIC_SETTINGS);
  const [appSettings, setAppSettingsRaw] = usePersistentState("appSettings", () => DEFAULT_APP_SETTINGS);
  // v7.6 — Unified Global Schedule key. Holds surgical procedures
  // scheduled across the app. Each entry:
  //   { id, patientId, date (YYYY-MM-DD), time (HH:MM), procedure,
  //     procedureAr, location, surgeon, notes, status }
  // The Master Diary merges this list with `appts` for any date.
  const [surgeries, setSurgeriesRaw] = usePersistentState("globalSchedule", () => []);

  // Merge new clinic-settings keys onto older persisted blobs (additive only).
  useEffect(() => {
    setClinicSettings((prev) => ({ ...DEFAULT_CLINIC_SETTINGS, ...(prev || {}) }));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Apply theme color whenever it changes
  useEffect(() => {
    applyThemeColor(appSettings.themeColor);
    // Force a re-render by toggling a counter — needed because T is a module-level
    // mutable object that React doesn't track.
    setThemeKey(k => k + 1);
  }, [appSettings.themeColor]);
  const [themeKey, setThemeKey] = useState(0);

  // Mirror appSettings to a window slot so primitives (Card, etc.) can
  // read sectionStyles / layout overrides without prop drilling.
  // This is intentional: section-style overrides are read-only for descendants
  // and only the Settings page mutates them.
  useEffect(() => {
    window.__appSettings = appSettings;
    setThemeKey(k => k + 1);
  }, [appSettings]);

  // First-run seeding for appts
  useEffect(() => {
    if (cloudConfig) return;
    if ((appts || []).length > 0) return;
    if (!patients || patients.length === 0) return;
    setApptsRaw(seedAppts(patients));
    // eslint-disable-next-line
  }, []);

  // Refs
  const patientsRef = useRef(patients);
  const apptsRef = useRef(appts);
  const billsRef = useRef(bills);
  useEffect(() => { patientsRef.current = patients; }, [patients]);
  useEffect(() => { apptsRef.current = appts; }, [appts]);
  useEffect(() => { billsRef.current = bills; }, [bills]);

  // Wrapped setters
  const diffById = (prev, next) => {
    const prevMap = new Map((prev || []).map(x => [x.id, x]));
    const nextMap = new Map((next || []).map(x => [x.id, x]));
    const upserts = [], deletes = [];
    nextMap.forEach((item, id) => {
      const before = prevMap.get(id);
      if (!before || JSON.stringify(before) !== JSON.stringify(item)) upserts.push(item);
    });
    prevMap.forEach((_, id) => { if (!nextMap.has(id)) deletes.push(id); });
    return { upserts, deletes };
  };

  const setPatients = (updater) => {
    setPatientsRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const provider = providerRef.current;
      if (provider && provider.kind !== "local" && !remoteOriginRef.current) {
        const { upserts, deletes } = diffById(prev, next);
        upserts.forEach(p => { provider.upsertPatient(p).catch(err => console.warn("upsertPatient failed", err)); });
        deletes.forEach(id => { provider.deletePatient(id).catch(err => console.warn("deletePatient failed", err)); });
      }
      return next;
    });
  };

  // Gynae trunk backfill — usePersistentState hydrates from localStorage and skips the initializer.
  useEffect(() => {
    setPatients((arr) => migratePatients(arr || []));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const setAppts = (updater) => {
    setApptsRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const provider = providerRef.current;
      if (provider && provider.kind !== "local" && !remoteOriginRef.current) {
        const { upserts, deletes } = diffById(prev, next);
        upserts.forEach(a => { provider.upsertAppt(a).catch(err => console.warn("upsertAppt failed", err)); });
        deletes.forEach(id => { provider.deleteAppt(id).catch(err => console.warn("deleteAppt failed", err)); });
      }
      return next;
    });
  };
  const setBills = (updater) => {
    setBillsRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const provider = providerRef.current;
      if (provider && provider.kind !== "local" && !remoteOriginRef.current) {
        const { upserts, deletes } = diffById(prev, next);
        upserts.forEach(b => { provider.upsertBill(b).catch(err => console.warn("upsertBill failed", err)); });
        deletes.forEach(id => { provider.deleteBill(id).catch(err => console.warn("deleteBill failed", err)); });
      }
      return next;
    });
  };
  // v7.6 — Surgeries setter. Local-first; when cloud is connected we
  // mirror the whole list as a singleton key so any device sees the
  // same diary. Falls back gracefully when there's no provider.
  const setSurgeries = (updater) => {
    setSurgeriesRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const provider = providerRef.current;
      if (provider && provider.kind !== "local" && !remoteOriginRef.current && provider.setSingleton) {
        provider.setSingleton("globalSchedule", next).catch(err => console.warn("setSingleton globalSchedule", err));
      }
      return next;
    });
  };
  const setGlobalDict = (updater) => {
    setGlobalDictRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const provider = providerRef.current;
      if (provider && provider.kind !== "local" && !remoteOriginRef.current) {
        provider.setSingleton("globalDict", next).catch(err => console.warn("setSingleton globalDict", err));
      }
      return next;
    });
  };
  const setClinicSettings = (updater) => {
    setClinicSettingsRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const provider = providerRef.current;
      if (provider && provider.kind !== "local" && !remoteOriginRef.current) {
        provider.setSingleton("clinicSettings", next).catch(err => console.warn("setSingleton clinicSettings", err));
      }
      return next;
    });
  };
  const setAppSettings = (updater) => {
    setAppSettingsRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const provider = providerRef.current;
      if (provider && provider.kind !== "local" && !remoteOriginRef.current) {
        provider.setSingleton("appSettings", next).catch(err => console.warn("setSingleton appSettings", err));
      }
      return next;
    });
  };

  // Global Backup / Restore (JSON) — wired from the persistent app rail everywhere.
  const restoreInputRef = useRef(null);
  const backupDatabase = () => {
    try {
      const localStorageDump = {};
      for (let i = 0; i < window.localStorage.length; i++) {
        const k = window.localStorage.key(i);
        if (!k) continue;
        localStorageDump[k] = window.localStorage.getItem(k);
      }
      const payload = {
        app: "Fetal Medicine Suite",
        exportedAt: new Date().toISOString(),
        state: {
          patients: patients || [],
          appts: appts || [],
          bills: bills || [],
          surgeries: surgeries || [],
          clinicSettings: clinicSettings || DEFAULT_CLINIC_SETTINGS,
          appSettings: appSettings || DEFAULT_APP_SETTINGS,
        },
        localStorage: localStorageDump,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `Clinic_Backup_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert("Backup failed. Please try again.");
    }
  };
  const triggerRestorePicker = () => {
    if (restoreInputRef.current) {
      restoreInputRef.current.value = "";
      restoreInputRef.current.click();
    }
  };
  const restoreDatabase = async (file) => {
    if (!file) return;
    if (!window.confirm("Restore backup now? This will overwrite current local data.\nاستعادة النسخة الآن؟ سيتم استبدال البيانات الحالية.")) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);

      if (parsed && parsed.localStorage && typeof parsed.localStorage === "object") {
        Object.keys(parsed.localStorage).forEach((k) => {
          try { window.localStorage.setItem(k, parsed.localStorage[k]); } catch {}
        });
      }

      const nextState = parsed?.state || {};
      if (Array.isArray(nextState.patients)) setPatients(nextState.patients);
      if (Array.isArray(nextState.appts)) setAppts(nextState.appts);
      if (Array.isArray(nextState.bills)) setBills(nextState.bills);
      if (Array.isArray(nextState.surgeries)) setSurgeries(nextState.surgeries);
      if (nextState.clinicSettings && typeof nextState.clinicSettings === "object") setClinicSettings(nextState.clinicSettings);
      if (nextState.appSettings && typeof nextState.appSettings === "object") setAppSettings(nextState.appSettings);

      if (Object.keys(nextState).length > 0) {
        const stored = safeStorageGet() || {};
        safeStorageSet({
          ...stored,
          ...(nextState.patients ? { patients: nextState.patients } : {}),
          ...(nextState.appts ? { appts: nextState.appts } : {}),
          ...(nextState.bills ? { bills: nextState.bills } : {}),
          ...(nextState.surgeries ? { globalSchedule: nextState.surgeries } : {}),
          ...(nextState.clinicSettings ? { clinicSettings: nextState.clinicSettings } : {}),
          ...(nextState.appSettings ? { appSettings: nextState.appSettings } : {}),
        });
      }

      setTimeout(() => window.location.reload(), 120);
    } catch (err) {
      alert("Invalid backup file.");
    }
  };

  // Provider lifecycle
  useEffect(() => {
    let cancelled = false;
    (async () => {
      if (providerRef.current) {
        try { await providerRef.current.destroy(); } catch (e) {}
        providerRef.current = null;
      }
      if (!cloudConfig) {
        providerRef.current = makeLocalProvider();
        setSyncStatus({ kind: "local", detail: "" });
        return;
      }
      try {
        const provider = makeSupabaseProvider({
          url: cloudConfig.url,
          anonKey: cloudConfig.anonKey,
          role,
          onStatus: (kind, detail) => { if (!cancelled) setSyncStatus({ kind, detail: detail || "" }); },
        });
        providerRef.current = provider;
        const remote = await provider.load();
        if (cancelled) return;
        remoteOriginRef.current = true;
        if (remote.patients !== null) setPatientsRaw(remote.patients);
        if (remote.appts !== null) setApptsRaw(remote.appts);
        if (remote.bills !== null) setBillsRaw(remote.bills);
        if (remote.globalDict !== null) setGlobalDictRaw(remote.globalDict);
        if (remote.clinicSettings !== null) setClinicSettingsRaw(remote.clinicSettings);
        if (remote.appSettings !== null) setAppSettingsRaw(remote.appSettings);
        queueMicrotask(() => { remoteOriginRef.current = false; });

        const unsub = provider.subscribe({
          onPatientChange: ({ id, demo, clin }) => {
            if (cancelled) return;
            remoteOriginRef.current = true;
            setPatientsRaw(prev => {
              const i = prev.findIndex(p => p.id === id);
              if (i === -1) {
                return [...prev, mergePatient({ ...(demo || {}), id }, clin || {})];
              }
              const updated = { ...prev[i] };
              if (demo) Object.assign(updated, demo, { id });
              if (clin) Object.assign(updated, clin);
              const next = [...prev];
              next[i] = updated;
              return next;
            });
            queueMicrotask(() => { remoteOriginRef.current = false; });
          },
          onPatientDelete: (id) => {
            if (cancelled) return;
            remoteOriginRef.current = true;
            setPatientsRaw(prev => prev.filter(p => p.id !== id));
            queueMicrotask(() => { remoteOriginRef.current = false; });
          },
          onApptUpsert: (appt) => {
            if (cancelled) return;
            remoteOriginRef.current = true;
            setApptsRaw(prev => {
              const i = prev.findIndex(a => a.id === appt.id);
              if (i === -1) return [...prev, appt];
              const next = [...prev]; next[i] = appt; return next;
            });
            queueMicrotask(() => { remoteOriginRef.current = false; });
          },
          onApptDelete: (id) => {
            if (cancelled) return;
            remoteOriginRef.current = true;
            setApptsRaw(prev => prev.filter(a => a.id !== id));
            queueMicrotask(() => { remoteOriginRef.current = false; });
          },
          onBillUpsert: (bill) => {
            if (cancelled) return;
            remoteOriginRef.current = true;
            setBillsRaw(prev => {
              const i = prev.findIndex(b => b.id === bill.id);
              if (i === -1) return [...prev, bill];
              const next = [...prev]; next[i] = bill; return next;
            });
            queueMicrotask(() => { remoteOriginRef.current = false; });
          },
          onBillDelete: (id) => {
            if (cancelled) return;
            remoteOriginRef.current = true;
            setBillsRaw(prev => prev.filter(b => b.id !== id));
            queueMicrotask(() => { remoteOriginRef.current = false; });
          },
          onGlobalDict: (dict) => {
            if (cancelled) return;
            remoteOriginRef.current = true;
            setGlobalDictRaw(dict);
            queueMicrotask(() => { remoteOriginRef.current = false; });
          },
          onClinicSettings: (settings) => {
            if (cancelled) return;
            remoteOriginRef.current = true;
            setClinicSettingsRaw(settings);
            queueMicrotask(() => { remoteOriginRef.current = false; });
          },
          onAppSettings: (settings) => {
            if (cancelled) return;
            remoteOriginRef.current = true;
            setAppSettingsRaw(settings);
            queueMicrotask(() => { remoteOriginRef.current = false; });
          },
        });
        provider._unsubscribe = unsub;
      } catch (err) {
        if (!cancelled) {
          setSyncStatus({ kind: "error", detail: err.message || String(err) });
        }
      }
    })();
    return () => {
      cancelled = true;
      if (providerRef.current && providerRef.current._unsubscribe) {
        try { providerRef.current._unsubscribe(); } catch (e) {}
      }
    };
    // eslint-disable-next-line
  }, [cloudConfig, role]);

  // App state ephemeral
  const [activePatientId, setActivePatientId] = useState(null);
  const [activeEpisodeId, setActiveEpisodeId] = useState(null);
  const [compareEpisodeId, setCompareEpisodeId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);

  const activePatient = patients.find((p) => p.id === activePatientId) || null;

  const updatePatient = (id, patch) =>
    setPatients((arr) => arr.map((p) => (p.id === id ? { ...p, ...patch } : p)));

  const addEpisode = (patientId, kind) => {
    const ep = { id: uid(), date: todayISO(), kind, summary: `${kind} visit`, data: {} };
    setPatients((arr) => arr.map((p) => p.id === patientId ? { ...p, episodes: [ep, ...p.episodes] } : p));
    setActivePatientId(patientId);
    setActiveEpisodeId(ep.id);
    setCompareEpisodeId(null);
    return ep.id;
  };

  const updateEpisode = (patientId, episodeId, patch) => {
    setPatients((arr) =>
      arr.map((p) => p.id === patientId
        ? { ...p, episodes: p.episodes.map((e) => e.id === episodeId ? { ...e, ...patch } : e) }
        : p
      )
    );
  };

  const deleteEpisode = (patientId, episodeId) => {
    setPatients((arr) =>
      arr.map((p) => p.id === patientId
        ? { ...p, episodes: p.episodes.filter((e) => e.id !== episodeId) }
        : p
      )
    );
    if (activeEpisodeId === episodeId) setActiveEpisodeId(null);
    if (compareEpisodeId === episodeId) setCompareEpisodeId(null);
  };

  const dictAddItem = (key, item) => {
    setGlobalDict(prev => {
      const existing = Array.isArray(prev[key]) ? prev[key] : [];
      if (existing.includes(item)) return prev;
      return { ...prev, [key]: [...existing, item] };
    });
  };
  const dictRemoveItem = (key, item) => {
    setGlobalDict(prev => {
      const existing = Array.isArray(prev[key]) ? prev[key] : [];
      return { ...prev, [key]: existing.filter(x => x !== item) };
    });
  };

  const dictAPI = { dict: globalDict, dictAddItem, dictRemoveItem };

  const connectCloud = (cfg) => {
    safeCloudSet(cfg);
    setCloudConfig(cfg);
    setSyncStatus({ kind: "connecting", detail: "" });
  };
  const disconnectCloud = () => {
    safeCloudSet(null);
    setCloudConfig(null);
    setSyncStatus({ kind: "local", detail: "" });
  };

  // Compose dynamic root style from app settings — fontSize and bold apply globally
  const rootStyle = {
    ...styles.app,
    fontSize: `${appSettings.fontSize}px`,
    fontWeight: appSettings.bold ? 600 : 400,
  };

  return (
    <div style={rootStyle} key={`theme-${themeKey}`}>
      <GlobalCSS settings={appSettings} />
      <input
        ref={restoreInputRef}
        type="file"
        accept=".json,application/json"
        aria-hidden="true"
        style={{ display: "none" }}
        onChange={(e) => restoreDatabase(e.target.files && e.target.files[0])}
      />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>
        <div style={{ display: "flex", flex: 1, minHeight: 0, minWidth: 0 }}>
          <MainAppRail
            onOpenSettings={() => setShowSettings(true)}
            backupDatabase={backupDatabase}
            triggerRestorePicker={triggerRestorePicker}
          />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, minHeight: 0 }}>
            <TopBar
              role={role} setRole={setRole}
              cloudConfig={cloudConfig}
              syncStatus={syncStatus}
              connectCloud={connectCloud}
              disconnectCloud={disconnectCloud}
              patients={patients}
              onOpenPatient={(id) => {
                setRole("doctor");
                setShowSettings(false);
                setActivePatientId(id);
                setActiveEpisodeId(null);
                setCompareEpisodeId(null);
              }}
            />
            <div className="work-area-fluid" style={styles.workArea}>
        {showSettings ? (
          <SettingsView
            appSettings={appSettings} setAppSettings={setAppSettings}
            dictAPI={dictAPI}
            onClose={() => setShowSettings(false)}
          />
        ) : role === "secretary" ? (
          <SecretaryView
            patients={patients}
            setPatients={setPatients}
            appts={appts}
            setAppts={setAppts}
            bills={bills}
            setBills={setBills}
            surgeries={surgeries}
            setSurgeries={setSurgeries}
            clinicSettings={clinicSettings}
            setClinicSettings={setClinicSettings}
            appSettings={appSettings}
            setAppSettings={setAppSettings}
            onOpenPatient={(id) => {
              setRole("doctor");
              setShowSettings(false);
              setActivePatientId(id);
              setActiveEpisodeId(null);
              setCompareEpisodeId(null);
            }}
          />
        ) : (
          <DoctorView
            patients={patients}
            appts={appts}
            setAppts={setAppts}
            surgeries={surgeries}
            setSurgeries={setSurgeries}
            updatePatient={updatePatient}
            addEpisode={addEpisode}
            updateEpisode={updateEpisode}
            deleteEpisode={deleteEpisode}
            activePatient={activePatient}
            activePatientId={activePatientId}
            setActivePatientId={setActivePatientId}
            activeEpisodeId={activeEpisodeId}
            setActiveEpisodeId={setActiveEpisodeId}
            compareEpisodeId={compareEpisodeId}
            setCompareEpisodeId={setCompareEpisodeId}
            dictAPI={dictAPI}

            clinicSettings={clinicSettings}
          />
        )}

    </div>

}

// ============================================================
// TOP BAR — adds a Settings gear icon
// ============================================================
function TopBar({ role, setRole, cloudConfig, syncStatus, connectCloud, disconnectCloud, patients, onOpenPatient }) {
  const [showCloudPanel, setShowCloudPanel] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const [searchOpen, setSearchOpen] = useState(false);
  const searchRef = useRef(null);

  // Close the search dropdown when clicking outside
  useEffect(() => {
    const onDoc = (e) => {
      if (searchRef.current && !searchRef.current.contains(e.target)) setSearchOpen(false);
    };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);

  const searchResults = useMemo(() => {
    const q = searchQuery.trim().toLowerCase();
    if (!q) return [];
    return (patients || []).filter(p => {
      return (
        (p.nameEn || "").toLowerCase().includes(q) ||
        (p.nameAr || "").includes(searchQuery.trim()) ||
        (p.mobile || "").includes(q) ||
        (p.patientId || "").toLowerCase().includes(q) ||
        (p.couple?.husband?.nameEn || "").toLowerCase().includes(q) ||
        (p.couple?.husband?.nameAr || "").includes(searchQuery.trim())
      );
    }).slice(0, 8);
  }, [patients, searchQuery]);

  const pickPatient = (p) => {
    setSearchQuery("");
    setSearchOpen(false);
    if (onOpenPatient) onOpenPatient(p.id);
  };

  const statusPill = (() => {
    if (syncStatus.kind === "local") {
      return { label: "Local only", color: T.inkSoft, bg: T.paperWarm, icon: <CloudOff size={11} strokeWidth={2} /> };
    }
    if (syncStatus.kind === "connecting") {
      return { label: "Connecting…", color: T.ochre, bg: T.ochreSoft, icon: <Cloud size={11} strokeWidth={2} /> };
    }
    if (syncStatus.kind === "connected") {
      return { label: "Synced", color: T.tealDeep, bg: T.tealSoft, icon: <Cloud size={11} strokeWidth={2} /> };
    }
    if (syncStatus.kind === "offline") {
      return { label: "Offline", color: T.coral, bg: T.coralSoft, icon: <CloudOff size={11} strokeWidth={2} /> };
    }
    return { label: "Sync error", color: T.flag, bg: T.flagBg, icon: <AlertCircle size={11} strokeWidth={2} /> };
  })();

  return (
    <header style={styles.topbar}>
      <div style={styles.brand}>
        <div style={styles.brandMark}>
          <Baby size={20} strokeWidth={1.5} />
        </div>
        <div>
          <div style={styles.brandTitle}>Fetal Medicine Suite</div>
          <div style={styles.brandSub}>Unified front-desk · exam-room workspace</div>
        </div>
      </div>

      {/* Global patient search — shown in Doctor mode */}
      {role === "doctor" && (
        <div ref={searchRef} style={{ position: "relative", flex: "1 1 320px", maxWidth: 480, minWidth: 240 }}>
          <div style={{ position: "relative" }}>
            <Search size={14} strokeWidth={1.6} style={{ position: "absolute", left: 12, top: 11, color: T.inkSoft, pointerEvents: "none" }} />
            <input
              style={{
                ...styles.input,
                paddingLeft: 36, paddingRight: searchQuery ? 32 : 12,
                fontSize: 13,
                background: T.paperWarm,
                border: `1px solid ${searchOpen ? T.teal : T.lineSoft}`,
              }}
              placeholder="Search patients · Name (EN/AR), Mobile, ID …"
              value={searchQuery}
              onChange={(e) => { setSearchQuery(e.target.value); setSearchOpen(true); }}
              onFocus={() => setSearchOpen(true)}
            />
            {searchQuery && (
              <button onClick={() => { setSearchQuery(""); setSearchOpen(false); }}
                style={{
                  position: "absolute", right: 8, top: 7,
                  width: 22, height: 22, borderRadius: 999,
                  border: "none", background: "transparent",
                  color: T.inkSoft, cursor: "pointer",
                  display: "grid", placeItems: "center",
                }} title="Clear search">
                <X size={12} strokeWidth={2} />
              </button>
            )}
          </div>

          {searchOpen && searchQuery && (
            <div style={{
              position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0,
              background: T.card, border: `1px solid ${T.line}`,
              borderRadius: 10, boxShadow: `0 8px 24px ${hexAlpha(T.ink, 0.15)}`,
              maxHeight: 380, overflow: "auto", zIndex: 60,
            }}>
              {searchResults.length === 0 ? (
                <div style={{ padding: "14px 16px", fontSize: 12.5, color: T.inkSoft, textAlign: "center", fontStyle: "italic" }}>
                  No patients match "{searchQuery}"
                  <br />
                  <span style={{ direction: "rtl" }}>لا يوجد مرضى مطابقون</span>
                </div>
              ) : (
                <>
                  <div style={{
                    padding: "6px 12px", fontSize: 10, color: T.inkSoft,
                    letterSpacing: 0.6, textTransform: "uppercase", fontWeight: 700,
                    borderBottom: `1px solid ${T.lineSoft}`, background: T.paperWarm,
                  }}>
                    {searchResults.length} match{searchResults.length === 1 ? "" : "es"} — click to open file
                  </div>
                  {searchResults.map(p => {
                    const husbandLabel = p.couple?.husband?.nameEn || p.couple?.husband?.nameAr;
                    return (
                      <button key={p.id} onClick={() => pickPatient(p)}
                        style={{
                          display: "block", width: "100%", textAlign: "left",
                          padding: "10px 12px", border: "none",
                          borderBottom: `1px solid ${T.lineSoft}`,
                          background: "transparent", cursor: "pointer",
                        }}
                        onMouseEnter={(e) => e.currentTarget.style.background = T.tealSoft}
                        onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
                        <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
                          <div style={{ fontWeight: 600, fontSize: 13, color: T.ink }}>{p.nameEn || "—"}</div>
                          {p.patientId && (
                            <span style={{
                              fontSize: 10, fontFamily: "monospace", color: T.tealDeep,
                              background: T.tealSoft, padding: "1px 6px", borderRadius: 4,
                              fontWeight: 700, letterSpacing: 0.3,
                            }}>{p.patientId}</span>
                          )}
                          <span style={{ direction: "rtl", fontSize: 12, color: T.inkSoft, marginLeft: "auto" }}>{p.nameAr}</span>
                        </div>
                        <div style={{ fontSize: 11.5, color: T.inkSoft, marginTop: 3, display: "flex", gap: 10, flexWrap: "wrap" }}>
                          {p.mobile && <span><Phone size={10} strokeWidth={1.8} style={{ verticalAlign: "middle", marginRight: 3 }} />{p.mobile}</span>}
                          {ageFromDOB(p.dob) !== "" && <span>· {ageFromDOB(p.dob)} y</span>}
                          {husbandLabel && (
                            <span style={{ display: "inline-flex", alignItems: "center", gap: 3 }}>
                              · <Stethoscope size={10} strokeWidth={1.8} /> {husbandLabel}
                            </span>
                          )}
                          {(p.episodes || []).length > 0 && <span>· {p.episodes.length} ep</span>}
                        </div>
                      </button>
                    );
                  })}
                </>
              )}
            </div>
          )}
        </div>
      )}

      <div style={styles.roleToggle}>
        <button
          onClick={() => setRole("secretary")}
          style={{ ...styles.roleBtn, ...(role === "secretary" ? styles.roleBtnActive : {}) }}>
          <ClipboardList size={15} strokeWidth={1.6} />
          <span>Secretary</span>
        </button>
        <button
          onClick={() => setRole("doctor")}
          style={{ ...styles.roleBtn, ...(role === "doctor" ? styles.roleBtnActive : {}) }}>
          <Stethoscope size={15} strokeWidth={1.6} />
          <span>Doctor</span>
        </button>
      </div>

      <div style={styles.topMeta}>
        <button
          onClick={() => setShowCloudPanel(true)}
          title={syncStatus.detail || statusPill.label}
          style={{
            display: "inline-flex", alignItems: "center", gap: 5,
            padding: "4px 10px", borderRadius: 999,
            background: statusPill.bg, color: statusPill.color,
            border: "none", cursor: "pointer",
            fontSize: 11, fontWeight: 700, letterSpacing: 0.4,
          }}>
          {statusPill.icon}
          {statusPill.label}
        </button>
        <span style={styles.topMetaItem}><Clock size={13} strokeWidth={1.5} /> {new Date().toLocaleString("en-GB", { weekday: "short", day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" })}</span>
      </div>

      {showCloudPanel && (
        <CloudSyncPanel
          cloudConfig={cloudConfig}
          syncStatus={syncStatus}
          role={role}
          onConnect={(cfg) => { connectCloud(cfg); setShowCloudPanel(false); }}
          onDisconnect={() => { disconnectCloud(); setShowCloudPanel(false); }}
          onClose={() => setShowCloudPanel(false)}
        />
      )}
    </header>
  );
}

function FooterBar() {
  const [storageOK, setStorageOK] = useState(null);
  useEffect(() => {
    const test = safeStorageSet({ __probe: 1 });
    setStorageOK(test);
  }, []);

  const clearAll = () => {
    if (!window.confirm("Clear ALL saved data — patients, appointments, bills, dictionaries, settings, and uploaded media? This cannot be undone.")) return;
    try {
      window.localStorage.removeItem(STORAGE_KEY);
      window.location.reload();
    } catch (err) {
      alert("Could not clear storage. You can try clearing your browser data manually.");
    }
  };

  return (
    <footer style={styles.footer}>
      <span style={{ display: "inline-flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span>Single-tenant clinical workspace</span>
        <span style={{
          padding: "2px 8px", borderRadius: 999,
          fontSize: 10.5, fontWeight: 700, letterSpacing: 0.4,
          background: storageOK ? T.tealSoft : T.flagBg,
          color: storageOK ? T.tealDeep : T.flag,
        }}>
          {storageOK ? "● saved locally" : "○ in-memory only (storage unavailable)"}
        </span>
        {storageOK && (
          <button onClick={clearAll} style={{
            background: "transparent", border: "none",
            color: T.inkSoft, fontSize: 11, cursor: "pointer",
            textDecoration: "underline", padding: 0,
          }}>Clear all data</button>
        )}
      </span>
      <span style={{ opacity: 0.6 }}>Clinical decisions remain the responsibility of the practitioner.</span>
    </footer>
  );
}

// SETTINGS VIEW — font, bold, theme, custom couple rows
// ============================================================
function SettingsView({ appSettings, setAppSettings, dictAPI, onClose }) {
  const update = (patch) => setAppSettings({ ...appSettings, ...patch });

  // Custom couple rows management
  const rows = appSettings.customCoupleRows || [];
  const addRow = () => {
    update({
      customCoupleRows: [
        ...rows,
        { id: uid(), en: "New field", ar: "حقل جديد" },
      ],
    });
  };
  const updateRow = (id, patch) => {
    update({
      customCoupleRows: rows.map(r => r.id === id ? { ...r, ...patch } : r),
    });
  };
  const removeRow = (id) => {
    update({
      customCoupleRows: rows.filter(r => r.id !== id),
    });
  };
  const reset = () => {
    if (!window.confirm("Reset all visual settings to defaults? Custom couple rows will also be removed.")) return;
    setAppSettings(DEFAULT_APP_SETTINGS);
  };

  return (
    <div>
      <PageHeader
        eyebrow={<>Customization · <span style={{ direction: "rtl" }}>التخصيص</span></>}
        title={<>Settings · <span style={{ direction: "rtl", fontFamily: "'Fraunces', Georgia, serif" }}>الإعدادات</span></>}

          Adjust visual preferences and customize the bilingual couple intake table. Changes save automatically.

            ضبط التفضيلات البصرية وتخصيص جدول بيانات الزوجين. التغييرات تُحفظ تلقائياً.
          </span>
        </>}
      />

      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginBottom: 14 }}>
        <button onClick={reset} style={{ ...styles.ghostBtn, color: T.flag, borderColor: T.flag }}>
          <Trash size={13} strokeWidth={1.8} /> Reset to defaults
        </button>
        <button onClick={onClose} style={styles.primaryBtn}>
          <ArrowRight size={13} strokeWidth={1.8} /> Done · تم
        </button>
      </div>

      <div style={styles.grid2}>
        {/* VISUALS CARD */}
        <Card title={<>Visuals · <span style={{ direction: "rtl", fontWeight: 500, color: T.inkSoft, fontSize: 13 }}>المظهر</span></>}
          icon={<Type size={15} strokeWidth={1.6} />} accent={T.teal}>

          <Field label={<>Font size · <span style={{ direction: "rtl", color: T.inkSoft }}>حجم الخط</span> · <strong style={{ color: T.tealDeep }}>{appSettings.fontSize}px</strong></>}>

        setAppSettings={setAppSettings}

      <div style={{ height: 16 }} />

      <Card title={<>Storage info · <span style={{ direction: "rtl", fontWeight: 500, color: T.inkSoft, fontSize: 13 }}>معلومات التخزين</span></>}
        icon={<FileText size={15} strokeWidth={1.6} />} accent={T.ochre}>
        <StorageStats />
      </Card>
    </div>
  );
}

// pre-printed letterhead paper.

    update({ rxPresets: presets.filter(p => p.id !== id) });

  return (
    <Card title={<>Rx Manager · <span style={{ direction: "rtl", fontWeight: 500, color: T.inkSoft, fontSize: 13 }}>مدير الوصفات</span></>}

        <span style={{ direction: "rtl" }}>
          احفظ هنا الأدوية الشائعة لتظهر كاختيارات سريعة في نافذة "طباعة الوصفة" على كل زيارة. يضبط شريط "الهامش العلوي" مكان الطباعة لتتوافق مع الورق ذي الترويسة.

      <div style={{ height: 14 }} />

      <Field label={<>Rx page header (optional) · <span style={{ direction: "rtl", color: T.inkSoft }}>ترويسة الوصفة (اختياري)</span></>}>

          <span style={{ direction: "rtl" }}>
            لا توجد أدوية محفوظة بعد. اضغط "إضافة دواء" لإضافة أول وصفة (مثلاً: حمض فوليك ٥ ملغ، سيكلوجيست، أسبرين ٧٥).
