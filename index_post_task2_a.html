function SpineSurgicalHistorySection({ patient, updatePatient }) {
  const [showAll, setShowAll] = useState(false);
  const rows = Array.isArray(patient.surgicalHistory) ? patient.surgicalHistory : [];
  const visibleRows = showAll ? rows : rows.slice(0, 3);

  const setRows = (nextRows) => {
    updatePatient(patient.id, { surgicalHistory: nextRows });
  };

  const updateRow = (id, patch) => {
    setRows(rows.map((r) => (r.id === id ? { ...r, ...patch } : r)));
  };

  const deleteRow = (id) => {
    if (!window.confirm("Delete this surgery?")) return;
    setRows(rows.filter((r) => r.id !== id));
  };

  const addRow = () => {
    setRows([
      ...rows,
      { id: uid(), date: "", procedure: "", notes: "" },
    ]);
  };

  return (
    <Card
      title="Surgical History · التاريخ الجراحي"
      icon={<Activity size={15} strokeWidth={1.6} />}
      accent={T.coral}
      collapsible
      defaultCollapsed>
      {rows.length === 0 ? (
        <EmptyHint>No surgeries recorded · لا توجد عمليات مسجلة</EmptyHint>
      ) : (
        <div style={{ display: "grid", gap: 8 }}>
          {visibleRows.map((r) => (
            <div key={r.id} style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <input
                type="date"
                style={{ ...styles.input, width: 140, flex: "0 0 140px" }}
                value={r.date || ""}
                onChange={(e) => updateRow(r.id, { date: e.target.value })}
              />
              <input
                type="text"
                style={{ ...styles.input, flex: "1 1 220px" }}
                placeholder="Procedure · العملية"
                value={r.procedure || ""}
                onChange={(e) => updateRow(r.id, { procedure: e.target.value })}
              />
              <input
                type="text"
                style={{ ...styles.input, flex: "1 1 220px" }}
                placeholder="Notes · ملاحظات"
                value={r.notes || ""}
                onChange={(e) => updateRow(r.id, { notes: e.target.value })}
              />
              <button
                type="button"
                style={styles.miniIconBtn}
                onClick={() => deleteRow(r.id)}
                title="Delete surgery · حذف العملية">
                <Trash2 size={11} strokeWidth={1.8} />
              </button>
            </div>
          ))}
        </div>
      )}
      {rows.length > 3 && (
        <div style={{ marginTop: 8 }}>
          <button type="button" style={styles.miniBtn} onClick={() => setShowAll((s) => !s)}>
            {showAll ? "Show fewer · عرض أقل" : `Show all (${rows.length}) · عرض الكل`}
          </button>
        </div>
      )}
      <div style={{ marginTop: 8 }}>
        <button type="button" onClick={addRow} style={styles.miniBtn}>
          <Plus size={12} strokeWidth={1.8} /> Add surgery · إضافة عملية
        </button>
      </div>
    </Card>
  );
}

function ARTSummaryCard({ patient }) {
  const episodes = patient.episodes || [];
  const stim = episodes.filter((e) => e.kind === "IVF Stim");
  const tiCount = stim.filter((e) => e.data?.purpose === "TI").length;
  const iuiCount = stim.filter((e) => e.data?.purpose === "IUI").length;
  const ivfIcsiCount = stim.length;
  const fetCount = episodes.filter((e) => e.kind === "FET").length;
  const frozenEmb = patient.embryoBank?.count ?? 0;

  const artEpisodesForLatest = episodes.filter((e) => e.kind === "IVF Stim" || e.kind === "FET");
  const latestCycle = [...artEpisodesForLatest].sort((a, b) =>
    String(b.date || "").localeCompare(String(a.date || ""))
  )[0];

  const tileStyle = {
    padding: 12,
    border: `1px solid ${T.lineSoft}`,
    borderRadius: 8,
    background: `${T.paperWarm}`,
    textAlign: "center",
  };
  const numStyle = {
    fontSize: 22,
    fontWeight: 700,
    color: T.tealDeep,
  };
  const labelStyle = {
    fontSize: 10.5,
    color: T.inkSoft,
    textTransform: "uppercase",
    letterSpacing: 0.5,
  };

  const stats = [
    { label: <>Frozen embryos · <span style={{ direction: "rtl" }}>أجنة مجمدة</span></>, value: frozenEmb },
    { label: <>TI cycles · <span style={{ direction: "rtl" }}>دورات TI</span></>, value: tiCount },
    { label: <>IUI cycles · <span style={{ direction: "rtl" }}>دورات IUI</span></>, value: iuiCount },
    { label: <>IVF/ICSI cycles · <span style={{ direction: "rtl" }}>دورات IVF/ICSI</span></>, value: ivfIcsiCount },
    { label: <>FET cycles · <span style={{ direction: "rtl" }}>دورات FET</span></>, value: fetCount },
  ];

  return (
    <Card
      title={<>ART Summary · <span style={{ direction: "rtl", fontWeight: 600 }}>ملخص الإنجاب المساعد</span></>}
      icon={<Sparkles size={15} strokeWidth={1.6} />}
      accent={T.tealDeep}
      collapsible
      defaultCollapsed>
      <div
        style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))",
          gap: 12,
        }}>
        {stats.map((s, i) => (
          <div key={i} style={tileStyle}>
            <div style={labelStyle}>{s.label}</div>
            <div style={{ ...numStyle, marginTop: 6 }}>{s.value}</div>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 14 }}>
        {latestCycle ? (
          <button
            type="button"
            style={styles.miniBtn}
            onClick={(ev) => {
              ev.preventDefault();
            }}>
            Latest cycle →
          </button>
        ) : (
          <span style={{ fontSize: 12, color: T.inkSoft }}>No cycles yet · لا توجد دورات</span>
        )}
      </div>
    </Card>
  );
}

function SpineReproductiveSection({ patient, updatePatient }) {
  const rep = patient.reproductive || {};
  const gridStyle = {
    display: "grid",
    gridTemplateColumns: "repeat(2, minmax(0, 1fr))",
    gap: 12,
  };
  const textareaStyle = {
    ...styles.input,
    minHeight: 0,
    resize: "vertical",
    fontFamily: "inherit",
    lineHeight: 1.45,
  };

  const hsgTaRef = useRef(null);
  const cavityTaRef = useRef(null);
  const husbandTaRef = useRef(null);
  const semenTaRef = useRef(null);
  const sizeRepTextarea = (el) => {
    if (!el) return;
    el.style.height = "auto";
    el.style.height = `${el.scrollHeight}px`;
  };
  useLayoutEffect(() => {
    sizeRepTextarea(hsgTaRef.current);
    sizeRepTextarea(cavityTaRef.current);
    sizeRepTextarea(husbandTaRef.current);
    sizeRepTextarea(semenTaRef.current);
  }, [rep.hsg, rep.cavity, rep.husbandData, rep.semenAnalysis]);

  const patchReproductive = (patch) => {
    updatePatient(patient.id, {
      reproductive: { ...rep, ...patch },
    });
  };

  const [amhFormOpen, setAmhFormOpen] = useState(false);
  const [amhVal, setAmhVal] = useState("");
  const [amhDate, setAmhDate] = useState(() => todayISO());
  const [amhHistOpen, setAmhHistOpen] = useState(false);

  const [afcFormOpen, setAfcFormOpen] = useState(false);
  const [afcVal, setAfcVal] = useState("");
  const [afcDate, setAfcDate] = useState(() => todayISO());
  const [afcHistOpen, setAfcHistOpen] = useState(false);

  const amhHistory = Array.isArray(rep.amhHistory) ? rep.amhHistory : [];
  const afcHistory = Array.isArray(rep.afcHistory) ? rep.afcHistory : [];
  const latestAmh = amhHistory[0];
  const latestAfc = afcHistory[0];
  const amhPrior = amhHistory.slice(1);
  const afcPrior = afcHistory.slice(1);

  const saveAmhEntry = () => {
    const v = (amhVal || "").trim();
    const d = (amhDate || "").trim();
    if (!v || !d) return;
    const next = [{ value: v, date: d }, ...amhHistory];
    patchReproductive({ amhHistory: next });
    setAmhVal("");
    setAmhDate(todayISO());
    setAmhFormOpen(false);
  };

  const saveAfcEntry = () => {
    const v = (afcVal || "").trim();
    const d = (afcDate || "").trim();
    if (!v || !d) return;
    const next = [{ value: v, date: d }, ...afcHistory];
    patchReproductive({ afcHistory: next });
    setAfcVal("");
    setAfcDate(todayISO());
    setAfcFormOpen(false);
  };

  return (
    <Card
      title={<>Reproductive · <span style={{ direction: "rtl", fontWeight: 600 }}>الإنجابي</span></>}
      icon={<Heart size={15} strokeWidth={1.6} />}
      accent={T.rose}
      collapsible
      defaultCollapsed>
      <div style={gridStyle}>
        <Field label={<>Cycle length (days) · <span style={{ direction: "rtl", color: T.inkSoft }}>طول الدورة</span></>}>
          <input
            type="text"
            style={styles.input}
            value={rep.cycleLength ?? ""}
            onChange={(e) => patchReproductive({ cycleLength: e.target.value })}
          />
        </Field>
        <Field label={<>Regularity · <span style={{ direction: "rtl", color: T.inkSoft }}>انتظام</span></>}>
          <select
            style={styles.input}
            value={rep.regularity || ""}
            onChange={(e) => patchReproductive({ regularity: e.target.value })}>
            <option value="">—</option>
            <option value="Regular">Regular</option>
            <option value="Irregular">Irregular</option>
          </select>
        </Field>
        <Field label={<>Dysmenorrhea · <span style={{ direction: "rtl", color: T.inkSoft }}>عسر الطمث</span></>}>
          <select
            style={styles.input}
            value={rep.dysmenorrhea || ""}
            onChange={(e) => patchReproductive({ dysmenorrhea: e.target.value })}>
            <option value="">—</option>
            <option value="None">None</option>
            <option value="Mild">Mild</option>
            <option value="Moderate">Moderate</option>
            <option value="Severe">Severe</option>
          </select>
        </Field>
        <Field label={<>LMP · <span style={{ direction: "rtl", color: T.inkSoft }}>آخر دورة</span></>}>
          <input
            type="date"
            style={styles.input}
            value={rep.lmp || ""}
            onChange={(e) => patchReproductive({ lmp: e.target.value })}
          />
        </Field>
      </div>

      <div style={{ marginTop: 16 }}>
        <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: T.ink }}>
            AMH (latest) · <span style={{ direction: "rtl", color: T.inkSoft }}>أحدث AMH</span>
          </span>
          <span style={{ fontSize: 17, fontWeight: 700, color: T.ink }}>
            {latestAmh ? <>{latestAmh.value} ng/mL · {fmtDate(latestAmh.date)}</> : "—"}
          </span>
          <button type="button" style={styles.miniBtn} onClick={() => setAmhFormOpen((o) => !o)}>
            + Add value
          </button>
        </div>
        {amhFormOpen && (
          <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "flex-end" }}>
            <label style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 11 }}>
              Value
              <input type="text" style={{ ...styles.input, width: 100 }} value={amhVal} onChange={(e) => setAmhVal(e.target.value)} />
            </label>
            <label style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 11 }}>
              Date
              <input type="date" style={{ ...styles.input, width: 140 }} value={amhDate} onChange={(e) => setAmhDate(e.target.value)} />
            </label>
            <button type="button" style={styles.miniBtn} onClick={saveAmhEntry}>
              Save
            </button>
          </div>
        )}
        <div style={{ marginTop: 10 }}>
          <button type="button" style={styles.miniBtn} onClick={() => setAmhHistOpen((o) => !o)}>
            History ({amhPrior.length})
          </button>
          {amhHistOpen && amhPrior.length > 0 && (
            <div style={{ marginTop: 8, fontSize: 12, color: T.ink }}>
              {amhPrior.map((row, ix) => (
                <div key={ix}>{fmtDate(row.date)} · {row.value}</div>
              ))}
            </div>
          )}
        </div>
      </div>

      <div style={{ marginTop: 16, ...gridStyle }}>
        <Field label={<>HSG (own assessment) · <span style={{ direction: "rtl", color: T.inkSoft }}>HSG</span></>}>
          <textarea
            ref={hsgTaRef}
            rows={1}
            style={textareaStyle}
            value={rep.hsg || ""}
            onChange={(e) => {
              patchReproductive({ hsg: e.target.value });
              sizeRepTextarea(e.target);
            }}
          />
        </Field>
        <Field label={<>Cavity assessment · <span style={{ direction: "rtl", color: T.inkSoft }}>تقييم التجويف</span></>}>
          <textarea
            ref={cavityTaRef}
            rows={1}
            style={textareaStyle}
            value={rep.cavity || ""}
            onChange={(e) => {
              patchReproductive({ cavity: e.target.value });
              sizeRepTextarea(e.target);
            }}
          />
        </Field>
        <Field label={<>Husband data · <span style={{ direction: "rtl", color: T.inkSoft }}>بيانات الزوج</span></>}>
          <textarea
            ref={husbandTaRef}
            rows={1}
            style={textareaStyle}
            value={rep.husbandData || ""}
            onChange={(e) => {
              patchReproductive({ husbandData: e.target.value });
              sizeRepTextarea(e.target);
            }}
          />
        </Field>
        <Field label={<>Semen analysis · <span style={{ direction: "rtl", color: T.inkSoft }}>تحليل السائل المنوي</span></>}>
          <textarea
            ref={semenTaRef}
            rows={1}
            style={textareaStyle}
            value={rep.semenAnalysis || ""}
            onChange={(e) => {
              patchReproductive({ semenAnalysis: e.target.value });
              sizeRepTextarea(e.target);
            }}
          />
        </Field>
      </div>

      <div style={{ marginTop: 16 }}>
        <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: T.ink }}>
            AFC (latest) · <span style={{ direction: "rtl", color: T.inkSoft }}>أحدث عدد الحويصلات الأولية</span>
          </span>
          <span style={{ fontSize: 17, fontWeight: 700, color: T.ink }}>
            {latestAfc ? <>{latestAfc.value} count · {fmtDate(latestAfc.date)}</> : "—"}
          </span>
          <button type="button" style={styles.miniBtn} onClick={() => setAfcFormOpen((o) => !o)}>
            + Add value
          </button>
        </div>
        {afcFormOpen && (
          <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "flex-end" }}>
            <label style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 11 }}>
              Value
              <input type="text" style={{ ...styles.input, width: 100 }} value={afcVal} onChange={(e) => setAfcVal(e.target.value)} />
            </label>
            <label style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 11 }}>
              Date
              <input type="date" style={{ ...styles.input, width: 140 }} value={afcDate} onChange={(e) => setAfcDate(e.target.value)} />
            </label>
            <button type="button" style={styles.miniBtn} onClick={saveAfcEntry}>
              Save
            </button>
          </div>
        )}
        <div style={{ marginTop: 10 }}>
          <button type="button" style={styles.miniBtn} onClick={() => setAfcHistOpen((o) => !o)}>
            History ({afcPrior.length})
          </button>
          {afcHistOpen && afcPrior.length > 0 && (
            <div style={{ marginTop: 8, fontSize: 12, color: T.ink }}>
              {afcPrior.map((row, ix) => (
                <div key={ix}>{fmtDate(row.date)} · {row.value}</div>
              ))}
            </div>
          )}
        </div>
      </div>

      <div style={{ marginTop: 16 }}>
        <ARTSummaryCard patient={patient} />
      </div>
    </Card>
  );
}

function QuickCaptureModal({ patient, updatePatient, open, onClose }) {
  const [phase, setPhase] = useState("loading");
  const [capturedDataUrl, setCapturedDataUrl] = useState("");
  const [saveAsFilename, setSaveAsFilename] = useState(null);
  const [videoReady, setVideoReady] = useState(false);
  const streamRef = useRef(null);
  const videoRef = useRef(null);
  const fileInputRef = useRef(null);

  const stopAllCamera = () => {
    const s = streamRef.current;
    if (s) {
      s.getTracks().forEach((t) => t.stop());
    }
    streamRef.current = null;
    const v = videoRef.current;
    if (v) {
      v.srcObject = null;
    }
  };

  useEffect(() => {
    if (!open) {
      stopAllCamera();
      return;
    }
    setCapturedDataUrl("");
    setSaveAsFilename(null);
    setVideoReady(false);
    let cancelled = false;
    (async () => {
      setPhase("loading");
      try {
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false,
          });
        } catch {
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }
        if (cancelled) {
          stream.getTracks().forEach((t) => t.stop());
          return;
        }
        streamRef.current = stream;
        setPhase("live");
      } catch (_e) {
        if (!cancelled) {
          setPhase("error");
        }
      }
    })();
    return () => {
      cancelled = true;
      stopAllCamera();
    };
  }, [open]);

  useEffect(() => {
    if (!open || phase !== "live") return;
    const v = videoRef.current;
    const s = streamRef.current;
    if (v && s) {
      v.srcObject = s;
      v.play().catch(() => {});
    }
  }, [open, phase]);

  if (!open) return null;

  const handleDismiss = () => {
    stopAllCamera();
    onClose();
  };

  const handleSnap = () => {
    const video = videoRef.current;
    if (!video || video.videoWidth === 0) return;
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    setSaveAsFilename(null);
    setCapturedDataUrl(dataUrl);
    setPhase("preview");
    stopAllCamera();
  };

  const handleSave = () => {
    if (!capturedDataUrl) return;
    const item = {
      id: uid(),
      kind: "image",
      filename: saveAsFilename || `quick-capture-${Date.now()}.jpg`,
      dataUrl: capturedDataUrl,
      uploadedAt: new Date().toISOString(),
      context: { source: "quick-capture" },
    };
    updatePatient(patient.id, { media: [...(patient.media || []), item] });
    stopAllCamera();
    onClose();
  };

  const handleRetake = async () => {
    setCapturedDataUrl("");
    setSaveAsFilename(null);
    stopAllCamera();
    setVideoReady(false);
    setPhase("loading");
    try {
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false,
        });
      } catch {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      }
      streamRef.current = stream;
      setPhase("live");
    } catch (_e) {
      setPhase("error");
    }
  };

  const handleFileSelect = (e) => {
    const file = e.target.files && e.target.files[0];
    const inputEl = e.target;
    if (!file) return;
    const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
    if (isPdf) {
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        if (typeof dataUrl !== "string") {
          inputEl.value = "";
          return;
        }
        const item = {
          id: uid(),
          kind: "pdf",
          filename: file.name || `document-${Date.now()}.pdf`,
          dataUrl,
          uploadedAt: new Date().toISOString(),
          context: { source: "quick-capture" },
        };
        updatePatient(patient.id, { media: [...(patient.media || []), item] });
        inputEl.value = "";
        stopAllCamera();
        onClose();
      };
      reader.onerror = () => {
        inputEl.value = "";
      };
      reader.readAsDataURL(file);
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      if (typeof dataUrl !== "string") {
        inputEl.value = "";
        return;
      }
      setSaveAsFilename(file.name || `upload-${Date.now()}.jpg`);
      setCapturedDataUrl(dataUrl);
      setPhase("preview");
      stopAllCamera();
      inputEl.value = "";
    };
    reader.onerror = () => {
      inputEl.value = "";
    };
    reader.readAsDataURL(file);
  };

  let body;
  if (phase === "loading") {
    body = (
      <div style={{ textAlign: "center", padding: "24px 8px", color: T.ink, fontSize: 14 }}>
        <div>Requesting camera... · جارٍ طلب الكاميرا</div>
        <div style={{ display: "flex", justifyContent: "center", marginTop: 14 }}>
          <button type="button" onClick={handleDismiss} style={styles.iconBtn}>
            Cancel · إلغاء
          </button>
        </div>
      </div>
    );
  } else if (phase === "live") {
    body = (
      <div>
        <div style={{ maxWidth: "100%", borderRadius: 10, overflow: "hidden", background: "#000" }}>
          <video
            ref={videoRef}
            autoPlay
            muted
            playsInline
            onLoadedMetadata={() => setVideoReady(true)}
            style={{ display: "block", width: "100%", maxHeight: "60vh", objectFit: "contain" }}
          />
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 10, flexWrap: "wrap", marginTop: 12 }}>
          <button
            type="button"
            onClick={handleSnap}
            disabled={!videoReady}
            style={{
              ...styles.primaryBtn,
              ...(!videoReady ? { opacity: 0.45, cursor: "not-allowed" } : {}),
            }}>
            Snap · التقط
          </button>
          <button
            type="button"
            onClick={() => fileInputRef.current?.click()}
            style={styles.iconBtn}>
            Or upload file · أو رفع ملف
          </button>
          <button type="button" onClick={handleDismiss} style={styles.iconBtn}>
            Cancel · إلغاء
          </button>
        </div>
      </div>
    );
  } else if (phase === "preview") {
    body = (
      <div>
        <div style={{ maxWidth: "100%", borderRadius: 10, overflow: "hidden", background: T.paper }}>
          <img alt="" src={capturedDataUrl} style={{ display: "block", width: "100%", maxHeight: "60vh", objectFit: "contain" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 10, flexWrap: "wrap", marginTop: 12 }}>
          <button type="button" onClick={handleSave} style={styles.primaryBtn}>
            Save · حفظ
          </button>
          <button type="button" onClick={handleRetake} style={styles.iconBtn}>
            Retake · إعادة
          </button>
          <button type="button" onClick={handleDismiss} style={styles.iconBtn}>
            Cancel · إلغاء
          </button>
        </div>
      </div>
    );
  } else {
    body = (
      <div style={{ textAlign: "center", padding: "8px 4px" }}>
        <p style={{ margin: "0 0 16px", color: T.ink, fontSize: 14, lineHeight: 1.55 }}>
          Camera access denied or unavailable. · تم رفض الوصول للكاميرا أو غير متوفرة.
        </p>
        <div style={{ display: "flex", justifyContent: "center", gap: 10, flexWrap: "wrap" }}>
          <button type="button" onClick={handleDismiss} style={styles.iconBtn}>
            Close · إغلاق
          </button>
        </div>
      </div>
    );
  }

  return (
    <div
      onClick={handleDismiss}
      style={{
        position: "fixed",
        inset: 0,
        background: hexAlpha(T.ink, 0.45),
        display: "grid",
        placeItems: "center",
        zIndex: 9999,
        padding: 20,
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: T.card,
          borderRadius: 14,
          width: "100%",
          maxWidth: 560,
          maxHeight: "92vh",
          overflow: "auto",
          boxShadow: `0 20px 60px ${hexAlpha(T.ink, 0.3)}`,
        }}>
        <div style={{
          padding: "14px 18px",
          borderBottom: `1px solid ${T.lineSoft}`,
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
        }}>
          <strong style={{ fontFamily: "'Fraunces', Georgia, serif", fontSize: 16 }}>
            Quick capture · التقاط سريع
          </strong>
          <button type="button" onClick={handleDismiss} style={styles.iconBtn}>
            <X size={13} strokeWidth={1.8} />
          </button>
        </div>
        <div style={{ padding: 18 }}>
          {body}
          <input
            ref={fileInputRef}
            type="file"
            accept="image/*,application/pdf"
            style={{ display: "none" }}
            onChange={handleFileSelect}
          />
        </div>
      </div>
    </div>
  );
}

function WaitingQueuePanel({
  appts, patients, currentPatientId, onOpenPatient, open, onClose,
  appSettings, setAppSettings, setAppts,
}) {
  const [draggedApptId, setDraggedApptId] = useState(null);
  const [dragOverApptId, setDragOverApptId] = useState(null);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  useEffect(() => {
    if (!open) {
      setDraggedApptId(null);
      setDragOverApptId(null);
    }
  }, [open]);

  const today = todayISO();
  const manualOrder = appSettings?.queueOrder?.[today] || null;

  const queueRows = useMemo(() => {
    const defaultSort = (a, b) => {
      const ta = a.appt.checkedInAt || a.appt.slot || "";
      const tb = b.appt.checkedInAt || b.appt.slot || "";
      if (ta && tb && ta !== tb) return ta.localeCompare(tb);
      return (a.appt.id || "").localeCompare(b.appt.id || "");
    };
    const rows = (appts || [])
      .filter((a) => a.date === today && a.status === "checked-in")
      .map((a) => {
        const p = (patients || []).find((pp) => pp.id === a.patientId);
        return p ? { appt: a, patient: p } : null;
      })
      .filter(Boolean);
    if (!manualOrder || manualOrder.length === 0) {
      rows.sort(defaultSort);
      return rows;
    }
    const inManual = new Set(manualOrder);
    const byId = {};
    rows.forEach((r) => { byId[r.appt.id] = r; });
    const ordered = [];
    manualOrder.forEach((id) => {
      const r = byId[id];
      if (r) ordered.push(r);
    });
    const rest = rows.filter((r) => !inManual.has(r.appt.id));
    rest.sort(defaultSort);
    return [...ordered, ...rest];
  }, [appts, patients, today, manualOrder]);

  const onMarkDone = (apptId) => {
    if (!setAppts) return;
    setAppts((arr) => arr.map((a) => (a.id === apptId ? { ...a, status: "completed" } : a)));
    if (manualOrder && manualOrder.includes(apptId) && setAppSettings) {
      setAppSettings((prev) => {
        const updated = { ...(prev.queueOrder || {}) };
        updated[today] = (updated[today] || []).filter((id) => id !== apptId);
        return { ...prev, queueOrder: updated };
      });
    }
  };

  const onDropOnRow = (targetApptId) => {
    if (!draggedApptId || draggedApptId === targetApptId || !setAppSettings) return;
    const ids = queueRows.map(({ appt }) => appt.id);
    if (!ids.includes(draggedApptId) || !ids.includes(targetApptId)) return;
    const next = ids.filter((id) => id !== draggedApptId);
    const insertAt = next.indexOf(targetApptId);
    if (insertAt < 0) return;
    next.splice(insertAt, 0, draggedApptId);
    setAppSettings((prev) => ({
      ...prev,
      queueOrder: { ...(prev.queueOrder || {}), [today]: next },
    }));
    setDragOverApptId(null);
  };

  const resetQueueOrder = () => {
    if (!setAppSettings) return;
    setAppSettings((prev) => {
      const q = { ...(prev.queueOrder || {}) };
      delete q[today];
      return { ...prev, queueOrder: q };
    });
  };

  const waitedLabel = (appt) => {
    const stamp = appt.checkedInAt;
    if (!stamp) {
      if (!appt.slot) return "—";
      const slotMs = new Date(`${today}T${appt.slot}:00`).getTime();
      const now = Date.now();
      const mins = Math.max(0, Math.floor((now - slotMs) / 60000));
      return `${mins} min`;
    }
    const stampMs = new Date(stamp).getTime();
    const mins = Math.max(0, Math.floor((Date.now() - stampMs) / 60000));
    if (mins < 60) return `${mins} min`;
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return `${h}h ${m}m`;
  };

  if (!open) return null;

  const dateLine = fmtDate(today);
  const hasManualOrder = Array.isArray(manualOrder) && manualOrder.length > 0;

  return (
    <>
      <div
        onClick={onClose}
        style={{
          position: "fixed", inset: 0,
          background: hexAlpha(T.ink, 0.32),
          zIndex: 239,
          animation: "briefingFade 0.18s ease",
        }}
      />
      <div
        role="dialog"
        aria-label="Waiting queue"
        style={{
          position: "fixed", top: 0, right: 0, bottom: 0,
          width: "min(360px, 92vw)",
          background: T.card,
          zIndex: 240,
          boxShadow: `-8px 0 28px ${hexAlpha(T.ink, 0.16)}`,
          display: "flex", flexDirection: "column",
          animation: "briefingSlide 0.22s cubic-bezier(.2,.8,.2,1)",
        }}>
        <div style={{
          padding: "12px 16px",
          borderBottom: `1px solid ${T.lineSoft}`,
          background: `linear-gradient(180deg, ${hexAlpha(T.teal, 0.07)} 0%, ${hexAlpha(T.teal, 0.02)} 100%)`,
          display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10,
        }}>
          <div style={{ minWidth: 0 }}>
            <div style={{
              fontSize: 15, fontWeight: 700, color: T.tealDeep,
              letterSpacing: "-0.01em",
              display: "flex", alignItems: "center", gap: 6,
            }}>
              <Users size={14} strokeWidth={1.7} />
              Waiting Queue · قائمة الانتظار
            </div>
            <div style={{ fontSize: 11, color: T.inkSoft, marginTop: 4, fontWeight: 600 }}>
              {dateLine}
            </div>
            {hasManualOrder ? (
              <button
                type="button"
                onClick={resetQueueOrder}
                style={{
                  marginTop: 8,
                  ...styles.miniBtn,
                  fontSize: 10.5,
                  padding: "4px 10px",
                  alignSelf: "flex-start",
                }}>
                Reset to arrival order · إعادة الترتيب الافتراضي
              </button>
            ) : null}
          </div>
          <button
            type="button"
            onClick={onClose}
            style={styles.iconBtn}
            title="Close (Esc)">
            <X size={13} strokeWidth={1.8} />
          </button>
        </div>
        <div style={{
          flex: 1, minHeight: 0, overflow: "hidden",
          background: T.paper,
          display: "flex",
          flexDirection: "column",
        }}>
          {queueRows.length > 0 && (
            <div style={{
              fontSize: 11, color: T.inkSoft, padding: "8px 16px",
              borderBottom: `1px solid ${T.lineSoft}`,
            }}>
              {queueRows.length} patient(s) waiting · {queueRows.length} في الانتظار
            </div>
          )}
          <div style={{ flex: 1, minHeight: 0, overflow: "auto", display: "flex", flexDirection: "column" }}>
            {queueRows.length === 0 ? (
              <div style={{
                flex: 1, display: "flex", flexDirection: "column",
                alignItems: "center", justifyContent: "center",
                textAlign: "center", gap: 10, padding: "20px 16px",
              }}>
                <Users size={32} strokeWidth={1.5} color={T.inkSoft} />
                <div style={{ fontSize: 13, color: T.inkSoft, fontWeight: 600, lineHeight: 1.55 }}>
                  No patients waiting · لا توجد مرضى في الانتظار
                </div>
              </div>
            ) : (
              queueRows.map(({ appt, patient: p }) => {
                const isActive = p.id === currentPatientId;
                const age = ageFromDOB(p.dob);
                const nameEn = p.nameEn || "—";
                const isDropTarget = dragOverApptId === appt.id && draggedApptId && draggedApptId !== appt.id;
                return (
                  <div
                    key={appt.id}
                    draggable
                    onDragStart={(e) => {
                      e.dataTransfer.effectAllowed = "move";
                      e.dataTransfer.setData("text/plain", appt.id);
                      setDraggedApptId(appt.id);
                    }}
                    onDragOver={(e) => {
                      e.preventDefault();
                      e.dataTransfer.dropEffect = "move";
                      setDragOverApptId(appt.id);
                    }}
                    onDragLeave={() => {
                      setDragOverApptId((cur) => (cur === appt.id ? null : cur));
                    }}
                    onDrop={(e) => {
                      e.preventDefault();
                      onDropOnRow(appt.id);
                    }}
                    onDragEnd={() => {
                      setDraggedApptId(null);
                      setDragOverApptId(null);
                    }}
                    style={{
                      display: "flex", justifyContent: "space-between", alignItems: "flex-start",
                      gap: 10, padding: "12px 16px",
                      borderBottom: `1px solid ${T.lineSoft}`,
                      cursor: "default",
                      ...(isActive ? {
                        borderLeft: `3px solid ${T.teal}`,
                        background: hexAlpha(T.teal, 0.05),
                      } : {}),
                      ...(isDropTarget ? {
                        boxShadow: `inset 0 3px 0 0 ${T.teal}`,
                        background: hexAlpha(T.teal, 0.08),
                      } : {}),
                    }}>
                    <span
                      style={{
                        display: "flex", alignItems: "flex-start", flexShrink: 0,
                        color: T.inkSoft, paddingTop: 2, cursor: "grab",
                        fontSize: 12, letterSpacing: -1, userSelect: "none", lineHeight: 1,
                      }}
                      title="Drag to reorder">
                      {GripVertical ? <GripVertical size={14} strokeWidth={1.8} /> : "⋮⋮"}
                    </span>
                    <div style={{ minWidth: 0, flex: 1 }}>
                      <div style={{ fontSize: 13, lineHeight: 1.35 }}>
                        <span style={{ fontWeight: 700, color: T.ink }}>{nameEn}</span>
                        <span style={{ color: T.inkSoft, fontWeight: 500 }}>{` · ${age} y`}</span>
                      </div>
                      {p.nameAr ? (
                        <div style={{
                          fontSize: 12, color: T.inkSoft, marginTop: 3,
                          direction: "rtl", textAlign: "right",
                        }}>{p.nameAr}</div>
                      ) : null}
                      <div style={{ fontSize: 12, color: T.inkSoft, marginTop: 6, opacity: 0.92 }}>
                        {appt.reason || "—"}
                      </div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8, flexShrink: 0 }}>
                      <span style={{
                        padding: "4px 10px", borderRadius: 999,
                        background: T.tealSoft, color: T.tealDeep,
                        fontSize: 11, fontWeight: 700, whiteSpace: "nowrap",
                      }}>{waitedLabel(appt)}</span>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "flex-end" }}>
                        <button
                          type="button"
                          style={{
                            ...styles.miniBtn,
                            background: T.tealSoft,
                            color: T.tealDeep,
                            borderColor: hexAlpha(T.teal, 0.35),
                          }}
                          onClick={() => onMarkDone(appt.id)}>
                          <Check size={11} strokeWidth={2} style={{ verticalAlign: "-2px", marginRight: 4 }} />
                          Done · تم
                        </button>
                        <button
                          type="button"
                          style={styles.miniBtn}
                          onClick={() => {
                            onOpenPatient(p.id);
                            onClose();
                          }}>
                          Open chart · فتح الملف
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      </div>
    </>
  );
}

// ============================================================
// STICKY HEADER (extended with patientId + Media button)
// ============================================================
function StickyHeader({ patient, updatePatient, onClose, onComplete, onOpenMedia, onOpenBriefing, briefingOpen, briefing, onScheduleSurgery, surgeryCount, sidebarOpen, onToggleSidebar, obsHistoryOpen, onToggleObsHistory, activeObsEpisode, activeEpisodeKind, activeEpisodeData, appts, patients, setAppts, appSettings, setAppSettings, onOpenPatient }) {
  const skipNudgeRef = useRef(false);
  const [quickCaptureOpen, setQuickCaptureOpen] = useState(false);
  const [editing, setEditing] = useState(false);
  const [remindersOpen, setRemindersOpen] = useState(false);
  const [editProfileOpen, setEditProfileOpen] = useState(false);
  const [waitingQueueOpen, setWaitingQueueOpen] = useState(false);
  const [closeNudgeOpen, setCloseNudgeOpen] = useState(false);
  const age = ageFromDOB(patient.dob);
  const mediaCount = (patient.media || []).length;
  const remindersUndone = (patient.reminders || []).filter((r) => r.status !== "done").length;
  const waitingQueueCheckedInCount = (appts || []).filter((a) => a.date === todayISO() && a.status === "checked-in").length;
  const hasOpenCheckIn = (appts || []).some((a) => a.patientId === patient?.id && a.date === todayISO() && a.status === "checked-in");
  const showObsMath = activeEpisodeKind === "Obstetrics";
  const showInfContext = isInfertilityHeaderKind(activeEpisodeKind);
  const showOiBanner = activeEpisodeKind === "IVF Stim";
  const showFetBanner = activeEpisodeKind === "FET";
  const showSurgeryBanner = activeEpisodeKind === "Surgery";
  const infHeaderSum = useMemo(() => buildInfertilityHeaderSummary(activeEpisodeData), [activeEpisodeData]);
  const liveGpa = useMemo(() => {
    const pp = patient?.priorPregnancies;
    const oh = patient?.obstetricsHistory;
    const obstetricsRows = (Array.isArray(pp) && pp.length > 0) ? pp
      : ((Array.isArray(oh) && oh.length > 0) ? oh : []);
    if (obstetricsRows.length > 0 && typeof computeGPAFromHistory === "function") {
      const counts = computeGPAFromHistory(obstetricsRows);
      // During an active Obstetrics visit, gravidity includes every prior pregnancy
      // row (any outcome); P/A remain the typed subset (NVD/CS · Miscarriage/Abortion).
      const gLive = activeObsEpisode ? obstetricsRows.length + 1 : counts.g;
      return { ...counts, g: gLive };
    }
    const gpa = patient?.gpa || {};
    if (activeObsEpisode) {
      return {
        g: Math.max(1, Number(gpa.g ?? patient?.g ?? 0)),
        p: Number(gpa.p ?? patient?.p ?? 0),
        a: Number(gpa.a ?? patient?.a ?? 0),
      };
    }
    return {
      g: Number(gpa.g ?? patient?.g ?? 0),
      p: Number(gpa.p ?? patient?.p ?? 0),
      a: Number(gpa.a ?? patient?.a ?? 0),
    };
  }, [patient, activeObsEpisode]);

  const isHeaderFlagged = (key) => isFlaggedSource(patient, `header:${key}`);

  const renderFlagBtn = (key, getLabel, getText) => (
    <FlagButton
      patient={patient} updatePatient={updatePatient}
      source={`header:${key}`}
      getText={getText}
      getLabel={getLabel}
    />
  );

  // v7 — count of "signal" items the briefing surfaced (deltas + alerts).
  // Used as a tiny badge on the Briefing button so the doctor knows at a
  // glance whether opening the drawer will reveal anything new.
  const briefingSignals = (() => {
    if (!briefing) return 0;
    const d = briefing.deltas || {};
    let n = 0;
    if (d.bp) n++;
    if (d.weight) n++;
    n += (d.labs || []).length;
    n += (patient.alerts || []).length;
    return n;
  })();

  const handleStickyBack = () => {
    if (hasOpenCheckIn && !skipNudgeRef.current) setCloseNudgeOpen(true);
    else onClose();
  };

  return (
    <div style={styles.clinicalHeaderFixedInner}>
      <div style={styles.stickyTop}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={handleStickyBack} style={styles.backBtn}>
            <ChevronLeft size={14} strokeWidth={1.8} /> Waiting room
          </button>
          {/* Episodes sidebar toggle (hamburger / drawer) */}
          {onToggleSidebar && (
            <button
              onClick={onToggleSidebar}
              style={{
                ...styles.iconBtn,
                background: sidebarOpen ? T.tealSoft : T.card,
                color: sidebarOpen ? T.tealDeep : T.ink,
                borderColor: sidebarOpen ? T.teal : T.line,
              }}
              title={sidebarOpen ? "Hide Episodes panel · إخفاء" : "Show Episodes panel · إظهار"}>
              <Menu size={14} strokeWidth={2} />
              <span style={{ marginLeft: 6, fontSize: 12 }}>
                {sidebarOpen ? "Hide" : "Episodes"}
              </span>
            </button>
          )}
        </div>
        <div className="exam-sticky-actions" style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {/* v7 — Clinical Briefing button. Opens the right-side
              Hybrid AI summary drawer. Lit up when there are deltas
              or active flags to read. */}
          {onOpenBriefing && (
            <button
              onClick={onOpenBriefing}
              style={{
                ...styles.iconBtn,
                background: briefingOpen
                  ? T.tealDeep
                  : (briefingSignals > 0 ? T.tealSoft : T.card),
                color: briefingOpen
                  ? "#fff"
                  : (briefingSignals > 0 ? T.tealDeep : T.ink),
                borderColor: briefingOpen
                  ? T.tealDeep
                  : (briefingSignals > 0 ? T.teal : T.line),
                position: "relative",
              }}
              title="Clinical Briefing · الموجز السريري">
              <Sparkles size={13} strokeWidth={1.8} />
              <span style={{ marginLeft: 6, fontSize: 12, fontWeight: 700 }}>
                Briefing
              </span>
              {briefingSignals > 0 && !briefingOpen && (
                <span style={{
                  marginLeft: 6,
                  minWidth: 18, height: 18, padding: "0 5px",
                  borderRadius: 999,
                  background: T.tealDeep, color: "#fff",
                  fontSize: 10.5, fontWeight: 700,
                  display: "inline-flex", alignItems: "center", justifyContent: "center",
                }}>
                  {briefingSignals}
                </span>
              )}
            </button>
          )}
          {/* v7.6 — Global Schedule Surgery button. Sits on the Sticky
              Header so it's reachable from every template. Auto-fills
              the current patient's name + ID into the modal. */}
          {onScheduleSurgery && (
            <button
              onClick={onScheduleSurgery}
              style={{
                ...styles.iconBtn,
                background: surgeryCount > 0 ? T.roseSoft : T.card,
                color: surgeryCount > 0 ? T.rose : T.ink,
                borderColor: surgeryCount > 0 ? T.rose : T.line,
                position: "relative",
              }}
              title="Schedule Surgery · حجز عملية">
              <Syringe size={13} strokeWidth={1.8} />

                  background: T.rose, color: "#fff",
                  fontSize: 10.5, fontWeight: 700,
                  display: "inline-flex", alignItems: "center", justifyContent: "center",

                  {surgeryCount}
                </span>
              )}
            </button>
          )}
          <button onClick={onOpenMedia} style={{
            ...styles.iconBtn,
            background: mediaCount > 0 ? T.ochreSoft : T.card,
            color: mediaCount > 0 ? T.ochre : T.ink,

              Media{mediaCount > 0 ? ` · ${mediaCount}` : ""}

          </button>
          <button
            type="button"
            onClick={() => setRemindersOpen(true)}
            style={{
              ...styles.iconBtn,
              background: remindersUndone > 0 ? T.ochreSoft : T.card,
              color: remindersUndone > 0 ? T.ochre : T.ink,
              borderColor: remindersUndone > 0 ? T.ochre : T.line,
              position: "relative",
            }}
            title="Reminders · التذكيرات">
            <Bell size={13} strokeWidth={1.8} />
            <span style={{ marginLeft: 6, fontSize: 12 }}>
              Reminders
            </span>
            {remindersUndone > 0 && (
              <span style={{
                marginLeft: 6,
                minWidth: 18, height: 18, padding: "0 5px",
                borderRadius: 999,
                background: T.ochre, color: "#fff",
                fontSize: 10.5, fontWeight: 700,
                display: "inline-flex", alignItems: "center", justifyContent: "center",
              }}>
                {remindersUndone}
              </span>
            )}
          </button>
          <button
            type="button"
            onClick={() => setWaitingQueueOpen(true)}
            style={{
              ...styles.iconBtn,
              background: waitingQueueCheckedInCount > 0 ? T.ochreSoft : T.card,
              color: waitingQueueCheckedInCount > 0 ? T.ochre : T.ink,
              borderColor: waitingQueueCheckedInCount > 0 ? T.ochre : T.line,
              position: "relative",
            }}
            title="Waiting queue · قائمة الانتظار">
            <Users size={13} strokeWidth={1.8} />
            <span style={{ marginLeft: 6, fontSize: 12 }}>
              Queue
            </span>
            {waitingQueueCheckedInCount > 0 && (
              <span style={{
                marginLeft: 6,
                minWidth: 18, height: 18, padding: "0 5px",
                borderRadius: 999,
                background: T.ochre, color: "#fff",
                fontSize: 10.5, fontWeight: 700,
                display: "inline-flex", alignItems: "center", justifyContent: "center",
              }}>
                {waitingQueueCheckedInCount}
              </span>
            )}
          </button>
          <button onClick={() => setEditing(!editing)} style={styles.iconBtn}>
            {editing ? <Save size={13} strokeWidth={1.8} /> : <Edit3 size={13} strokeWidth={1.8} />}
            <span style={{ marginLeft: 6, fontSize: 12 }}>{editing ? "Lock" : "Edit"}</span>

          <button onClick={onComplete} style={styles.primaryBtn}>

          <div style={{ display: "inline-flex", alignItems: "center", marginLeft: 8 }}>
            <button
              type="button"
              onClick={() => setQuickCaptureOpen(true)}
              style={{
                ...styles.iconBtn,
                background: T.tealSoft,
                color: T.tealDeep,
                borderColor: T.teal,
              }}
              title="Quick capture · التقاط سريع">
              <Camera size={13} strokeWidth={1.8} />
            </button>
          </div>
        </div>
      </div>

      <RemindersPanel
        patient={patient}
        open={remindersOpen}
        onClose={() => setRemindersOpen(false)}
      />

      <EditProfileModal
        patient={patient}
        updatePatient={updatePatient}
        open={editProfileOpen}
        onClose={() => setEditProfileOpen(false)}
      />

      <QuickCaptureModal
        patient={patient}
        updatePatient={updatePatient}
        open={quickCaptureOpen}
        onClose={() => setQuickCaptureOpen(false)}
      />

      <WaitingQueuePanel
        appts={appts}
        patients={patients}
        currentPatientId={patient?.id}
        onOpenPatient={onOpenPatient}
        open={waitingQueueOpen}
        onClose={() => setWaitingQueueOpen(false)}
        appSettings={appSettings}
        setAppSettings={setAppSettings}
        setAppts={setAppts}

      <CloseNudgeModal

        onCancel={() => setCloseNudgeOpen(false)}
        onNo={(dontAskSession) => {
          if (dontAskSession) skipNudgeRef.current = true;
          setCloseNudgeOpen(false);
          onClose();
        }}
        onYes={(dontAskSession) => {
          if (dontAskSession) skipNudgeRef.current = true;
          const tid = todayISO();
          if (setAppts) {
            setAppts((arr) => arr.map((a) =>
              (a.patientId === patient?.id && a.date === tid && a.status === "checked-in")

          setCloseNudgeOpen(false);
          onClose();
        }}
      />

      <AlertStrip patient={patient} updatePatient={updatePatient} />

      <div style={styles.stickyMain}>

          {editing && (
            <button
              type="button"
              onClick={() => setEditProfileOpen(true)}
              style={{
                marginTop: 6,
                padding: 0,
                border: "none",

        <HeaderField

              <span style={{ ...styles.headerVal, ...(isHeaderFlagged("age") ? { color: T.flag, background: T.flagBg, padding: "2px 8px", borderRadius: 6 } : {}) }}>

              {showObsMath && (
              <span
                title="Derived GPA — from prior pregnancy table (G adds this pregnancy while an Obstetrics visit is open)"
                style={{
                  display: "inline-flex",
                  alignItems: "center",
                  padding: "3px 9px",
                  borderRadius: 999,
                  border: `1px solid ${hexAlpha(T.teal, 0.35)}`,
                  background: T.tealSoft,
                  color: T.tealDeep,
                  fontSize: 11,
                  fontWeight: 700,
                  letterSpacing: 0.2,
                  lineHeight: 1.2,
                  whiteSpace: "nowrap",
                }}
              >
                G:{liveGpa.g} P:{liveGpa.p} A:{liveGpa.a}
              </span>

              {showOiBanner && (
              <span
                title="Cycle day calculation arrives in a later slice"
                style={{
                  display: "inline-flex",
                  alignItems: "center",
                  padding: "3px 9px",
                  borderRadius: 999,
                  border: `1px solid ${hexAlpha(T.coral, 0.35)}`,
                  background: T.coralSoft,
                  color: T.coral,
                  fontSize: 11,
                  fontWeight: 700,
                  letterSpacing: 0.2,
                  lineHeight: 1.2,
                  whiteSpace: "nowrap",
                }}
              >
                OI cycle · Day —
              </span>
              )}
              {showFetBanner && (
              <span
                title="Cycle day calculation arrives in a later slice"
                style={{
                  display: "inline-flex",
                  alignItems: "center",
                  padding: "3px 9px",
                  borderRadius: 999,
                  border: `1px solid ${hexAlpha(T.ochre, 0.35)}`,
                  background: T.ochreSoft,
                  color: T.ochre,
                  fontSize: 11,
                  fontWeight: 700,
                  letterSpacing: 0.2,
                  lineHeight: 1.2,
                  whiteSpace: "nowrap",
                }}
              >
                FET cycle · Day —
              </span>
              )}
              {showSurgeryBanner && (
              <span
                style={{
                  display: "inline-flex",
                  alignItems: "center",
                  padding: "3px 9px",
                  borderRadius: 999,
                  border: `1px solid ${hexAlpha(T.rose, 0.35)}`,
                  background: T.roseSoft,
                  color: T.rose,
                  fontSize: 11,
                  fontWeight: 700,
                  letterSpacing: 0.2,
                  lineHeight: 1.2,
                  whiteSpace: "nowrap",
                }}
              >
                {`Surgery · ${activeEpisodeData?.procedure || "scheduled"}`}
              </span>

            </span>
          )}
        </HeaderField>

        {showInfContext ? (
          <div style={{ ...styles.headerField, minWidth: 220, maxWidth: 420, flex: "1 1 280px" }}>
            <div style={styles.headerLabel}>Infertility · Couple snapshot</div>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.ink, lineHeight: 1.45 }}>
              <span style={{ color: T.inkSoft, fontWeight: 700, fontSize: 10, letterSpacing: 0.5, textTransform: "uppercase", display: "block", marginBottom: 2 }}>Duration</span>

            </div>
            <div style={{ fontSize: 11.5, color: T.ink, lineHeight: 1.45, marginTop: 6, wordBreak: "break-word" }}>
              <span style={{ color: T.inkSoft, fontWeight: 700, fontSize: 10, letterSpacing: 0.5, textTransform: "uppercase", display: "block", marginBottom: 2 }}>Couple factors · Glance</span>
              {infHeaderSum.factorsPreview}
            </div>
          </div>
        ) : (
        <HeaderField
          patient={patient} updatePatient={updatePatient}
          fieldKey="gpa" defaultLabel="GPA"
          flagButton={renderFlagBtn("gpa",
            () => getFieldLabel(patient, "header", "gpa", "GPA"),
            () => `G${patient.gpa.g} P${patient.gpa.p} A${patient.gpa.a}`

          {editing ? (
            <div style={{ display: "flex", gap: 4 }}>
              {["g", "p", "a"].map(k => (
                <input key={k} type="number" min={0} style={{ ...styles.headerInput, width: 36, textAlign: "center" }}
                  value={patient.gpa?.[k] ?? 0} onChange={(e) => updatePatient(patient.id, { gpa: { ...patient.gpa, [k]: Number(e.target.value) } })} />
              ))}
            </div>
          ) : (
            <span style={{ ...styles.headerVal, ...(isHeaderFlagged("gpa") ? { color: T.flag, background: T.flagBg, padding: "2px 8px", borderRadius: 6 } : {}) }}>

        <HeaderField
          patient={patient} updatePatient={updatePatient}

            </select>
          ) : (
            <span style={{
              ...styles.headerVal,
              ...((isRhNegative(patient.bloodGroup) || isHeaderFlagged("bloodGroup"))

            }}>
              {patient.bloodGroup || "—"}
              {isRhNegative(patient.bloodGroup) && <span style={{ fontSize: 10, marginLeft: 6, fontWeight: 700, letterSpacing: 0.4 }}>Rh−</span>}
            </span>
          )}
        </HeaderField>

        {showObsMath && <ObsGAPill patient={patient} />}

        <HeaderField

function HeaderExtraField({ patient, updatePatient, extra, editing }) {
  const [labelEditing, setLabelEditing] = useState(false);
  const flagged = isFlaggedSource(patient, `header:extra:${extra.id}`);
  const updateExtra = (patch) => {
    const next = (patient.headerExtras || []).map(x => x.id === extra.id ? { ...x, ...patch } : x);
    updatePatient(patient.id, { headerExtras: next });
  };
  const removeExtra = () => {
    const next = (patient.headerExtras || []).filter(x => x.id !== extra.id);
    updatePatient(patient.id, { headerExtras: next });
    removeAlert(patient, updatePatient, `header:extra:${extra.id}`);
  };
  useFlaggedAlertSync(patient, updatePatient, `header:extra:${extra.id}`, extra.label, extra.value);

  return (
    <div style={{ ...styles.headerField, minWidth: 140 }}>
      <div style={styles.headerLabel}>
        {labelEditing ? (
          <input
            autoFocus
            defaultValue={extra.label}
            onBlur={(e) => { updateExtra({ label: e.target.value }); setLabelEditing(false); }}
            onKeyDown={(e) => {
              if (e.key === "Enter") { updateExtra({ label: e.target.value }); setLabelEditing(false); }
              if (e.key === "Escape") setLabelEditing(false);
            }}
            style={{
              padding: "1px 5px", border: `1px solid ${T.teal}`, borderRadius: 4,
              fontSize: 10, fontWeight: 600, background: T.tealSoft, color: T.tealDeep,
              letterSpacing: 0.6, textTransform: "uppercase", outline: "none", maxWidth: 110,
            }}
          />
        ) : (
          <button
            type="button"
            onClick={() => setLabelEditing(true)}
            title="Rename"
            style={{
              padding: "0 3px", border: "1px dashed transparent",
              background: "transparent", color: T.inkSoft,
              fontSize: 10, fontWeight: 600,
              letterSpacing: 0.6, textTransform: "uppercase",
              cursor: "text", borderRadius: 3,
            }}>
            {extra.label || "Label"}
          </button>
        )}
        <FlagButton
          patient={patient} updatePatient={updatePatient}

function HeaderAddField({ patient, updatePatient }) {
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState("");

  const commit = () => {
    const label = draft.trim();
    if (!label) { setAdding(false); return; }
    const next = [...(patient.headerExtras || []), { id: uid(), label, value: "" }];
    updatePatient(patient.id, { headerExtras: next });
    setDraft("");
    setAdding(false);
  };

  if (adding) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 4, alignSelf: "flex-end", paddingBottom: 2 }}>
        <input
          autoFocus
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter") commit();
            if (e.key === "Escape") { setDraft(""); setAdding(false); }
          }}
          placeholder="New field name…"
          style={{
            padding: "5px 8px", border: `1px solid ${T.teal}`, borderRadius: 6,
            background: T.card, fontSize: 11.5, color: T.ink,
            outline: "none", width: 140,
          }}

          <X size={10} strokeWidth={1.8} />
        </button>
      </div>
    );
  }
  return (
    <button
      onClick={() => setAdding(true)}
      title="Add header field"
      style={{
        alignSelf: "flex-end", marginBottom: 2,
        padding: "5px 10px", borderRadius: 6,

function formatTimelineCard(ep) {
  switch (ep.kind) {
    case "Obstetrics":
      return `Pregnancy · ${ep.summary || "in progress"}`;
    case "Infertility":
      return `Infertility · ${ep.summary || "workup"}`;
    case "IVF Stim":
      return `OI/ICSI · ${ep.summary || "stimulation"}`;
    case "FET":
      return `FET · ${ep.summary || "cycle"}`;
    case "Gynecology":
      return `Gynae · ${ep.summary || "visit"}`;
    default:
      return `${ep.kind} · ${ep.summary || "—"}`;
  }
}

function isInfertilityHeaderKind(kind) {
  return kind === "Infertility" || kind === "IVF Stim" || kind === "FET";
}

/** Open cycle: explicit isActive !== false and not legacy closed. */
function hubCycleIsOpen(c) {
  if (!c) return false;
  if (c.isActive === false) return false;
  if (c.status === "closed") return false;
  return true;
}

function hubCycleIsComplete(c) {
  if (!c) return false;
  return c.isActive === false || c.status === "closed";
}

function buildInfertilityHeaderSummary(episodeData) {
  const d = episodeData || {};
  const dur = (d.duration || "").trim();
  const parts = [
    d.glanceMaleCasa && `♂ ${String(d.glanceMaleCasa).trim().slice(0, 72)}`,
    d.glanceFemaleFactors && `♀ ${String(d.glanceFemaleFactors).trim().slice(0, 72)}`,
    d.glancePrevArt && `ART ${String(d.glancePrevArt).trim().slice(0, 72)}`,
  ].filter(Boolean);
  return {
    durationLabel: dur ? `${dur} y` : "—",
    factorsPreview: parts.length ? parts.join(" · ") : "—",
  };
}

const setData = (update, ep, patch) => update({ data: { ...(ep.data || {}), ...patch } });

function EditableLabel({
  patient, updatePatient, scope, fieldKey, defaultLabel,
  flagButton, freeValue, freeOnChange,
}) {
  const [editing, setEditing] = useState(false);
  const isFree = typeof freeOnChange === "function";
  const display = isFree
    ? (freeValue || defaultLabel || "")
    : getFieldLabel(patient, scope, fieldKey, defaultLabel);

  const save = (next) => {
    if (isFree) freeOnChange(next);
    else setFieldLabel(patient, updatePatient, scope, fieldKey, next);
    setEditing(false);
  };

  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 6,
      marginBottom: 5, minHeight: 18,
    }}>
      {editing ? (
        <input
          autoFocus
          defaultValue={display}
          onBlur={(e) => save(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter") save(e.target.value);
            if (e.key === "Escape") setEditing(false);
          }}
          style={{
            padding: "1px 5px", border: `1px solid ${T.teal}`,
            borderRadius: 4, fontSize: 11, fontWeight: 600,
            background: T.tealSoft, color: T.tealDeep,
            letterSpacing: 0.4, textTransform: "uppercase",
            outline: "none", maxWidth: 200,

      ) : (
        <button
          type="button"
          onClick={() => setEditing(true)}
          title="Rename"
          style={{
            padding: "1px 4px", border: "1px dashed transparent",
            background: "transparent", color: T.inkSoft,
            fontSize: 11, fontWeight: 600,
            letterSpacing: 0.4, textTransform: "uppercase",
            cursor: "text", borderRadius: 4,
          }}>
          {display}
        </button>
      )}
      {flagButton}
    </div>
  );
}

function FlagButton({ patient, updatePatient, source, getText, getLabel }) {
  const flagged = isFlaggedSource(patient, source);
  const toggle = (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (flagged) {
      removeAlert(patient, updatePatient, source);
    } else {
      const text = (typeof getText === "function" ? getText() : "") || "";
      const label = (typeof getLabel === "function" ? getLabel() : "") || "";
      upsertAlert(patient, updatePatient, {
        source, label, text: text || "(empty)",

  };
  return (
    <button
      type="button"
      onClick={toggle}
      title={flagged ? "Unflag" : "Flag"}

// ============================================================
// InlineFlag — slim flag chip for clinical input cells.
// Renders as a 16px button next to a value; sends the current
// label + value to the patient.alerts store so it appears in the
// AlertStrip rail above the sticky header. Re-syncs label/text
// whenever the bound value changes (via useFlaggedAlertSync), so
// the rail always shows the latest reading.
// ============================================================
function InlineFlag({ patient, updatePatient, source, label, value, size = 11 }) {
  // Keep alert text in sync with current value while flagged
  useFlaggedAlertSync(patient, updatePatient, source, label, value);
  const flagged = isFlaggedSource(patient, source);
  const toggle = (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (flagged) {
      removeAlert(patient, updatePatient, source);
    } else {
      upsertAlert(patient, updatePatient, {
        source,
        label: label || "",
        text: (value && String(value).trim()) || "(empty)",
      });
    }
  };
  return (
    <button
      type="button"
      onClick={toggle}
      title={flagged ? `Unflag — remove from header (${label})` : `Flag — pin to header (${label})`}
      style={{
        width: size + 8, height: size + 8, borderRadius: 4,
        border: flagged ? `1px solid ${T.flag}` : `1px solid ${T.lineSoft}`,
        background: flagged ? T.flagBg : "transparent",
        color: flagged ? T.flag : T.inkSoft,
        opacity: flagged ? 1 : 0.55,
        display: "inline-grid", placeItems: "center",
        cursor: "pointer", flexShrink: 0,
        padding: 0,
        transition: "all 0.12s",
      }}>
      <Flag size={size} strokeWidth={2} fill={flagged ? T.flag : "none"} />
    </button>
  );
}


function useFlaggedAlertSync(patient, updatePatient, source, label, text) {
  useEffect(() => {
    if (!patient.alerts) return;
    const existing = patient.alerts.find(a => a.source === source);
    if (!existing) return;
    if (existing.text === (text || "(empty)") && existing.label === label) return;
    upsertAlert(patient, updatePatient, { source, label, text: text || "(empty)" });
    // eslint-disable-next-line
  }, [text, label]);
}

function EditableQuickInsert({ dictAPI, dictionaryKey, defaults, onPick }) {
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState("");
  // v6.8 — read editable seeds from appSettings (window slot mirrors live settings).
  const liveAppSettings = (typeof window !== "undefined" && window.__appSettings) ? window.__appSettings : null;
  const overriddenGroups = liveAppSettings ? resolveSeedGroups(liveAppSettings, dictionaryKey) : null;
  const baseGroups = (overriddenGroups && overriddenGroups.length > 0)
    ? overriddenGroups
    : (defaults || DICT_DEFAULTS[dictionaryKey] || []);
  const customItems = useMemo(() => {
    const items = dictAPI?.dict?.[dictionaryKey];
    return Array.isArray(items) ? items : [];
  }, [dictAPI?.dict, dictionaryKey]);

  // Flag any phrase visually that is auto-flagged in Settings.
  const flagSet = liveAppSettings ? flaggedPhrasesFor(liveAppSettings, dictionaryKey) : new Set();

  const commit = () => {
    const text = draft.trim();
    if (!text) { setAdding(false); return; }
    dictAPI.dictAddItem(dictionaryKey, text);
    onPick(text);
    setDraft("");
    setAdding(false);
  };
  const removeCustom = (item) => {
    dictAPI.dictRemoveItem(dictionaryKey, item);
  };

  if (adding) {
    return (
      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
        <input
          autoFocus
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter") commit();
            if (e.key === "Escape") { setDraft(""); setAdding(false); }
          }}
          placeholder="Type new entry…"
          style={{
            padding: "5px 10px", borderRadius: 7,
            border: `1px solid ${T.teal}`,
            background: T.card, color: T.ink,
            fontSize: 12, minWidth: 200, outline: "none",
          }}
        />
        <button style={{ ...styles.miniBtn, background: T.teal, color: "#fff", borderColor: T.teal }} onClick={commit} title="Save globally">
          <Plus size={11} strokeWidth={2.2} /> Add
        </button>
        <button style={styles.miniIconBtn} onClick={() => { setDraft(""); setAdding(false); }} title="Cancel">
          <X size={11} strokeWidth={1.8} />
        </button>
      </div>
    );
  }
  return (
    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
      <select
        defaultValue=""
        onChange={(e) => {
          if (!e.target.value) return;
          if (e.target.value === "__add__") { setAdding(true); e.target.value = ""; return; }
          if (e.target.value.startsWith("__del__")) {
            const item = e.target.value.slice(7);
            if (window.confirm(`Remove "${item}" from this list (for ALL patients)?`)) removeCustom(item);
            e.target.value = "";
            return;
          }
          onPick(e.target.value);
          e.target.value = "";
        }}
        style={{
          padding: "5px 10px", borderRadius: 7,
          border: `1px solid ${T.line}`, background: T.paperWarm,
          color: T.inkSoft, fontSize: 11.5, fontWeight: 500,
          cursor: "pointer", maxWidth: 280,
        }}>
        <option value="">＋ Quick insert…</option>
        {baseGroups.map((g, gi) => (
          <optgroup key={gi} label={g.group}>
            {(g.items || []).map((it, i) => (
              <option key={`${gi}-${i}`} value={it}>
                {flagSet.has(it) ? "⚑ " : ""}{it}
              </option>
            ))}
          </optgroup>
        ))}
        {customItems.length > 0 && (
          <optgroup label="✦ Saved (global)">
            {customItems.map((it, i) => (
              <option key={`c-${i}`} value={it}>
                {flagSet.has(it) ? "⚑ " : ""}{it}
              </option>
            ))}
            <option disabled>──────────</option>
            {customItems.map((it, i) => <option key={`d-${i}`} value={`__del__${it}`}>🗑  remove "{it}"</option>)}
          </optgroup>
        )}
        <option disabled>──────────</option>
        <option value="__add__">＋ Add to list (global)</option>
      </select>
    </div>
  );
}

                    <X size={10} strokeWidth={1.8} />

                  value={c.value || ""}
                  onChange={(val) => updateCell(c.id, { value: val })}

                  minRows={1}
                  redStyle={cellFlagged}
                  singleLineHint={true}
                />
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
