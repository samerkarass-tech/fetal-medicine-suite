const REASON_OPTIONS = [
  { en: "Consult", ar: "كشف" },
  { en: "Follow-up", ar: "متابعة" },
  { en: "Scan", ar: "سونار" },
  { en: "IVF stim review", ar: "متابعة تنشيط الحقن المجهري" },
  { en: "Gynae consult", ar: "استشارة نساء" },
  { en: "ANC visit", ar: "متابعة حمل" },
  { en: "Walk-in", ar: "بدون موعد" },
];
const renderReason = (reason) => {
  if (!reason) return { en: "—", ar: "—" };
  if (typeof reason === "string") {
    const m = REASON_OPTIONS.find((r) => r.en === reason);
    return m || { en: reason, ar: reason };
  }
  return { en: reason.en || "—", ar: reason.ar || reason.en || "—" };
};
const AR_DAYS = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
const AR_MONTHS = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
const fmtDateAr = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return iso;
  return `${AR_DAYS[d.getDay()]} ${d.getDate()} ${AR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
};


function Scheduling({ patients, appts, setAppts, clinicSettings, setClinicSettings }) {
  const [date, setDate] = useState(todayISO());
  const [pickPatientFor, setPickPatientFor] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);

  const slots = useMemo(() => buildSlots(clinicSettings), [clinicSettings]);
  const dayAppts = appts.filter(a => a.date === date);
  const findPt = (id) => patients.find(p => p.id === id);

  const slotMap = useMemo(() => {
    const map = {};
    slots.forEach(s => { map[s] = { appt: null, blockedBy: null }; });
    const baseDur = clinicSettings.slotDuration;
    dayAppts.forEach(a => {
      if (!map[a.slot]) return;
      map[a.slot].appt = a;
      const dur = Math.max(baseDur, parseInt(a.duration, 10) || baseDur);
      const startM = parseTime(a.slot);
      const endM = startM + dur;
      slots.forEach(s => {
        if (s === a.slot) return;
        const sM = parseTime(s);
        if (sM > startM && sM < endM) {
          if (map[s] && !map[s].appt) {
            map[s].blockedBy = a;
          }
        }
      });
    });
    return map;
  }, [slots, dayAppts, clinicSettings.slotDuration]);

  const book = (slot, patientId, reason) => {
    const rObj = reason || REASON_OPTIONS[0];
    const dur = appointmentDurationMinutes(rObj, clinicSettings.slotDuration);
    setAppts((arr) => [
      ...arr.filter(a => !(a.date === date && a.slot === slot)),
      { id: uid(), patientId, date, slot, duration: dur, reason: rObj, status: "scheduled" },
    ]);
    setPickPatientFor(null);
  };
  const removeAppt = (id) => setAppts(arr => arr.filter(a => a.id !== id));
  const updateApptStatus = (id, status) => setAppts(arr => arr.map(a => a.id === id ? { ...a, status } : a));
  const updateApptDuration = (id, duration) => setAppts(arr => arr.map(a => a.id === id ? { ...a, duration } : a));

  const sendWhatsApp = (appt) => {
    const p = findPt(appt.patientId);
    if (!p) return;
    const msg = `السلام عليكم ${p.nameAr || p.nameEn}،\nنذكّر حضرتك بموعدك في العيادة يوم ${fmtDateAr(appt.date)} الساعة ${appt.slot}.\nبرجاء الحضور قبل الموعد بـ 10 دقائق.\nشكراً لكم.${waFooterFromClinic(clinicSettings)}`;
    const phone = (p.mobile || "").replace(/[^\d]/g, "");
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
  };

  const orphanAppts = dayAppts.filter(a => !slots.includes(a.slot));

  return (
    <div>
      <PageHeader
        eyebrow={<>Front desk · <span style={{ direction: "rtl" }}>الاستقبال</span></>}
        title={<>Scheduling · <span style={{ direction: "rtl", fontFamily: "'Fraunces', Georgia, serif" }}>المواعيد</span></>}
        sub={<>
          Daily slots {clinicSettings.startTime}–{clinicSettings.endTime} · {clinicSettings.slotDuration}-min default. One-click Arabic WhatsApp reminders.
          <br />
          <span style={{ direction: "rtl", display: "inline-block", marginTop: 4 }}>
            مواعيد يومية من {clinicSettings.startTime} حتى {clinicSettings.endTime} (افتراضياً كل {clinicSettings.slotDuration} دقيقة). تذكير واتساب بالعربية بضغطة زر.
          </span>
        </>}
      />

      <ClinicSettingsBar
        settings={clinicSettings}
        setSettings={setClinicSettings}
        open={settingsOpen}
        onToggle={() => setSettingsOpen(o => !o)}
      />

      <Card
        title={
          <span style={{ display: "flex", gap: 10, alignItems: "baseline", flexWrap: "wrap" }}>
            <span>{fmtDate(date)}</span>
            <span style={{ direction: "rtl", color: T.inkSoft, fontSize: 12.5, fontWeight: 500 }}>{fmtDateAr(date)}</span>
          </span>
        }
        icon={<Calendar size={15} strokeWidth={1.6} />} accent={T.rose}
        right={
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <button style={styles.iconBtn} onClick={() => {
              const d = new Date(date); d.setDate(d.getDate() - 1);
              setDate(d.toISOString().slice(0, 10));
            }}><ChevronLeft size={14} strokeWidth={1.8} /></button>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={{ ...styles.input, padding: "6px 10px" }} />
            <button style={styles.iconBtn} onClick={() => {
              const d = new Date(date); d.setDate(d.getDate() + 1);
              setDate(d.toISOString().slice(0, 10));
            }}><ChevronRight size={14} strokeWidth={1.8} /></button>
          </div>
        }>
        {slots.length === 0 ? (
          <EmptyHint>
            Clinic end time must be after start time. Please check your clinic hours above.
            <br />
            <span style={{ direction: "rtl" }}>وقت إنهاء العيادة يجب أن يكون بعد وقت البدء.</span>
          </EmptyHint>
        ) : (
          <div style={styles.slotGrid}>
            {slots.map((slot) => {
              const cell = slotMap[slot] || { appt: null, blockedBy: null };
              const a = cell.appt;
              const blockedBy = cell.blockedBy;
              const p = a ? findPt(a.patientId) : null;
              const reason = a ? renderReason(a.reason) : null;
              const apptDur = a ? (parseInt(a.duration, 10) || clinicSettings.slotDuration) : clinicSettings.slotDuration;

              if (blockedBy) {
                const blocker = findPt(blockedBy.patientId);
                return (
                  <div key={slot} style={{ ...styles.slot, ...styles.slotBlocked }}>
                    <div style={styles.slotTime}>
                      <Clock size={11} strokeWidth={1.8} /> {slot}
                    </div>
                    <div style={{ fontSize: 11, color: T.inkSoft, fontStyle: "italic", opacity: 0.7, marginTop: 4 }}>
                      ↳ continued from {blockedBy.slot}
                      <br />
                      <span style={{ fontSize: 10.5, opacity: 0.85 }}>{blocker?.nameEn || blocker?.nameAr || ""}</span>
                    </div>
                  </div>
                );
              }

              return (
                <div key={slot} style={{ ...styles.slot, ...(a ? styles.slotFilled : {}) }}>
                  <div style={styles.slotTime}>
                    <Clock size={11} strokeWidth={1.8} /> {slot}
                    {a && <span style={styles.slotDurBadge} title="Appointment duration">{apptDur} min</span>}
                  </div>
                  {a && p ? (
                    <>
                      <div style={styles.slotName}>{p.nameEn || "—"}</div>
                      {p.nameAr && (
                        <div style={{ ...styles.slotName, direction: "rtl", fontSize: 12, color: T.inkSoft, fontWeight: 500 }}>
                          {p.nameAr}
                        </div>
                      )}
                      {p.patientId && (
                        <div style={{
                          fontSize: 10, fontFamily: "monospace",
                          color: T.tealDeep, fontWeight: 700, letterSpacing: 0.3,
                        }}>{p.patientId}</div>
                      )}
                      <div style={styles.slotReason}>{reason.en}</div>
                      <div style={{ ...styles.slotReason, direction: "rtl" }}>{reason.ar}</div>

                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 10, color: T.inkSoft, letterSpacing: 0.4 }}>Duration</span>
                        <select
                          value={apptDur}
                          onChange={(e) => updateApptDuration(a.id, parseInt(e.target.value, 10))}
                          style={styles.slotDurSelect}
                          title="Override duration · تعديل المدة">
                          {SLOT_DURATION_OPTIONS.map(d => (
                            <option key={d} value={d}>{d} min</option>
                          ))}
                        </select>
                      </div>

                      <div style={styles.slotActions}>
                        <span style={{
                          ...styles.statusPill,
                          background: a.status === "checked-in" ? T.sageSoft : a.status === "completed" ? T.tealSoft : T.paperWarm,
                          color: a.status === "checked-in" ? "#33572A" : a.status === "completed" ? T.tealDeep : T.inkSoft,
                        }}>
                          {a.status === "checked-in"
                            ? <>Checked-in · <span style={{ direction: "rtl" }}>حضر</span></>
                            : a.status === "completed"
                            ? <>Done · <span style={{ direction: "rtl" }}>تم</span></>
                            : <>Scheduled · <span style={{ direction: "rtl" }}>محجوز</span></>}
                        </span>
                        <div style={{ display: "flex", gap: 4 }}>
                          {a.status === "scheduled" && (
                            <button style={styles.miniIconBtn} title="Check in · تسجيل حضور"
                              onClick={() => updateApptStatus(a.id, "checked-in")}>
                              <LogIn size={11} strokeWidth={1.8} />
                            </button>
                          )}
                          <button style={styles.miniIconBtn} title="WhatsApp reminder · تذكير واتساب"
                            onClick={() => sendWhatsApp(a)}>
                            <MessageCircle size={11} strokeWidth={1.8} />
                          </button>
                          <button style={styles.miniIconBtn} title="Remove · حذف"
                            onClick={() => removeAppt(a.id)}>
                            <X size={11} strokeWidth={1.8} />
                          </button>
                        </div>
                      </div>
                    </>
                  ) : (
                    <button style={styles.slotEmpty} onClick={() => setPickPatientFor(slot)}>
                      <Plus size={12} strokeWidth={1.8} /> Book · <span style={{ direction: "rtl" }}>حجز</span>
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {orphanAppts.length > 0 && (
          <div style={styles.orphanBanner}>
            <AlertCircle size={14} strokeWidth={1.8} />
            <div style={{ flex: 1 }}>
              <strong>{orphanAppts.length} appointment{orphanAppts.length === 1 ? "" : "s"} outside current clinic hours</strong>
              <div style={{ fontSize: 11.5, color: T.inkSoft, marginTop: 2 }}>
                {orphanAppts.map(a => {
                  const p = findPt(a.patientId);
                  return `${a.slot} · ${p?.nameEn || p?.nameAr || "—"}`;
                }).join(" · ")}
              </div>
              <div style={{ direction: "rtl", fontSize: 11.5, color: T.inkSoft }}>
                هناك مواعيد خارج ساعات العيادة الحالية.
              </div>
            </div>
          </div>
        )}
      </Card>

      {pickPatientFor && (
        <Modal
          title={
            <span style={{ display: "flex", gap: 8, alignItems: "baseline", flexWrap: "wrap" }}>
              <span>Book {pickPatientFor} · {fmtDate(date)}</span>
              <span style={{ direction: "rtl", fontSize: 13, color: T.inkSoft }}>حجز {pickPatientFor} · {fmtDateAr(date)}</span>
            </span>
          }
          onClose={() => setPickPatientFor(null)}>
          <PatientPicker patients={patients} onPick={(p, reason) => book(pickPatientFor, p.id, reason)} />
        </Modal>
      )}
    </div>
  );
}

  const valid = parseTime(draft.endTime) > parseTime(draft.startTime);

      startTime: draft.startTime,
      endTime: draft.endTime,
      slotDuration: parseInt(draft.slotDuration, 10) || 30,

function PatientPicker({ patients, onPick, reasonOptions, onAddReasonOption }) {
  const [q, setQ] = useState("");
  const [reasonIdx, setReasonIdx] = useState(0);
  const reasons = (reasonOptions && reasonOptions.length > 0) ? reasonOptions : REASON_OPTIONS;
  const filtered = patients.filter(p => {
    const s = q.trim().toLowerCase();
    if (!s) return true;
    return (p.nameEn || "").toLowerCase().includes(s) ||
           (p.nameAr || "").includes(s) ||
           (p.mobile || "").includes(s) ||
           (p.patientId || "").toLowerCase().includes(s);
  });
  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
        <input style={styles.input} placeholder="Search · بحث" value={q} onChange={(e) => setQ(e.target.value)} />
        <select
          style={styles.input}
          value={String(reasonIdx)}
          onChange={(e) => {
            const v = e.target.value;
            if (v === "__add_new__") {
              if (onAddReasonOption) {
                const addedIndex = onAddReasonOption();
                if (typeof addedIndex === "number" && addedIndex >= 0) setReasonIdx(addedIndex);
              }
              return;
            }
            setReasonIdx(Number(v));
          }}>
          {reasons.map((r, i) => (<option key={i} value={i}>{r.en} · {r.ar}</option>))}
          <option value="__add_new__">+ Add New...</option>
        </select>
      </div>
      <div style={{ maxHeight: 280, overflow: "auto", border: `1px solid ${T.lineSoft}`, borderRadius: 10 }}>
        {filtered.map(p => (
          <button key={p.id} onClick={() => onPick(p, reasons[reasonIdx])} style={styles.pickerRow}>
            <div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                <span style={{ fontWeight: 600 }}>{p.nameEn || "—"}</span>
                {p.patientId && <span style={{ fontSize: 10, fontFamily: "monospace", color: T.tealDeep, background: T.tealSoft, padding: "1px 5px", borderRadius: 3, fontWeight: 700 }}>{p.patientId}</span>}
              </div>
              <div style={{ direction: "rtl", fontSize: 12, color: T.inkSoft }}>{p.nameAr}</div>
            </div>
            <div style={{ fontSize: 11.5, color: T.inkSoft }}>{p.mobile}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

function Billing({ patients, bills, setBills }) {

  const [editingId, setEditingId] = useState(null);

// ============================================================
// MASTER INVESTIGATION PORTAL — longitudinal lab-grouped view
// Each row is one lab from the user's Lab Library (Settings →
// Lab Library). Each column is a date on which that lab (or any
// lab) was captured. Cells show the matched value + unit, or "—".
// Parsing is regex-based against every visit's investigations
// field across all episodes. The whole portal is collapsible.
// ============================================================
/** Pull chart-level + visit-level Ix text/labs from one data bag (root, ivfWorksheet, fetWorksheet). */
function ingestInvestigationDataBag(d, ep, samples, structured, idPrefix) {
  if (!d || typeof d !== "object") return;
  const pfx = idPrefix ? `${idPrefix}:` : "";
  ["initialInvestigations", "semenProfile", "hormoneProfile", "labReports"].forEach(k => {
    const txt = (d[k] || "").trim();
    if (!txt) return;
    samples.push({
      date: ep.date || "",
      text: txt,
      episodeKind: ep.kind,
      srcId: `${ep.id}:${pfx}${k}`,
    });
  });
  const visits = d.visits || [];
  visits.forEach(v => {
    const date = v.date || ep.date || "";
    (v.labs || []).forEach(l => {
      if (!l || !l.label || !date) return;
      const val = (l.value || "").trim();
      if (!val) return;
      structured.push({
        date,
        labelId: l.labelId || l.label,
        label: l.label,
        unit: l.unit || "",
        value: val,
        episodeKind: ep.kind,
        srcId: `${ep.id}:${pfx}${v.id}:${l.id || l.labelId}`,
      });
    });
    ["investigations", "exam", "notes", "labOrders"].forEach(field => {
      const txt = (v[field] || "").trim();
      if (txt) {
        samples.push({
          date,
          text: txt,
          episodeKind: ep.kind,
          srcId: `${ep.id}:${pfx}${v.id}:${field}`,
        });
      }
    });
  });
}

function MasterInvestigationPortal({ patient, appSettings, defaultExpanded = false }) {
  const [open, setOpen] = useState(!!defaultExpanded);
  const labs = (appSettings && appSettings.labChips) || [];

  // Walk every episode → every visit → match every lab.
  // v6.8 — TRUE LAB PIVOT: every unique lab is exactly ONE row, and
  // every dated occurrence (across ALL visits / chart-level fields)
  // is appended horizontally as its own pill. Same-date duplicates
  // are NOT merged — each visit stands on its own column.
  // Result shape:
  //   { rows: [{ id, label, unit, samples: [{date, value, unit, src}] }] }
  const grid = useMemo(() => {
    const eps = patient.episodes || [];

    // 1. Collect both (a) structured lab entries (v.labs from the Lab Picker
    //    Modal) and (b) free-text samples for regex fallback. Both are
    //    captured as DISCRETE samples — no de-duplication by date.
    const samples = []; // { date, text, episodeKind, srcId } — for regex fallback
    const structured = []; // { date, labelId, label, unit, value, episodeKind, srcId }
    eps.forEach(ep => {
      const d = ep.data || {};
      ingestInvestigationDataBag(d, ep, samples, structured, "");
      ingestInvestigationDataBag(d.ivfWorksheet, ep, samples, structured, "ivfWs");
      ingestInvestigationDataBag(d.fetWorksheet, ep, samples, structured, "fetWs");
      (d.hubCycles || []).forEach(c => {
        if (c && c.ws) ingestInvestigationDataBag(c.ws, ep, samples, structured, `hc:${c.id || "x"}`);
      });
    });

    if ((samples.length === 0 && structured.length === 0) || labs.length === 0) {
      return { rows: [], totalSamples: samples.length + structured.length };
    }

    // 2. For each lab in the library, collect EVERY dated occurrence as a
    //    separate sample. Structured entries are emitted first (they are
    //    authoritative); regex fallback then adds any text-based hits whose
    //    (lab + srcId) combination wasn't already captured structurally.
    //    This is the "true pivot": multiple visits with the same lab show
    //    as multiple pills appended horizontally — never overwritten.
    const rows = labs.map(lab => {
      const out = [];
      const seenSrc = new Set();

      // (a) Structured entries — emit one sample per occurrence
      structured.forEach(s => {
        if (s.labelId !== lab.id && s.label !== lab.label) return;
        const key = `S:${s.srcId}`;
        if (seenSrc.has(key)) return;
        seenSrc.add(key);
        out.push({
          date: s.date,
          value: s.value,
          unit: s.unit || lab.unit || "",
          src: "structured",
          srcId: s.srcId,
        });
      });

      // (b) Regex fallback — emit one sample per text occurrence; each
      //     srcId can contribute at most one match per lab (so the same
      //     visit doesn't double-count if "TSH: 2.1" appears twice in
      //     a single textarea).
      samples.forEach(s => {
        if (!s.date) return;
        const key = `T:${s.srcId}`;
        if (seenSrc.has(key)) return;
        const m = matchLabInText(lab.label, s.text);
        if (!m) return;
        seenSrc.add(key);
        out.push({
          date: s.date,
          value: m.value,
          unit: m.unit || lab.unit || "",
          src: "text",
          srcId: s.srcId,
        });
      });

      // Ascending chronological order — left-to-right reads as a trend.
      out.sort((a, b) => (a.date || "").localeCompare(b.date || ""));

      return {
        id: lab.id,
        label: lab.label,
        unit: lab.unit || "",
        samples: out,
        count: out.length,
      };
    }).filter(r => r.count > 0);

    return { rows, totalSamples: samples.length + structured.length };
  }, [patient.episodes, labs]);

  const hasData = grid.rows.length > 0;
  const totalDataPoints = grid.rows.reduce((sum, r) => sum + r.count, 0);

  return (
    <div style={styles.mipWrap}>
      <button
        type="button"
        onClick={() => setOpen(!open)}
        style={{
          ...styles.mipHeader,
          width: "100%",
          background: hexAlpha(T.teal, 0.05),
          border: "none",
          cursor: "pointer",
          textAlign: "left",
          fontFamily: "inherit",
        }}
        title={open ? "Collapse portal" : "Expand portal"}>
        <div style={styles.mipTitle}>
          <FlaskConical size={15} strokeWidth={1.7} style={{ color: T.tealDeep }} />
          <span>Master Investigation Portal</span>
          <span style={{ direction: "rtl", fontSize: 12, fontWeight: 500, color: T.inkSoft, marginLeft: 8 }}>
            مركز التحاليل الموحد
          </span>
          {hasData && (
            <span style={{
              marginLeft: 10, fontSize: 11, fontWeight: 700,
              padding: "2px 8px", borderRadius: 999,
              background: T.tealSoft, color: T.tealDeep,
            }}>
              {grid.rows.length} lab{grid.rows.length === 1 ? "" : "s"} · {totalDataPoints} value{totalDataPoints === 1 ? "" : "s"}
            </span>
          )}
        </div>
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 5,
          padding: "5px 11px", borderRadius: 6,
          color: T.tealDeep,
          fontSize: 11.5, fontWeight: 600,
        }}>
          {open
            ? <><ChevronDown size={12} strokeWidth={2} /> Hide</>
            : <><ChevronRight size={12} strokeWidth={2} /> Show</>}
        </span>
      </button>

      {open && (
        <>
          {!hasData ? (
            <div style={{
              padding: "16px 18px", fontSize: 12, color: T.inkSoft, lineHeight: 1.55,
              borderTop: `1px solid ${T.lineSoft}`, background: T.paper,
            }}>
              {labs.length === 0 ? (
                <>

                  in any visit's <strong>Investigations</strong> cell, choose labs from your library, and enter their values —
                  they will appear here automatically. · <span style={{ direction: "rtl" }}>لا توجد تحاليل مُسجَّلة بعد.</span>
                </>
              ) : (
                <>
                  Investigations exist but no values match any lab in your library yet. Make sure each entry has a numerical
                  value (e.g. <code>2.1</code> next to <code>TSH</code>). For free-text notes, the parser also recognises
                  patterns like <code>TSH: 2.1 mIU/L</code>. ·
                  <span style={{ direction: "rtl", display: "inline-block", marginLeft: 4 }}>
                    تأكد من إدخال قيمة رقمية لكل تحليل.

            <div style={styles.mipTableWrap}>
              <table className="mip-table" style={styles.mipTable}>
                <thead>
                  <tr>
                    <th style={{
                      ...styles.mipTh,
                      position: "sticky", left: 0, zIndex: 2,
                      minWidth: 140, background: hexAlpha(T.teal, 0.06),
                    }}>
                      Lab · التحليل
                    </th>
                    <th style={{ ...styles.mipTh, width: "100%" }}>
                      Results (chronological → latest) · النتائج
                    </th>
                  </tr>
                </thead>
                <tbody>
                  {grid.rows.map(r => {
                    // v6.8 — Each occurrence across visits becomes its own
                    // pill. Sorted ascending so reading left-to-right shows
                    // the trend. Same-date entries are NOT merged.
                    const entries = r.samples;
                    return (
                      <tr key={r.id}>
                        <td style={{
                          ...styles.mipTd,
                          position: "sticky", left: 0, zIndex: 1,
                          background: T.paperWarm,
                          fontWeight: 600, fontSize: 12.5,
                          borderRight: `1px solid ${T.lineSoft}`,
                          minWidth: 140,
                        }}>
                          <div style={{ color: T.ink }}>{r.label}</div>
                          {r.unit && (
                            <div style={{ fontSize: 10.5, color: T.inkSoft, marginTop: 1, fontWeight: 500 }}>
                              {r.unit}
                            </div>

                          <div style={{

                            fontSize: 10, color: T.tealDeep, fontWeight: 700,
                            background: T.tealSoft, padding: "1px 6px", borderRadius: 4,
                            display: "inline-block", letterSpacing: 0.3,
                          }}>
                            {entries.length}×
                          </div>
                        </td>
                        <td style={{
                          ...styles.mipTd,
                          padding: "8px 10px",
                          background: hexAlpha(T.teal, 0.02),
                        }}>
                          <div style={{
                            display: "flex", flexWrap: "wrap", gap: 8,
                            alignItems: "center",
                          }}>
                            {entries.map((e, i) => (
                              <React.Fragment key={`${e.srcId || i}-${e.date}-${i}`}>
                                <span style={{
                                  display: "inline-flex", alignItems: "baseline", gap: 6,
                                  padding: "5px 10px", borderRadius: 8,
                                  background: T.card,
                                  border: `1px solid ${hexAlpha(T.teal, 0.25)}`,
                                  whiteSpace: "nowrap",
                                }}
                                  title={e.src === "text" ? "Parsed from free-text" : "Structured value"}>
                                  <span style={{
                                    fontSize: 14, fontWeight: 700, color: T.tealDeep,
                                    fontVariantNumeric: "tabular-nums", lineHeight: 1.1,
                                  }}>
                                    {e.value}
                                  </span>
                                  {e.unit && (
                                    <span style={{ fontSize: 10, fontWeight: 500, color: T.inkSoft }}>
                                      {e.unit}
                                    </span>
                                  )}
                                  <span style={{
                                    fontSize: 11, color: T.inkSoft, fontWeight: 600,
                                    fontVariantNumeric: "tabular-nums",
                                  }}>
                                    ({fmtDateLab(e.date)})
                                  </span>
                                </span>
                                {i < entries.length - 1 && (
                                  <ChevronRight size={11} strokeWidth={2} style={{ color: T.lineSoft, flexShrink: 0 }} />
                                )}
                              </React.Fragment>
                            ))}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </>
      )}
    </div>
  );
}



// ============================================================
// v6.8 — AUTO-FLAG SYNC ENGINE
// Walks every visit's typed cells (C/O · US Exam · Investigations ·
// Rx · Notes · Plan · Exam) plus structured v.labs entries, and:
//   • For each FLAGGED phrase in the Phrase Library: if it appears
//     anywhere in any cell, an alert is auto-pinned to the Active
//     Flags rail. When the phrase is removed from text, the alert
//     is auto-removed.
//   • For each FLAGGED lab in the Lab Library: if a value exists
//     for that lab in any v.labs[] entry, an alert is auto-pinned.
//
// All managed alerts use the source prefix "auto:" so manual flag
// chips (source: "obs:..." / "header:...") are never touched.
// This component renders nothing — it's a pure side-effect node.
// ============================================================
function AutoFlagSyncEngine({ patient, updatePatient, appSettings }) {
  // Build the desired "auto:" alert set based on current data.
  // Skip the work entirely if nothing is flagged in Settings.
  const desiredAlerts = useMemo(() => {
    const out = [];
    if (!patient || !appSettings) return out;

    // ----- 1. Flagged labs from the Lab Library -----
    const flaggedLabIds = new Set();
    const flaggedLabsByLabel = new Map(); // lower(label) -> lab
    (appSettings.labChips || []).forEach(l => {
      if (isLabFlagged(appSettings, l)) {
        flaggedLabIds.add(l.id);
        if (l.label) flaggedLabsByLabel.set(l.label.toLowerCase(), l);
      }
    });

    // ----- 2. Per-dictionary flagged phrases -----
    // Map keyed by dictionary key → Set of flagged phrases
    const phraseFlagsByKey = {};
    Object.keys((appSettings.phraseFlags || {})).forEach(k => {
      phraseFlagsByKey[k] = flaggedPhrasesFor(appSettings, k);
    });
    // Field → relevant dictionary keys (what phrases to scan against
    // in that text field). Aligns with how the templates use them.
    const fieldDicts = {
      co:             ["obs.co"],
      examUS:         ["obs.exam"],
      tx:             ["obs.treatment"],
      investigations: ["obs.investigations", "inf.initialInvestigations"],
      labOrders:      ["obs.investigations", "inf.initialInvestigations"],
      notes:          ["obs.notes"],
      exam:           ["gyn.exam"],
      plan:           ["gyn.plan", "inf.plan", "ivf.plan", "fet.plan"],
    };
    // Chart-level fields scanned at the episode level
    const chartFieldDicts = {
      initialInvestigations: ["inf.initialInvestigations"],
      semenProfile:          ["inf.semen"],
      hormoneProfile:        ["inf.hormones"],
      femaleHistory:         ["inf.history"],
      maleHistory:           ["inf.partner"],
      labReports:            ["obs.investigations"],
    };

    const eps = patient.episodes || [];
    eps.forEach(ep => {
      const d = ep.data || {};

      // Chart-level scans (+ worksheet-attached lab reports for unified hub)
      Object.keys(chartFieldDicts).forEach(field => {
        let txt = (d[field] || "").trim();
        if (field === "labReports") {
          const extra = [
            d.ivfWorksheet && d.ivfWorksheet.labReports,
            d.fetWorksheet && d.fetWorksheet.labReports,
            ...(d.hubCycles || []).map(c => c && c.ws && c.ws.labReports),
          ].map(x => (x || "").trim()).filter(Boolean);
          if (extra.length) txt = [txt, ...extra].filter(Boolean).join("\n");
        }
        if (!txt) return;
        const haystack = txt.toLowerCase();
        chartFieldDicts[field].forEach(dictKey => {
          const set = phraseFlagsByKey[dictKey];
          if (!set || set.size === 0) return;
          set.forEach(phrase => {
            if (!phrase) return;
            if (haystack.includes(phrase.toLowerCase())) {
              out.push({
                source: `auto:phrase:${ep.id}:${field}:${phrase}`,
                label: phrase,
                text: `In ${field}${ep.date ? ` · ${fmtDateShort(ep.date)}` : ""}`,
              });
            }
          });
        });
      });

      // Visit-level scans (root + unified-hub IVF/FET worksheets)
      const visits = [
        ...(d.visits || []),
        ...((d.ivfWorksheet && d.ivfWorksheet.visits) || []),
        ...((d.fetWorksheet && d.fetWorksheet.visits) || []),
        ...(d.hubCycles || []).flatMap(c => (c && c.ws && c.ws.visits) || []),
      ];
      visits.forEach(v => {
        // (a) Phrase scans across text fields
        Object.keys(fieldDicts).forEach(field => {
          const txt = (v[field] || "").trim();
          if (!txt) return;
          const haystack = txt.toLowerCase();
          fieldDicts[field].forEach(dictKey => {
            const set = phraseFlagsByKey[dictKey];
            if (!set || set.size === 0) return;
            set.forEach(phrase => {
              if (!phrase) return;
              if (haystack.includes(phrase.toLowerCase())) {
                out.push({
                  source: `auto:phrase:${v.id}:${field}:${phrase}`,
                  label: phrase,
                  text: `In ${field}${v.date ? ` · ${fmtDateShort(v.date)}` : ""}`,
                });
              }
            });
          });
        });

        // (b) Flagged-lab scans: structured v.labs[]
        (v.labs || []).forEach(l => {
          if (!l || !l.label) return;
          const val = (l.value || "").trim();
          if (!val) return;
          const isFlagged = (l.labelId && flaggedLabIds.has(l.labelId))
            || flaggedLabsByLabel.has(l.label.toLowerCase());
          if (!isFlagged) return;
          out.push({
            source: `auto:lab:${v.id}:${l.id || l.labelId || l.label}`,
            label: `${l.label}${v.date ? ` · ${fmtDateShort(v.date)}` : ""}`,
            text: `${val}${l.unit ? ` ${l.unit}` : ""}`,
          });
        });

        // (c) Flagged-lab regex scan in free-text investigations / row lab orders
        const txt = [(v.investigations || ""), (v.labOrders || "")].join("\n").trim();
        if (txt && flaggedLabsByLabel.size > 0) {
          flaggedLabsByLabel.forEach((lab, labelLower) => {
            // Skip if the same lab was already captured structurally
            const alreadyStructured = (v.labs || []).some(l => {
              if (!l || !l.label) return false;
              return (l.labelId && l.labelId === lab.id)
                || l.label.toLowerCase() === labelLower;
            });
            if (alreadyStructured) return;
            const m = matchLabInText(lab.label, txt);
            if (!m) return;
            out.push({
              source: `auto:lab:${v.id}:txt:${lab.id}`,
              label: `${lab.label}${v.date ? ` · ${fmtDateShort(v.date)}` : ""}`,
              text: `${m.value}${m.unit ? ` ${m.unit}` : (lab.unit ? ` ${lab.unit}` : "")}`,
            });
          });
        }
      });
    });

    // De-duplicate by `source` (a phrase appearing twice in the same
    // field shouldn't produce two alerts).
    const seen = new Set();
    return out.filter(a => {
      if (seen.has(a.source)) return false;
      seen.add(a.source);
      return true;
    });
  }, [patient.episodes, appSettings.phraseFlags, appSettings.labChips, appSettings.phraseSeeds]);

  // Reconcile the patient's "auto:" alerts with the desired set.
  useEffect(() => {
    const list = patient.alerts || [];
    const existingAuto = list.filter(a => a.source && a.source.startsWith("auto:"));
    const manualAlerts = list.filter(a => !a.source || !a.source.startsWith("auto:"));

    // Compare existing auto-alerts vs desired by source key.
    const desiredMap = new Map(desiredAlerts.map(a => [a.source, a]));
    const existingMap = new Map(existingAuto.map(a => [a.source, a]));

    let changed = false;
    if (desiredMap.size !== existingMap.size) {
      changed = true;
    } else {
      for (const [src, da] of desiredMap) {
        const ea = existingMap.get(src);
        if (!ea || ea.text !== da.text || ea.label !== da.label) { changed = true; break; }
      }
    }
    if (!changed) return;

    const next = [...manualAlerts, ...desiredAlerts];
    updatePatient(patient.id, { alerts: next });
    // eslint-disable-next-line
  }, [desiredAlerts]);

  return null;
}


// ============================================================
// v7 — HYBRID AI CLINICAL BRIEFING ENGINE
// ============================================================
// Pure function that takes a patient and synthesizes:
//   • Deltas dashboard (BP, weight, lab shifts since last visit)
//   • A 3-sentence clinical impression
// Re-runs on every patient mutation via useMemo, so the side-drawer
// is always up to date with the latest save.
//
// Inputs: patient (the full patient record).
// Output:
//   {
//     deltas: { bp, weight, labs[] },
//     sentences: [s1, s2, s3],
//     impression: "s1 s2 s3",
//     latestVisit, prevVisit,
//   }
//
// Logic is deterministic — no LLM call; all rules-based. The
// "smart logic" is in (a) which signals to surface, (b) how to
// phrase them, and (c) graceful fallbacks when data is missing.
// ============================================================
function computeBriefing(patient) {
  if (!patient) {
    return {
      deltas: { bp: null, weight: null, labs: [] },
      sentences: ["No patient loaded.", "", ""],
      impression: "No patient loaded.",
      latestVisit: null, prevVisit: null,
    };
  }

  const eps = patient.episodes || [];

  // Walk every Obstetrics episode and gather every dated visit. We
  // sort ascending (earliest → latest) so [length-1] = latest visit.
  const obsVisits = [];
  eps.forEach(ep => {
    if (ep.kind !== "Obstetrics") return;
    const visits = (ep.data && ep.data.visits) || [];
    visits.forEach(v => {
      if (v && v.date) obsVisits.push({ ...v, _episodeId: ep.id, _episodeKind: ep.kind });
    });
  });
  obsVisits.sort((a, b) => (a.date || "").localeCompare(b.date || ""));

  // Also gather visits from non-Obstetrics episodes — used as a
  // fallback so a Gyn or IVF chart still gets a "last visit" line.
  const otherVisits = [];
  eps.forEach(ep => {
    if (ep.kind === "Obstetrics") return;
    const visits = (ep.data && ep.data.visits) || [];
    visits.forEach(v => {
      if (v && v.date) otherVisits.push({ ...v, _episodeId: ep.id, _episodeKind: ep.kind });
    });
  });
  otherVisits.sort((a, b) => (a.date || "").localeCompare(b.date || ""));

  const latest = obsVisits[obsVisits.length - 1] || otherVisits[otherVisits.length - 1] || null;
  const prev = obsVisits.length >= 2
    ? obsVisits[obsVisits.length - 2]
    : (otherVisits.length >= 2 ? otherVisits[otherVisits.length - 2] : null);

  // ---------- BP delta ----------
  let bpDelta = null;
  if (latest && prev && latest.bp && prev.bp) {
    const a = parseBP(latest.bp);
    const b = parseBP(prev.bp);
    if (a && b) {
      bpDelta = {
        sys: a.sys - b.sys,
        dia: a.dia - b.dia,
        latestStr: latest.bp, prevStr: prev.bp,
        latestDate: latest.date, prevDate: prev.date,
        latestHigh: isBPHigh(latest.bp),
      };
    }
  }

  // ---------- Weight delta ----------
  let weightDelta = null;
  if (latest && prev && latest.weight && prev.weight) {
    const a = parseFloat(String(latest.weight).replace(/[^\d.\-]/g, ""));
    const b = parseFloat(String(prev.weight).replace(/[^\d.\-]/g, ""));
    if (!Number.isNaN(a) && !Number.isNaN(b)) {
      weightDelta = {
        kg: a - b,
        latest: a, prev: b,
        latestDate: latest.date, prevDate: prev.date,
      };
    }
  }

  // ---------- Lab shifts ----------
  // Across all dated visits in the OB chart, group structured labs
  // (v.labs) by labelId. For any label with ≥2 numeric samples, emit
  // a delta between the two most recent.
  const labMap = new Map();
  const allDatedVisits = [...obsVisits, ...otherVisits];
  allDatedVisits.forEach(v => {
    (v.labs || []).forEach(l => {
      if (!l || !l.value || !l.label) return;
      const key = l.labelId || l.label;
      if (!labMap.has(key)) labMap.set(key, []);
      labMap.get(key).push({
        date: v.date,
        rawValue: l.value,
        label: l.label,
        unit: l.unit || "",
      });
    });
  });
  const labShifts = [];
  labMap.forEach((samples) => {
    if (samples.length < 2) return;
    samples.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    const last = samples[samples.length - 1];
    const before = samples[samples.length - 2];
    // Pull the leading number out of the value string (e.g. "5.4 mIU/L" → 5.4)
    const aMatch = String(last.rawValue).match(/-?\d+(?:\.\d+)?/);
    const bMatch = String(before.rawValue).match(/-?\d+(?:\.\d+)?/);
    if (!aMatch || !bMatch) return;
    const aN = parseFloat(aMatch[0]);
    const bN = parseFloat(bMatch[0]);
    if (Number.isNaN(aN) || Number.isNaN(bN)) return;
    labShifts.push({
      label: last.label,
      delta: aN - bN,
      latest: aN, prev: bN,
      unit: last.unit,
      latestDate: last.date, prevDate: before.date,
      latestRaw: last.rawValue, prevRaw: before.rawValue,
    });
  });
  // Sort by absolute change descending — most clinically meaningful first.
  labShifts.sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));

  // ---------- Clinical Impression — 3-sentence narrative ----------
  const age = ageFromDOB(patient.dob);
  const gpa = patient.gpa || { g: 0, p: 0, a: 0 };
  const blood = patient.bloodGroup || "";
  const chronic = (patient.chronic || []).filter(Boolean);
  const meds = (patient.meds || []).filter(Boolean);
  const alerts = patient.alerts || [];

  // Active OB GA — derived from the latest Obstetrics episode's origin/anchor.
  let gaInfo = null;
  const obsEpisode = findActiveObsEpisode(patient);
  if (obsEpisode) {
    const d = obsEpisode.data || {};
    const origin = d.origin;
    const anchor = d.anchorDate;
    if (origin && anchor) gaInfo = gaFromOrigin(origin, anchor);
  }

  // Sentence 1 — Identity
  const nameEn = (patient.nameEn || "").trim() || "This patient";
  const idBits = [];
  if (age !== "" && age != null) idBits.push(`${age}-year-old`);
  idBits.push(`G${gpa.g || 0}P${gpa.p || 0}A${gpa.a || 0}`);
  if (blood) idBits.push(`blood group ${blood}${isRhNegative(blood) ? " (Rh-negative)" : ""}`);
  let s1 = `${nameEn} is a ${idBits.join(", ")}`;
  if (gaInfo) s1 += `, currently at ${gaInfo.label} weeks gestation`;
  s1 += ".";

  // Sentence 2 — Active issues
  const concerns = [];
  if (alerts.length > 0) {
    const flagPreview = alerts.slice(0, 3)
      .map(a => (a.label ? `${a.label} ${a.text || ""}`.trim() : (a.text || "flag"))
        .replace(/\s+/g, " ").slice(0, 48))
      .join("; ");
    concerns.push(`${alerts.length} active flag${alerts.length === 1 ? "" : "s"} on the rail (${flagPreview}${alerts.length > 3 ? "; …" : ""})`);
  }
  if (chronic.length > 0) {
    concerns.push(`chronic ${chronic.slice(0, 4).join(", ")}`);
  }
  if (meds.length > 0) {
    concerns.push(`currently on ${meds.slice(0, 4).join(", ")}`);
  }
  let s2 = concerns.length > 0
    ? `Active issues: ${concerns.join("; ")}.`
    : `No active flags, chronic conditions, or medications recorded.`;

  // Sentence 3 — Trends
  const trendBits = [];
  if (bpDelta) {
    const arrow = bpDelta.sys > 2 ? "rising" : bpDelta.sys < -2 ? "falling" : "stable";
    trendBits.push(`BP ${arrow} (${bpDelta.prevStr} → ${bpDelta.latestStr}${bpDelta.latestHigh ? ", elevated" : ""})`);
  }
  if (weightDelta) {
    const sign = weightDelta.kg >= 0 ? "+" : "";
    trendBits.push(`weight ${sign}${weightDelta.kg.toFixed(1)} kg since last visit`);
  }
  if (labShifts.length > 0) {
    const top = labShifts[0];
    const sign = top.delta >= 0 ? "+" : "";
    trendBits.push(`${top.label} ${sign}${top.delta.toFixed(2)}${top.unit ? " " + top.unit : ""}` + (labShifts.length > 1 ? ` (+ ${labShifts.length - 1} more lab shift${labShifts.length === 2 ? "" : "s"})` : ""));
  }

  let s3;
  if (latest) {
    const lastDateStr = fmtDate(latest.date);
    if (trendBits.length > 0) {
      s3 = `Last visit ${lastDateStr}: ${trendBits.join(", ")}.`;
    } else if (prev) {
      s3 = `Last visit ${lastDateStr}; no measurable change vs the prior visit.`;
    } else {
      s3 = `Last visit ${lastDateStr}; this is the first dated visit on file.`;
    }
  } else {
    s3 = `No dated visits logged yet.`;
  }

  return {
    deltas: { bp: bpDelta, weight: weightDelta, labs: labShifts },
    sentences: [s1, s2, s3],
    impression: [s1, s2, s3].filter(Boolean).join(" "),
    latestVisit: latest,
    prevVisit: prev,
  };
}


// ============================================================
// v7 — BRIEFING DRAWER (Right-side Hybrid AI Side-Drawer)
// ============================================================
// Hybrid layout:
//   • Top    — Deltas dashboard (BP / Weight / Lab shifts)
//   • Bottom — "Twinkle Box" — 3-sentence clinical impression
// Refreshes automatically because `briefing` is a derived prop
// from useMemo(patient) in ExamRoom.
// ============================================================
function BriefingDrawer({ patient, briefing, open, onClose }) {
  // Close on ESC
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  if (!open) return null;
  if (!briefing) return null;

  const { deltas, sentences, impression, latestVisit, prevVisit } = briefing;

  return (
    <>
      {/* Backdrop */}
      <div
        onClick={onClose}
        style={{
          position: "fixed", inset: 0,
          background: hexAlpha(T.ink, 0.32),
          zIndex: 240,
          animation: "briefingFade 0.18s ease",
        }}
      />
      {/* Drawer */}
      <div
        role="dialog"
        aria-label="Clinical Briefing"
        style={{
          position: "fixed", top: 0, right: 0, bottom: 0,
          width: "min(460px, 96vw)",
          background: T.card,
          zIndex: 241,
          boxShadow: `-12px 0 36px ${hexAlpha(T.ink, 0.22)}`,
          display: "flex", flexDirection: "column",
          animation: "briefingSlide 0.24s cubic-bezier(.2,.8,.2,1)",
        }}>
        {/* Header */}
        <div style={{
          padding: "16px 20px",
          borderBottom: `1px solid ${T.lineSoft}`,
          background: `linear-gradient(180deg, ${hexAlpha(T.teal, 0.10)} 0%, ${hexAlpha(T.teal, 0.04)} 100%)`,
          display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12,
        }}>
          <div style={{ minWidth: 0 }}>
            <div style={{
              fontFamily: "'Fraunces', Georgia, serif",
              fontSize: 17, fontWeight: 700, color: T.tealDeep,
              letterSpacing: "-0.01em",
              display: "flex", alignItems: "center", gap: 8,
            }}>
              <Sparkles size={15} strokeWidth={1.7} />
              Clinical Briefing
            </div>
            <div style={{
              fontSize: 11.5, color: T.inkSoft, marginTop: 3,

// Compact deltas table used inside BriefingDrawer's dashboard.
function BriefingDeltaTable({ deltas, latestVisit, prevVisit }) {
  const rows = [];
  if (deltas && deltas.bp) {
    const sysSign = deltas.bp.sys > 0 ? "+" : "";
    const diaSign = deltas.bp.dia > 0 ? "+" : "";
    rows.push({
      key: "bp",
      label: "BP", labelAr: "ضغط",
      prev: deltas.bp.prevStr,
      latest: deltas.bp.latestStr,
      delta: `${sysSign}${deltas.bp.sys}/${diaSign}${deltas.bp.dia}`,
      flag: deltas.bp.latestHigh,
    });
  }
  if (deltas && deltas.weight) {
    const sign = deltas.weight.kg >= 0 ? "+" : "";
    rows.push({
      key: "weight",
      label: "Weight", labelAr: "وزن",
      prev: `${deltas.weight.prev} kg`,
      latest: `${deltas.weight.latest} kg`,
      delta: `${sign}${deltas.weight.kg.toFixed(1)} kg`,
      flag: false,
    });
  }
  if (deltas && deltas.labs) {
    deltas.labs.slice(0, 8).forEach(lab => {
      const sign = lab.delta >= 0 ? "+" : "";
      rows.push({
        key: `lab:${lab.label}`,
        label: lab.label,
        prev: `${lab.prev}${lab.unit ? " " + lab.unit : ""}`,
        latest: `${lab.latest}${lab.unit ? " " + lab.unit : ""}`,
        delta: `${sign}${lab.delta.toFixed(2)}`,
        flag: false,
      });
    });
  }

  if (rows.length === 0) {
    return (
      <div style={{
        padding: "14px 16px", borderRadius: 10,
        background: T.card, color: T.inkSoft,
        border: `1px dashed ${T.line}`,
        fontSize: 12, fontStyle: "italic", textAlign: "center", lineHeight: 1.5,
      }}>
        Need at least <strong style={{ color: T.ink }}>two dated visits</strong> with BP, weight,
        or matching labs to compute deltas.
        <div style={{ direction: "rtl", marginTop: 4, fontSize: 11 }}>
          أضف زيارتين على الأقل لحساب التغيرات
        </div>
      </div>
    );
  }

  const dateLine = (latestVisit && prevVisit)
    ? `${fmtDateShort(prevVisit.date)} → ${fmtDateShort(latestVisit.date)}`
    : null;

  const cellTd = {
    padding: "8px 10px", fontSize: 12, color: T.ink,
    borderBottom: `1px solid ${T.lineSoft}`,
    fontVariantNumeric: "tabular-nums",
    verticalAlign: "middle",
  };
  const headerTd = {
    padding: "7px 10px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.5,
    textTransform: "uppercase", color: T.inkSoft, textAlign: "left",
    background: hexAlpha(T.teal, 0.05),
    borderBottom: `1px solid ${T.lineSoft}`,
  };

  return (
    <div style={{
      background: T.card,
      border: `1px solid ${T.lineSoft}`,
      borderRadius: 12, overflow: "hidden",
      boxShadow: `0 1px 4px ${hexAlpha(T.ink, 0.04)}`,
    }}>
      {dateLine && (
        <div style={{
          padding: "6px 12px",
          fontSize: 10.5, fontWeight: 600,
          color: T.tealDeep, background: T.tealSoft,
          letterSpacing: 0.3,
          display: "flex", alignItems: "center", gap: 6,
        }}>
          <Calendar size={10} strokeWidth={2} /> {dateLine}
        </div>
      )}
      <table style={{ width: "100%", borderCollapse: "collapse" }}>
        <thead>
          <tr>
            <th style={headerTd}>Metric</th>
            <th style={headerTd}>Prev</th>
            <th style={headerTd}>Latest</th>
            <th style={{ ...headerTd, textAlign: "right" }}>Δ</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(r => (
            <tr key={r.key}>
              <td style={cellTd}>
                <strong style={{ color: T.ink }}>{r.label}</strong>
                {r.labelAr && (
                  <div style={{ direction: "rtl", fontSize: 10, color: T.inkSoft, marginTop: 1 }}>
                    {r.labelAr}
                  </div>
                )}
              </td>
              <td style={{ ...cellTd, color: T.inkSoft }}>{r.prev}</td>
              <td style={{
                ...cellTd,
                fontWeight: 600,
                ...(r.flag ? { color: T.flag, background: T.flagBg } : {}),
              }}>{r.latest}</td>
              <td style={{
                ...cellTd, textAlign: "right",
                fontWeight: 700,
                color: r.flag
                  ? T.flag
                  : (r.delta.startsWith("+") ? T.tealDeep : (r.delta.startsWith("-") ? T.coral : T.inkSoft)),
              }}>{r.delta}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// GLOBAL PATIENT LEDGER — chronological Ix + media (single source: chart data)
// ============================================================
const LEDGER_CHART_FIELDS = [
  ["initialInvestigations", "Initial Ix"],
  ["semenProfile", "Semen"],
  ["hormoneProfile", "Hormones"],
  ["labReports", "Chart labs"],
];

function buildPatientLedger(patient) {
  const items = [];
  const eps = patient.episodes || [];
  eps.forEach(ep => {
    const d = ep.data || {};
    const epDate = ep.date || "";
    const pushIx = (sortDate, title, body, ref) => {
      const b = (body || "").trim();
      if (!b) return;
      const sd = sortDate || epDate || "1970-01-01";
      items.push({
        type: "ix",
        sortKey: `${sd}T${ref}`,
        displayDate: sd,
        title,
        body: b.length > 360 ? `${b.slice(0, 357)}…` : b,
        episodeKind: ep.kind,
        ref,
      });
    };
    LEDGER_CHART_FIELDS.forEach(([key, label]) => {
      pushIx(epDate, `${ep.kind} · ${label}`, d[key], `${ep.id}:${key}`);
    });
    const walkVisits = (visitList, prefix, dateFallback) => {
      (visitList || []).forEach(v => {
        const vd = v.date || dateFallback || epDate || "";
        ["investigations", "exam", "examUS", "examFindings", "notes", "labOrders", "plan", "tx"].forEach(f => {
          pushIx(vd, `${prefix}${f}`, v[f], `${ep.id}:${v.id}:${f}`);
        });
        (v.labs || []).forEach(l => {
          if (!l || !l.label) return;
          const val = (l.value || "").trim();
          if (!val) return;
          pushIx(vd, l.label, `${l.label}: ${val}${l.unit ? ` ${l.unit}` : ""}`, `${ep.id}:${v.id}:lab:${l.id || l.label}`);
        });
        (v.imaging || []).forEach((im, ii) => {
          if (!im || !im.dataUrl) return;
          const stamp = im.addedAt || vd || epDate || "";
          items.push({
            type: "media",
            sortKey: `${stamp}T${ep.id}:${v.id}:img:${im.id || ii}`,
            media: {
              id: im.id || `visit-${ep.id}-${v.id}-${ii}`,
              filename: im.name || `${prefix || ""}Visit image`,
              kind: "image",
              dataUrl: im.dataUrl,
              uploadedAt: im.addedAt || stamp,
            },
          });
        });
      });
    };
    walkVisits(d.visits, "", epDate);
    walkVisits(d.ivfWorksheet && d.ivfWorksheet.visits, "IVF · ", epDate);
    walkVisits(d.fetWorksheet && d.fetWorksheet.visits, "FET · ", epDate);
    const pushWorksheetLabImages = (ws, filePrefix, refPrefix) => {
      (ws && ws.labImaging || []).forEach((im, ii) => {
        if (!im || !im.dataUrl) return;
        const stamp = im.addedAt || epDate || "";
        items.push({
          type: "media",
          sortKey: `${stamp}T${refPrefix}:${im.id || ii}`,
          media: {
            id: im.id || `${refPrefix}-${ii}`,
            filename: im.name || `${filePrefix}Lab / report image`,
            kind: "image",
            dataUrl: im.dataUrl,
            uploadedAt: im.addedAt || stamp,
          },
        });
      });
    };
    (d.hubCycles || []).forEach(c => {
      const pre = c.kind === "fet" ? "FET cycle · " : "OI/IVF · ";
      walkVisits(c.ws && c.ws.visits, pre, c.startDate || epDate);
      if (c.ws && (c.ws.labReports || "").trim()) {
        pushIx(c.startDate || epDate, `${pre}Lab reports`, c.ws.labReports, `${ep.id}:hc:${c.id}:lr`);
      }
      pushWorksheetLabImages(c.ws, pre, `${ep.id}:hc:${c.id}:labimg`);
      if (hubCycleIsComplete(c) && (c.outcome || "").trim()) {
        const od = (c.endDate && String(c.endDate).slice(0, 10)) || (c.completedAt && String(c.completedAt).slice(0, 10)) || c.startDate || epDate;
        pushIx(od, `${pre}Outcome`, c.outcome, `${ep.id}:hc:${c.id}:outcome`);
      }
    });
    pushWorksheetLabImages(d.ivfWorksheet, "IVF · ", `${ep.id}:ivf:labimg`);
    pushWorksheetLabImages(d.fetWorksheet, "FET · ", `${ep.id}:fet:labimg`);
  });
  (patient.media || []).forEach(m => {
    items.push({
      type: "media",
      sortKey: m.uploadedAt || "",
      media: m,
    });
  });
  items.sort((a, b) => String(b.sortKey || "").localeCompare(String(a.sortKey || "")));
  return items;
}

  activeEpisodeId, setActiveEpisodeId,

  onClose, appts, setAppts, surgeries, setSurgeries, dictAPI,
  appSettings, setAppSettings, clinicSettings,
  patients, onOpenOtherPatient,
}) {
  const [launcherOpen, setLauncherOpen] = useState(!activeEpisodeId);
  const [clinicalDockOpen, setClinicalDockOpen] = useState(false);
  // Detailed obstetric history overlay — table of prior pregnancies.
  const [obsHistoryOpen, setObsHistoryOpen] = useState(false);
  // v7 — Clinical Briefing side-drawer (right side). Auto-refreshes
  // whenever the patient prop mutates (i.e. on every save) because the
  // briefing object below is computed via useMemo against patient state.
  const [briefingOpen, setBriefingOpen] = useState(false);
  // v7.6 — Schedule Surgery modal. Opens from the global Sticky Header
  // button. Auto-fills with this patient's name + ID. Available from any
  // template — Obstetrics, Gynae, Infertility, IVF — because it lives at
  // the ExamRoom level (above any per-template state).
  const [scheduleSurgeryOpen, setScheduleSurgeryOpen] = useState(false);
  // Episodes sidebar — collapsible. Defaults to closed on phone-sized
  // viewports (the CSS media query also styles it as a slide-in drawer
  // on mobile). On desktop it defaults to open.
  const [sidebarOpen, setSidebarOpen] = useState(() => {
    try {
      return typeof window !== "undefined" ? window.innerWidth >= 768 : true;
    } catch (e) { return true; }
  });
  const activeEpisode = (patient.episodes || []).find(e => e.id === activeEpisodeId) || null;
  const compareEpisode = (patient.episodes || []).find(e => e.id === compareEpisodeId) || null;

  // v7 — Hybrid AI briefing. Pure derivation from patient state, so
  // it re-runs the moment any save mutates `patient`. Never trips React
  // re-render loops because it produces only primitive values + arrays.
  const briefing = useMemo(() => computeBriefing(patient), [patient]);

  // Per-patient hidden sections (managed via the Trash icon on each Card)
  const hiddenSections = patient.hiddenSections || [];
  const clinicalCtx = useMemo(() => ({
    hiddenSections,
    hideSection: (id) => {
      const next = Array.from(new Set([...(patient.hiddenSections || []), id]));
      updatePatient(patient.id, { hiddenSections: next });
    },
    showSection: (id) => {
      updatePatient(patient.id, { hiddenSections: (patient.hiddenSections || []).filter(s => s !== id) });
    },
    restoreAll: () => updatePatient(patient.id, { hiddenSections: [] }),
  }), [patient.id, hiddenSections, updatePatient]);

  const completeVisit = () => {
    const todayAppt = appts.find(a => a.patientId === patient.id && a.date === todayISO() && a.status === "checked-in");
    if (todayAppt) {
      setAppts(arr => arr.map(a => a.id === todayAppt.id ? { ...a, status: "completed" } : a));
    }
    onClose();
  };

  return (
    <ClinicalContext.Provider value={clinicalCtx}>
      <div style={{ ...styles.examWrap, paddingTop: CLINICAL_FIXED_HEADER_PAD, position: "relative" }}>
        {/* v6.8 — Auto-flag sync. Pure side-effect node. Pins/unpins
            alerts whenever a phrase or lab marked "Flag" in Settings
            appears or disappears anywhere in this patient's chart. */}
        <AutoFlagSyncEngine
          patient={patient}
          updatePatient={updatePatient}
          appSettings={appSettings}
        />
        <div style={styles.clinicalHeaderFixedShell}>
          <StickyHeader
            patient={patient} updatePatient={updatePatient}
            onClose={onClose} onComplete={completeVisit}
            onOpenMedia={() => setClinicalDockOpen(true)}
            onOpenBriefing={() => setBriefingOpen(true)}
            briefingOpen={briefingOpen}
            briefing={briefing}
            onScheduleSurgery={() => setScheduleSurgeryOpen(true)}
            surgeryCount={(surgeries || []).filter(s => s.patientId === patient.id).length}
            sidebarOpen={sidebarOpen}
            onToggleSidebar={() => setSidebarOpen(o => !o)}
            obsHistoryOpen={obsHistoryOpen}
            onToggleObsHistory={() => setObsHistoryOpen(o => !o)}
            activeObsEpisode={activeEpisode?.kind === "Obstetrics"}
            activeEpisodeKind={activeEpisode?.kind}
            activeEpisodeData={activeEpisode?.data}
            appts={appts}
            patients={patients}
            setAppts={setAppts}
            appSettings={appSettings}
            setAppSettings={setAppSettings}
            onOpenPatient={(id) => {
              if (!id || id === patient?.id) return;
              if (onOpenOtherPatient) onOpenOtherPatient(id);
            }}
          />
        </div>
        <div style={styles.spineAccordion}>
          <SpineProfileSection
            patient={patient}
            updatePatient={updatePatient}
          />
          <SpineSurgicalHistorySection
            patient={patient}
            updatePatient={updatePatient}
          />
          <SpineOBPerformanceSection
            patient={patient}
            updatePatient={updatePatient}
            onOpenDetailedEditor={() => setObsHistoryOpen(true)}
          />
          <SpineReproductiveSection
            patient={patient}
            updatePatient={updatePatient}
          />
        </div>

        <div
          className={`exam-body ${sidebarOpen ? "sidebar-open" : "sidebar-closed"}`}
          style={{
            ...styles.examBody,
            // Inline grid override so desktop responds to toggle. The mobile
            // media query in GlobalCSS overrides this to a stacked layout.
            gridTemplateColumns: sidebarOpen ? "260px 1fr" : "1fr",
          }}>
          {sidebarOpen && (
            <div
              className="exam-sidebar"
              style={{
                position: "sticky",
                top: 0,
                alignSelf: "start",
                zIndex: 1000,
                maxHeight: "100%",
                background: T.paper,
              }}
            >
              <HistorySidebar
                patient={patient}
                activeEpisodeId={activeEpisodeId}
                compareEpisodeId={compareEpisodeId}
                setActiveEpisodeId={(id) => { setActiveEpisodeId(id); setLauncherOpen(false); }}
                setCompareEpisodeId={setCompareEpisodeId}
                deleteEpisode={(id) => deleteEpisode(patient.id, id)}
                openLauncher={() => { setLauncherOpen(true); setActiveEpisodeId(null); setCompareEpisodeId(null); }}
              />
            </div>
          )}

          <div className="exam-main" style={styles.examMain}>
            {hiddenSections.length > 0 && (
              <HiddenSectionsBanner ctx={clinicalCtx} />
            )}

            {launcherOpen ? (
              <VisitLauncher onPick={(kind) => { addEpisode(patient.id, kind); setLauncherOpen(false); }} />
            ) : activeEpisode ? (
              <div style={{ display: "grid", gridTemplateColumns: compareEpisode ? "1fr 1fr" : "1fr", gap: 18 }}>
                <EpisodePanel
                  patient={patient}
                  updatePatient={updatePatient}
                  episode={activeEpisode}
                  update={(patch) => updateEpisode(patient.id, activeEpisode.id, patch)}
                  isCompare={false}
                  dictAPI={dictAPI}
                  appSettings={appSettings}
                  clinicSettings={clinicSettings}
                />
                {compareEpisode && (
                  <EpisodePanel
                    patient={patient}
                    updatePatient={updatePatient}
                    episode={compareEpisode}
                    update={(patch) => updateEpisode(patient.id, compareEpisode.id, patch)}
                    isCompare={true}
                    onClose={() => setCompareEpisodeId(null)}
                    dictAPI={dictAPI}
                    appSettings={appSettings}
                    clinicSettings={clinicSettings}
                  />
                )}
              </div>
            ) : (
              <EmptyHint>Select an episode from the sidebar or start a new visit.</EmptyHint>
            )}
          </div>
        </div>

        <ClinicalRightDock
          open={clinicalDockOpen}
          onOpenChange={setClinicalDockOpen}
          patient={patient}
          updatePatient={updatePatient}
          appSettings={appSettings}
        />

        {obsHistoryOpen && (
          <ObsHistoryOverlay
            patient={patient}
            updatePatient={updatePatient}
            onClose={() => setObsHistoryOpen(false)}
          />
        )}

        {/* v7 — Hybrid Clinical Briefing side-drawer. Right-side overlay
            with Deltas dashboard on top + Twinkle Box (3-sentence
            clinical impression) on the bottom. The `briefing` prop is
            re-derived on every patient mutation so the drawer is
            always in sync with the latest save. */}
        <BriefingDrawer
          patient={patient}
          briefing={briefing}
          open={briefingOpen}
          onClose={() => setBriefingOpen(false)}
        />

        {/* v7.6 — Global Schedule Surgery modal. Auto-fills with the
            current patient's name + ID. Lives at ExamRoom level so the
            Sticky Header trigger works from any template. */}
        {scheduleSurgeryOpen && (
          <ScheduleSurgeryModal
            patient={patient}
            surgeries={surgeries || []}
            setSurgeries={setSurgeries}
            onClose={() => setScheduleSurgeryOpen(false)}
          />
        )}
      </div>
    </ClinicalContext.Provider>
  );
}

// Banner shown above the chart when one or more sections have been hidden

            }}

      <button onClick={ctx.restoreAll}

          background: T.flag, color: "#fff",

        }}>
        Restore all · إعادة الكل
      </button>
    </div>
  );
}


// ============================================================
// OBSTETRIC HISTORY OVERLAY
// Compact editable table of previous pregnancies, opened from
// the History button next to GPA in the sticky header. Renders
// as a fixed overlay so it never pushes clinical data down.
// Stored on patient.priorPregnancies = [{ id, year, place, type,
// outcome, complications }, ...]
//
// GPA AUTO-SYNC: Whenever the list changes, the patient's GPA in
// the sticky header is recomputed using the user's specified rule:
//   P (Para)     = count of rows where type ∈ {NVD, CS}
//   A (Abortion) = count of rows where type ∈ {Miscarriage, Abortion}
//   G (Gravida)  = P + A + 1   (the +1 represents the current pregnancy)
// Other types (Ectopic, TOP, Stillbirth, Instrumental) are NOT auto-counted
// — a manual override on the GPA field in the sticky header still works.
// ============================================================
// v6.8 — INTELLIGENT GPA SYNC RULE
// P (Para)     = count of rows where type ∈ {NVD, CS}
// A (Abortion) = count of rows where type ∈ {Miscarriage, Abortion}
// G (Gravida)  = P + A + 1   (the +1 represents the current pregnancy)
// Other types (Ectopic, TOP, Stillbirth, Instrumental) are NOT auto-counted
// — a manual override on the GPA field in the sticky header still works
// (the override sticks until the next edit to the history table).
const PRIOR_TYPE_OPTIONS = [
  "NVD", "CS", "Miscarriage", "Abortion",
  "Instrumental", "Ectopic", "TOP", "Stillbirth",
];
const computeGPAFromHistory = (list) => {
  const rows = list || [];
  let p = 0, a = 0;
  rows.forEach(r => {
    const t = (r && r.type) || "";
    if (t === "NVD" || t === "CS") p++;
    else if (t === "Miscarriage" || t === "Abortion") a++;
  });
  return { g: p + a + 1, p, a };
};

function ObsHistoryOverlay({ patient, updatePatient, onClose }) {
  const list = patient.priorPregnancies || [];

  // Single write path: any change to the list also recomputes GPA so the
  // sticky header stays in sync in real-time. Note that GPA is only updated
  // when the user actually edits the list — opening the overlay does NOT
  // touch GPA (so a patient whose GPA was set at intake but never had the
  // history table populated keeps that intake value until they begin editing).
  const writeList = (next) => {
    const gpa = computeGPAFromHistory(next);
    const nextWithFlags = (next || []).map((row) => ({
      ...row,
      complicationsFlag: ((row.complications || "").trim().length > 0),
    }));
    updatePatient(patient.id, { priorPregnancies: nextWithFlags, gpa });
  };
  const addRow = () => writeList([...list, {
    id: uid(), year: "", place: "", type: "", gaAtDelivery: "", babyGender: "", babyWeight: "", outcome: "", complications: "",
  }]);
  const updateRow = (id, patch) => writeList(list.map(r => r.id === id ? { ...r, ...patch } : r));
  const removeRow = (id) => writeList(list.filter(r => r.id !== id));

  // Live derived counts for the inline hint banner — same formula as
  // computeGPAFromHistory, surfaced so the doctor sees how the totals roll up.
  const live = useMemo(() => computeGPAFromHistory(list), [list]);

  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0,
        background: hexAlpha(T.ink, 0.45),
        display: "grid", placeItems: "start center",

        overflow: "auto",
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        className="obs-history-panel"
        style={{
          background: T.card, borderRadius: 14,
          width: "100%", maxWidth: 980,
          boxShadow: `0 20px 60px ${hexAlpha(T.ink, 0.3)}`,
          border: `1px solid ${T.line}`,
          borderTop: `4px solid ${T.rose}`,
          overflow: "hidden",
          display: "flex", flexDirection: "column",
          maxHeight: "80vh",
        }}>
        <div style={{
          padding: "14px 18px", borderBottom: `1px solid ${T.lineSoft}`,
          display: "flex", justifyContent: "space-between", alignItems: "center",
          background: hexAlpha(T.rose, 0.05),
          flexWrap: "wrap", gap: 10,
        }}>
          <div>
            <div style={{
              fontFamily: "'Fraunces', Georgia, serif",
              fontSize: 17, fontWeight: 600, color: T.ink,
              display: "flex", alignItems: "center", gap: 8,
            }}>
              <BookOpen size={16} strokeWidth={1.8} style={{ color: T.rose }} />
              Detailed Obstetric History
              <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft, marginLeft: 6 }}>
                السوابق الولادية
              </span>
            </div>
            <div style={{ fontSize: 12, color: T.inkSoft, marginTop: 2 }}>
              GPA summary: <strong>G{patient.gpa?.g ?? 0} P{patient.gpa?.p ?? 0} A{patient.gpa?.a ?? 0}</strong>
              {" · "}
              {list.length} entr{list.length === 1 ? "y" : "ies"}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={addRow} style={{ ...styles.miniBtn, background: T.rose, color: "#fff", borderColor: T.rose }}>
              <Plus size={11} strokeWidth={2.2} /> Add row · إضافة
            </button>
            <button onClick={onClose} style={styles.iconBtn} title="Close">
              <X size={13} strokeWidth={1.8} />
            </button>

        <div style={{ padding: 18, overflow: "auto", flex: 1 }}>
          <div className="obs-hist-wrap" style={{

                      <input

                Auto-calculated GPA · حساب تلقائي:

                background: T.tealSoft, color: T.tealDeep, fontWeight: 700,
              }}>
                G{live.g} P{live.p} A{live.a}
              </span>
              <span style={{ fontSize: 11.5, color: T.inkSoft }}>
                P = NVD + CS · A = Miscarriage + Abortion · G = P + A + 1 (current)
              </span>
            </div>
            <div style={{ marginTop: 6, fontSize: 11.5, color: T.inkSoft }}>
              Editing this table updates the GPA pill in the sticky header automatically.
              Other types (Instrumental, Ectopic, TOP, Stillbirth) are <em>not</em> auto-counted —
              override manually in the header if needed. ·
              <span style={{ direction: "rtl", display: "inline-block", marginLeft: 4 }}>
                تعديل الجدول يحدّث ملخّص GPA تلقائياً.
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
