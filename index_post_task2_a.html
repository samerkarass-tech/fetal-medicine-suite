function InfertilityHubModeBar({ mode, onChange, locked }) {
  const modes = [
    { id: "diagnostic", en: "Diagnostic", sub: "Progress table" },
    { id: "oi_ivf", en: "OI / IVF", sub: "Stimulation flowsheet" },
    { id: "fet", en: "FET", sub: "Endometrium" },
  ];
  return (
    <div style={{
      display: "flex", flexWrap: "wrap", alignItems: "center", gap: 8,
      paddingTop: 10, marginTop: 8, borderTop: `1px solid ${T.lineSoft}`,
    }}>
      <span style={{ fontSize: 10.5, fontWeight: 800, color: T.inkSoft, textTransform: "uppercase", letterSpacing: 0.6 }}>
        Active view
      </span>
      {modes.map(m => {
        const on = mode === m.id;
        return (
          <button
            key={m.id}
            type="button"
            disabled={locked && m.id !== mode}
            onClick={() => onChange(m.id)}
            title={locked ? "This episode is fixed to one view type" : m.sub}
            style={{
              padding: "7px 12px", borderRadius: 999, border: `1px solid ${on ? T.rose : T.lineSoft}`,
              background: on ? hexAlpha(T.rose, 0.18) : T.card,
              color: on ? T.ink : T.inkSoft,
              fontSize: 12, fontWeight: 700, cursor: locked ? "default" : "pointer",
              opacity: locked && !on ? 0.45 : 1,
              fontFamily: "inherit",
            }}
          >
            {m.en}
          </button>
        );
      })}
      {locked && (
        <span style={{ fontSize: 11, color: T.inkSoft, fontStyle: "italic" }}>
          Locked to this episode’s template type
        </span>
      )}
    </div>
  );
}

function InfertilityHubTemplate({ patient, updatePatient, episode, update, dictAPI, appSettings }) {
  const d = getData(episode);
  const set = (patch) => setData(update, episode, patch);
  const ixBundlesLive = useIxBundlesLive();
  const kind = episode.kind;

  const lockedFromKind = kind === "IVF Stim" ? "oi_ivf" : kind === "FET" ? "fet" : null;
  const hubMode = lockedFromKind || d.hubMode || "diagnostic";
  const setHubMode = (m) => {
    if (lockedFromKind) return;
    set({ hubMode: m });
  };

  const nestedWs = kind === "Infertility";
  const hubCyclesArr = d.hubCycles || [];
  const hasStoredHubCycles = hubCyclesArr.length > 0;
  const ivfWorksheetKey = nestedWs && !hasStoredHubCycles ? "ivfWorksheet" : null;
  const fetWorksheetKey = nestedWs && !hasStoredHubCycles ? "fetWorksheet" : null;

  const [focusedOiCycleId, setFocusedOiCycleId] = useState(null);
  const [focusedFetCycleId, setFocusedFetCycleId] = useState(null);

  useEffect(() => {
    if (kind !== "Infertility") return;
    const dd = getData(episode);
    if (dd.hubCycles && dd.hubCycles.length) return;
    const mig = [];
    if (worksheetHasStimContent(dd.ivfWorksheet)) {
      mig.push({
        id: uid(),
        kind: "oi_ivf",
        startDate: (dd.ivfWorksheet.cycleStart || "").trim() || episode.date || todayISO(),
        status: "open",
        isActive: true,
        outcome: "",
        ws: { ...emptyStimWorksheet(), ...dd.ivfWorksheet },
      });
    }
    if (worksheetHasStimContent(dd.fetWorksheet)) {
      mig.push({
        id: uid(),
        kind: "fet",
        startDate: (dd.fetWorksheet.cycleStart || "").trim() || episode.date || todayISO(),
        status: "open",
        isActive: true,
        outcome: "",
        ws: { ...emptyStimWorksheet(), ...dd.fetWorksheet },
      });
    }
    if (!mig.length) return;
    set({ hubCycles: mig, ivfWorksheet: null, fetWorksheet: null });
  }, [kind, episode.id]);

  useEffect(() => {
    if (!nestedWs) return;
    if (hubMode !== "oi_ivf" && hubMode !== "fet") return;
    const dd = getData(episode);
    const list = [...(dd.hubCycles || [])];
    let changed = false;
    if (hubMode === "oi_ivf" && !list.some(c => c.kind === "oi_ivf")) {
      list.push({ id: uid(), kind: "oi_ivf", startDate: todayISO(), status: "open", isActive: true, outcome: "", ws: emptyStimWorksheet() });
      changed = true;
    }
    if (hubMode === "fet" && !list.some(c => c.kind === "fet")) {
      list.push({ id: uid(), kind: "fet", startDate: todayISO(), status: "open", isActive: true, outcome: "", ws: emptyStimWorksheet() });
      changed = true;
    }
    if (changed) set({ hubCycles: list });
  }, [hubMode, nestedWs, episode.id]);

  const oiCycleIdResolved = useMemo(() => {
    const sub = hubCyclesArr.filter(c => c.kind === "oi_ivf").sort((a, b) => (b.startDate || "").localeCompare(a.startDate || ""));
    if (focusedOiCycleId && sub.some(c => c.id === focusedOiCycleId)) return focusedOiCycleId;
    return sub.find(c => hubCycleIsOpen(c))?.id || sub[0]?.id || null;
  }, [hubCyclesArr, focusedOiCycleId]);

  const fetCycleIdResolved = useMemo(() => {
    const sub = hubCyclesArr.filter(c => c.kind === "fet").sort((a, b) => (b.startDate || "").localeCompare(a.startDate || ""));
    if (focusedFetCycleId && sub.some(c => c.id === focusedFetCycleId)) return focusedFetCycleId;
    return sub.find(c => hubCycleIsOpen(c))?.id || sub[0]?.id || null;
  }, [hubCyclesArr, focusedFetCycleId]);

  const openOiCycle = hubCyclesArr.find(c => c.kind === "oi_ivf" && hubCycleIsOpen(c));
  const openFetCycle = hubCyclesArr.find(c => c.kind === "fet" && hubCycleIsOpen(c));

  const stackRef = useRef(null);
  const [stackH, setStackH] = useState(96);
  useEffect(() => {
    const el = stackRef.current;
    if (!el || typeof ResizeObserver === "undefined") return;
    const ro = new ResizeObserver(() => {
      const h = el.getBoundingClientRect().height;
      setStackH(Math.ceil(h) || 96);
    });
    ro.observe(el);
    setStackH(Math.ceil(el.getBoundingClientRect().height) || 96);
    return () => ro.disconnect();
  }, [hubMode, kind, hubCyclesArr.length, openOiCycle, openFetCycle]);

  const visits = d.visits || [];
  const orderedVisits = useMemo(
    () => [...visits].sort((a, b) => (a.date || "").localeCompare(b.date || "")),
    [visits]
  );

  const addVisit = () => {
    const v = {
      id: uid(), date: todayISO(),
      lmpCd: "", examFindings: "",
      investigations: "", plan: "", notes: "",
      imaging: [],
      extraFields: [], customSections: [],
    };
    set({ visits: [...visits, v] });
  };
  const updateVisit = (id, patch) => set({ visits: visits.map(v => v.id === id ? { ...v, ...patch } : v) });
  const deleteVisit = (id) => {
    if (!window.confirm("Delete this visit?")) return;
    set({ visits: visits.filter(v => v.id !== id) });
  };

  const onViewEditCompletedCycle = (c) => {
    if (!c) return;
    if (c.kind === "fet") {
      setFocusedFetCycleId(c.id);
      setHubMode("fet");
    } else {
      setFocusedOiCycleId(c.id);
      setHubMode("oi_ivf");
    }
  };

  const completedHubCycles = useMemo(
    () => (hubCyclesArr || []).filter(c => c && hubCycleIsComplete(c)).sort((a, b) => (b.startDate || "").localeCompare(a.startDate || "")),
    [hubCyclesArr]
  );

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div
        ref={stackRef}
        className="sovereign-sticky-stack"
        style={{
          position: "sticky",
          top: CLINICAL_FIXED_HEADER_PAD,
          zIndex: 100,
          background: T.card,
          paddingBottom: 8,
          marginBottom: 8,
          borderBottom: `1px solid ${T.lineSoft}`,
        }}
      >
        <InfertilityDiagnosticGlanceBar d={d} set={set} patient={patient} appSettings={appSettings} inStickyStack />
        {nestedWs && (openOiCycle || openFetCycle) && (
          <div style={{
            marginTop: 10,
            padding: "10px 12px",
            borderRadius: 10,
            background: T.paperWarm,
            border: `1px solid ${T.line}`,
          }}>
            <div style={{ fontSize: 10.5, fontWeight: 800, color: T.tealDeep, textTransform: "uppercase", letterSpacing: 0.55 }}>
              Active status
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 6 }}>
              {openOiCycle && (
                <div style={{ fontSize: 12.5, fontWeight: 600, color: T.ink }}>
                  ● OI / IVF cycle <span style={{ color: T.coral }}>open</span> · start {fmtDate(openOiCycle.startDate)}
                </div>
              )}
              {openFetCycle && (
                <div style={{ fontSize: 12.5, fontWeight: 600, color: T.ink }}>
                  ● FET cycle <span style={{ color: T.ochre }}>open</span> · start {fmtDate(openFetCycle.startDate)}
                </div>
              )}
            </div>
            {hubMode === "diagnostic" && (openOiCycle || openFetCycle) && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginTop: 10 }}>
                {openOiCycle && (
                  <button
                    type="button"
                    onClick={() => { setHubMode("oi_ivf"); setFocusedOiCycleId(openOiCycle.id); }}
                    style={{
                      padding: "11px 18px", borderRadius: 10, border: "none",
                      background: T.coral, color: "#fff", fontWeight: 800, fontSize: 13,
                      cursor: "pointer", boxShadow: `0 4px 14px ${hexAlpha(T.coral, 0.35)}`,
                      fontFamily: "inherit",
                    }}
                  >
                    Resume active OI / IVF cycle →
                  </button>
                )}
                {openFetCycle && (
                  <button
                    type="button"
                    onClick={() => { setHubMode("fet"); setFocusedFetCycleId(openFetCycle.id); }}
                    style={{
                      padding: "11px 18px", borderRadius: 10, border: "none",
                      background: T.ochre, color: "#fff", fontWeight: 800, fontSize: 13,
                      cursor: "pointer", boxShadow: `0 4px 14px ${hexAlpha(T.ochre, 0.35)}`,
                      fontFamily: "inherit",
                    }}
                  >
                    Resume active FET cycle →
                  </button>
                )}
              </div>
            )}
          </div>
        )}
        <InfertilityHubModeBar mode={hubMode} onChange={setHubMode} locked={!!lockedFromKind} />
        {nestedWs && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 10 }}>
            <button
              type="button"

      <CollapsiblePanel
        sectionId="inf.initialInvestigations"
        accent={T.teal}
        eyebrow="Pinned"
        title="Initial Investigations"
        summary={d.initialInvestigations ? d.initialInvestigations.split("\n")[0].slice(0, 60) : "Click to add baseline workup"}

          placeholder="Hormonal workup · imaging · pre-IVF screening …"

      <CollapsiblePanel
        sectionId="inf.semen"

        title="Semen Profile"

        quickInsert={
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
            <IxBundleSelect
              bundles={ixBundlesLive}
              accent={T.coral}
              onPick={(b) => set({ semenProfile: applyIxBundleToFreeText(d.semenProfile || "", b) })}
            />
            <AddLabPickerInline
              library={appSettings?.labChips || []}
              currentText={d.semenProfile}
              onAppend={(next) => set({ semenProfile: next })}
              compact accent={T.coral}
            />
            <ScanLabsButton
              labLibrary={appSettings?.labChips || []}
              onApply={({ confirmedLines }) => set({ semenProfile: applyOCRToText(d.semenProfile, confirmedLines) })}
              compact accent={T.coral}
            />
            <EditableQuickInsert
              dictAPI={dictAPI}
              dictionaryKey="inf.semen" defaults={INF_SEMEN_QUICKINSERTS}
              onPick={(t) => set({ semenProfile: appendLine(d.semenProfile, t) })}
            />
          </div>
        }>
        <FlexInput
          patient={patient} updatePatient={updatePatient}
          scope="inf.chart" fieldKey="semenProfile" defaultLabel="Semen profile"
          inputType="textarea" autoMinRows={4}
          value={d.semenProfile}
          onChange={(val) => set({ semenProfile: val })}

      <CollapsiblePanel
        sectionId="inf.hormones"

        eyebrow="Pinned · once per chart"

        summary={d.hormoneProfile ? d.hormoneProfile.split("\n")[0].slice(0, 60) : "Click to record baseline hormones"}
        quickInsert={
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
            <IxBundleSelect
              bundles={ixBundlesLive}
              accent={T.ochre}
              onPick={(b) => set({ hormoneProfile: applyIxBundleToFreeText(d.hormoneProfile || "", b) })}
            />
            <AddLabPickerInline
              library={appSettings?.labChips || []}
              currentText={d.hormoneProfile}
              onAppend={(next) => set({ hormoneProfile: next })}
              compact accent={T.ochre}
            />
            <ScanLabsButton
              labLibrary={appSettings?.labChips || []}
              onApply={({ confirmedLines }) => set({ hormoneProfile: applyOCRToText(d.hormoneProfile, confirmedLines) })}
              compact accent={T.ochre}
            />
            <EditableQuickInsert
              dictAPI={dictAPI}
              dictionaryKey="inf.hormones" defaults={INF_HORMONE_QUICKINSERTS}
              onPick={(t) => set({ hormoneProfile: appendLine(d.hormoneProfile, t) })}
            />
          </div>
        }>
        <FlexInput
          patient={patient} updatePatient={updatePatient}
          scope="inf.chart" fieldKey="hormoneProfile" defaultLabel="Hormone profile"
          inputType="textarea" autoMinRows={4}
          value={d.hormoneProfile}
          onChange={(val) => set({ hormoneProfile: val })}
          placeholder="FSH · LH · E2 · AMH · Prolactin · TSH · Day-21 progesterone …"
          source="inf:chart:hormoneProfile"

      </CollapsiblePanel>

      {hubMode === "diagnostic" && (
        <>
          <FeedHeader
            accent={T.rose}
            countLabel={<>{orderedVisits.length} row{orderedVisits.length === 1 ? "" : "s"}</>}
            titleEn="Progress flowsheet"
            titleAr="جدول التقدم"
          />
          <InfertilityProgressFlowsheet
            patient={patient} updatePatient={updatePatient}
            dictAPI={dictAPI} appSettings={appSettings} ixBundlesLive={ixBundlesLive}
            orderedVisits={orderedVisits}
            completedHubCycles={nestedWs ? completedHubCycles : []}
            onViewEditCompletedCycle={nestedWs ? onViewEditCompletedCycle : undefined}
            updateVisit={updateVisit}
            deleteVisit={deleteVisit}
            onAddRow={addVisit}

      {hubMode === "oi_ivf" && (
        <StimTableTemplate

          sovereignStickyOffset={stackH}
          onHubCycleConcluded={() => setHubMode("diagnostic")}
        />
      )}

      {hubMode === "fet" && (

          dictAPI={dictAPI} appSettings={appSettings}
          accent={T.ochre} scope="fet" isFET={true}
          worksheetKey={fetWorksheetKey}
          hubCycleId={nestedWs && hasStoredHubCycles && fetCycleIdResolved ? fetCycleIdResolved : null}
          sovereignStickyOffset={stackH}
          onHubCycleConcluded={() => setHubMode("diagnostic")}
        />

}


// ============================================================
// IVF STIM / FET — unified under InfertilityHubTemplate
// ============================================================
function StimTableTemplate({ patient, updatePatient, episode, update, dictAPI, appSettings, accent, scope, isFET, worksheetKey = null, hubCycleId = null, sovereignStickyOffset = 0, onHubCycleConcluded }) {
  const dAll = getData(episode);
  const hubList = dAll.hubCycles || [];
  const hubCycle = hubCycleId ? hubList.find(c => c.id === hubCycleId) : null;
  const d = hubCycleId
    ? (hubCycle ? { ...emptyStimWorksheet(), ...hubCycle.ws } : emptyStimWorksheet())
    : worksheetKey
      ? { ...emptyStimWorksheet(), ...(dAll[worksheetKey] || {}) }
      : dAll;
  const set = (patch) => {
    if (hubCycleId) {
      const latest = getData(episode);
      const list = latest.hubCycles || [];
      const cur = list.find(c => c.id === hubCycleId);
      if (!cur) return;
      const next = list.map(c => (c.id === hubCycleId
        ? { ...c, ws: { ...emptyStimWorksheet(), ...c.ws, ...patch } }
        : c));
      setData(update, episode, { hubCycles: next });
    } else if (worksheetKey) {
      const latest = getData(episode);
      const cur = { ...emptyStimWorksheet(), ...(latest[worksheetKey] || {}) };
      setData(update, episode, { [worksheetKey]: { ...cur, ...patch } });
    } else {
      setData(update, episode, patch);
    }
  };
  const ixBundlesLive = useIxBundlesLive();

  const customColumns = d.customColumns || [];
  const visits = d.visits || [];
  const orderedVisits = useMemo(
    () => [...visits].sort((a, b) => (a.date || "").localeCompare(b.date || "")),
    [visits]
  );

  const cycleStart = d.cycleStart || "";
  const stimStart = d.stimStart || "";
  const transferDate = d.transferDate || "";
  const transferDay = d.transferDay || 5;

  const computeCycleDay = (visitDate) => {
    if (!cycleStart || !visitDate) return null;
    const diff = daysBetween(cycleStart, visitDate);
    return diff === null ? null : diff + 1;
  };
  const computeStimDay = (visitDate) => {
    if (!stimStart || !visitDate) return null;
    const diff = daysBetween(stimStart, visitDate);
    return diff === null ? null : diff + 1;
  };

  const addVisit = () => {
    const today = todayISO();
    const v = {
      id: uid(), date: today,
      e2: "", p4: "", lh: "", endo: "", endoPattern: "",
      folliclesR: "", folliclesL: "", meds: "", plan: "", labOrders: "",
    };
    customColumns.forEach(col => { v[col.key] = ""; });
    set({ visits: [...visits, v] });
  };
  const updateVisit = (id, patch) => set({ visits: visits.map(v => v.id === id ? { ...v, ...patch } : v) });
  const deleteVisit = (id) => {
    if (!window.confirm("Delete this row?")) return;
    set({ visits: visits.filter(v => v.id !== id) });
  };

  const library = appSettings?.labChips || [];

  const [addingColumn, setAddingColumn] = useState(false);
  const [newColumnLabel, setNewColumnLabel] = useState("");
  const [renamingColumnId, setRenamingColumnId] = useState(null);
  const [stimIxPop, setStimIxPop] = useState(null);

  const commitNewColumn = () => {
    const label = newColumnLabel.trim();
    if (!label) { setAddingColumn(false); setNewColumnLabel(""); return; }
    const key = `col_${uid()}`;
    const next = [...customColumns, { id: uid(), key, label }];
    set({ customColumns: next });
    setNewColumnLabel("");
    setAddingColumn(false);
  };
  const cancelNewColumn = () => {
    setNewColumnLabel("");
    setAddingColumn(false);
  };
  const renameColumn = (id, nextLabel) => {
    const trimmed = (nextLabel || "").trim();
    if (!trimmed) { setRenamingColumnId(null); return; }
    set({ customColumns: customColumns.map(c => c.id === id ? { ...c, label: trimmed } : c) });
    setRenamingColumnId(null);
  };
  const removeColumn = (id) => {
    const col = customColumns.find(c => c.id === id);
    if (!col) return;
    if (!window.confirm(`Delete column "${col.label}" and all values in it?`)) return;
    const nextCols = customColumns.filter(c => c.id !== id);
    const nextVisits = visits.map(v => {
      const { [col.key]: _omit, ...rest } = v;
      return rest;
    });
    set({ customColumns: nextCols, visits: nextVisits });
  };

  const theadStickyTop = sovereignStickyOffset;

  const concludeActiveHubCycle = () => {
    if (!hubCycleId || !hubCycle || !hubCycleIsOpen(hubCycle)) return;
    const o = window.prompt("Cycle outcome (e.g. clinical pregnancy, OHSS, cancelled, freeze-all…):");
    if (o === null) return;
    const endD = todayISO();
    const latest = getData(episode);
    const list = (latest.hubCycles || []).map((c) =>
      c.id === hubCycleId
        ? {
            ...c,
            isActive: false,
            endDate: endD,
            status: "closed",
            outcome: (o || "").trim(),
            completedAt: new Date().toISOString(),
          }
        : c
    );
    setData(update, episode, { hubCycles: list });
    if (typeof onHubCycleConcluded === "function") onHubCycleConcluded();
  };

  const eddFromTransfer = transferDate ? eddFromFET(transferDate, transferDay) : "";

  const cycleSetupCard = (
    <Card sectionId="ivf.cycle" title={<>Cycle setup · <span style={{ direction: "rtl", fontSize: 12, fontWeight: 500, color: T.inkSoft }}>يوم ١ / بروتوكول</span></>}
      icon={<Calendar size={14} strokeWidth={1.6} />} accent={accent}>
      <div style={{ display: "grid", gap: 10 }}>
        <Field label={<>Cycle day 1 · <span style={{ direction: "rtl", color: T.inkSoft }}>أول يوم</span></>}>
          <input type="date" style={styles.input} value={cycleStart} onChange={(e) => set({ cycleStart: e.target.value })} />
        </Field>
        {!isFET && (
          <Field label={<>Stim start · <span style={{ direction: "rtl", color: T.inkSoft }}>بدء التنشيط</span></>}>
            <input type="date" style={styles.input} value={stimStart} onChange={(e) => set({ stimStart: e.target.value })} />
          </Field>
        )}
        <Field label={<>Protocol · <span style={{ direction: "rtl", color: T.inkSoft }}>البروتوكول</span></>}>
          <input style={styles.input} value={d.protocol || ""} onChange={(e) => set({ protocol: e.target.value })}
            placeholder={isFET ? "Natural / HRT / modified-natural" : "Antagonist / Long agonist / Mild …"} />
        </Field>
        {isFET && (
          <>
            <Field label={<>Transfer date · <span style={{ direction: "rtl", color: T.inkSoft }}>تاريخ النقل</span></>}>
              <input type="date" style={styles.input} value={transferDate} onChange={(e) => set({ transferDate: e.target.value })} />
            </Field>
            <Field label={<>Embryo day · <span style={{ direction: "rtl", color: T.inkSoft }}>يوم الجنين</span></>}>
              <select style={styles.input} value={transferDay} onChange={(e) => set({ transferDay: Number(e.target.value) })}>
                <option value={3}>Day 3</option>
                <option value={5}>Day 5</option>
              </select>
            </Field>
            <Field label={<>EDD (auto) · <span style={{ direction: "rtl", color: T.inkSoft }}>الموعد</span></>}>
              <div style={{ ...styles.calcPill, background: hexAlpha(accent, 0.12), color: accent, borderColor: hexAlpha(accent, 0.3) }}>
                {eddFromTransfer ? fmtDate(eddFromTransfer) : "Set transfer date →"}
              </div>
            </Field>
          </>
        )}
      </div>
    </Card>
  );

  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 14, width: "100%", minHeight: 0 }}>
      <aside style={{
        flex: "0 0 262px",
        position: "sticky",
        top: Math.max(8, sovereignStickyOffset + 8),
        alignSelf: "flex-start",
        maxHeight: "calc(100vh - 96px)",
        overflowY: "auto",
        zIndex: 6,
      }}>
        {cycleSetupCard}
      </aside>

      <div style={{ flex: 1, minWidth: 0, display: "grid", gap: 16 }}>
      {hubCycleId && hubCycle && hubCycleIsComplete(hubCycle) && (
        <div style={{
          padding: "12px 14px", borderRadius: 12,
          border: `1px solid ${T.line}`,
          background: T.paperWarm,
          fontSize: 12.5, color: T.ink, lineHeight: 1.5,
        }}>
          <strong style={{ color: accent }}>Completed episode</strong>
          {" · "}
          Outcome: {(hubCycle.outcome || "").trim() || "—"}
          <span style={{ color: T.inkSoft, display: "block", marginTop: 4, fontSize: 11.5 }}>
            Full flowsheet stays editable for retroactive corrections.
          </span>
        </div>
      )}

      {/* Chart-level Lab Reports — Add Lab + Scan + free-text. Lets the IVF/FET nurse
          drop in any external lab report (β-hCG, AMH, hormonal panel, etc.)
          and have it appear in the Master Investigation Portal alongside
          everything else for this patient. */}
      <Card
        sectionId={`${scope}.labReports`}
        title={<>Lab Reports · <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft }}>التحاليل المرفقة</span></>}
        icon={<FlaskConical size={15} strokeWidth={1.6} />} accent={T.tealDeep}
        collapsible defaultCollapsed
        right={
          <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
            <IxBundleSelect
              bundles={ixBundlesLive}
              accent={T.tealDeep}
              onPick={(b) => set({ labReports: applyIxBundleToFreeText(d.labReports || "", b) })}
            />
            <AddLabPickerInline
              library={appSettings?.labChips || []}
              currentText={d.labReports}
              onAppend={(next) => set({ labReports: next })}
              compact accent={T.tealDeep}
            />
            <ScanLabsButton
              labLibrary={appSettings?.labChips || []}
              onApply={({ confirmedLines }) => set({ labReports: applyOCRToText(d.labReports, confirmedLines) })}
              compact accent={T.tealDeep}
            />
          </div>
        }>
        <AutoTextarea
          minRows={3}
          value={d.labReports || ""}
          onChange={(val) => set({ labReports: val })}
          placeholder="External lab values · paste or scan a report — e.g. β-hCG, AMH, FSH, LH, E2, Prolactin, TSH, day-21 progesterone…"
        />
        <VisitImagingGallery
          images={d.labImaging}
          onUpdateImages={(imgs) => set({ labImaging: imgs })}
        />
      </Card>

      <Card
        title={<>{isFET ? "FET Cycle Tracking" : "Daily Monitoring Table"} · <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft }}>{isFET ? "متابعة دورة الإرجاع" : "جدول المتابعة اليومية"}</span></>}
        icon={<Activity size={15} strokeWidth={1.6} />} accent={accent}
        right={
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            {addingColumn ? (
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <input
                  autoFocus
                  value={newColumnLabel}
                  onChange={(e) => setNewColumnLabel(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter") commitNewColumn();
                    if (e.key === "Escape") cancelNewColumn();
                  }}
                  placeholder="Column name (e.g. Progesterone)…"
                  style={{
                    padding: "5px 10px", borderRadius: 6,
                    border: `1px solid ${accent}`,
                    background: T.card, color: T.ink,
                    fontSize: 12, minWidth: 220, outline: "none",
                  }}
                />
                <button onClick={commitNewColumn} style={{
                  ...styles.miniBtn, background: accent, color: "#fff", borderColor: accent,
                }} title="Add column">
                  <Plus size={11} strokeWidth={2.2} />
                </button>
                <button onClick={cancelNewColumn} style={styles.miniIconBtn} title="Cancel">
                  <X size={11} strokeWidth={1.8} />
                </button>
              </div>
            ) : (
              <button onClick={() => setAddingColumn(true)} style={{
                ...styles.miniBtn,
                background: hexAlpha(accent, 0.15),
                color: accent,
                borderColor: hexAlpha(accent, 0.4),
              }}>
                <Columns3 size={11} strokeWidth={2} /> Add Column
              </button>
            )}
            {hubCycleId && hubCycle && hubCycleIsOpen(hubCycle) && (
              <button
                type="button"
                onClick={concludeActiveHubCycle}
                style={{
                  ...styles.miniBtn,
                  background: hexAlpha(T.ink, 0.08),
                  color: T.ink,
                  borderColor: T.line,
                  fontWeight: 800,
                }}
                title="Record outcome and archive this cycle"
              >
                Conclude cycle
              </button>
            )}
            <button onClick={addVisit} style={{ ...styles.miniBtn, background: accent, color: "#fff", borderColor: accent }}>
              <Plus size={11} strokeWidth={2.2} /> Add Row
            </button>

function CellDictionaryPicker({ dictAPI, dictionaryKey, defaults, onPick }) {
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState("");

  const baseGroups = defaults || DICT_DEFAULTS[dictionaryKey] || [];
  const customItems = useMemo(() => {
    const items = dictAPI?.dict?.[dictionaryKey];
    return Array.isArray(items) ? items : [];
  }, [dictAPI?.dict, dictionaryKey]);

  const commit = () => {
    const text = draft.trim();
    if (!text) { setAdding(false); setDraft(""); return; }
    dictAPI.dictAddItem(dictionaryKey, text);
    onPick(text);
    setDraft("");
    setAdding(false);
  };

  if (adding) {
    return (
      <div style={{
        position: "absolute", top: 22, right: 0, zIndex: 5,
        background: T.card, border: `1px solid ${T.teal}`,
        borderRadius: 6, padding: 6, boxShadow: `0 4px 12px ${hexAlpha(T.ink, 0.15)}`,
        display: "flex", gap: 4, alignItems: "center",
      }}>
        <input
          autoFocus
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter") commit();
            if (e.key === "Escape") { setDraft(""); setAdding(false); }
          }}
          placeholder="New entry (saved globally)…"
          style={{
            padding: "4px 8px", borderRadius: 4,
            border: `1px solid ${T.line}`, background: T.card,
            fontSize: 11, minWidth: 180, outline: "none",
          }}
        />
        <button onClick={commit} title="Save"
          style={{ ...styles.miniBtn, padding: "3px 6px", background: T.teal, color: "#fff", borderColor: T.teal }}>
          <Plus size={10} strokeWidth={2.4} />
        </button>
        <button onClick={() => { setDraft(""); setAdding(false); }} title="Cancel"
          style={{ ...styles.miniIconBtn, width: 20, height: 20 }}>
          <X size={10} strokeWidth={1.8} />
        </button>
      </div>
    );
  }

  return (
    <select
      defaultValue=""
      onChange={(e) => {
        if (!e.target.value) return;
        if (e.target.value === "__add__") {
          setAdding(true);
          e.target.value = "";
          return;
        }
        if (e.target.value.startsWith("__del__")) {
          const item = e.target.value.slice(7);
          if (window.confirm(`Remove "${item}" globally (for ALL patients)?`)) {
            dictAPI.dictRemoveItem(dictionaryKey, item);
          }
          e.target.value = "";
          return;
        }
        onPick(e.target.value);
        e.target.value = "";
      }}
      style={{
        width: 18, height: 18, borderRadius: 3,
        border: "none", background: T.tealSoft, color: T.tealDeep,
        fontSize: 9, cursor: "pointer", padding: 0,
      }}
      title="Quick insert (global)">
      <option value="">＋</option>
      {baseGroups.map((g, gi) => (
        <optgroup key={gi} label={g.group}>
          {g.items.map((it, i) => <option key={`${gi}-${i}`} value={it}>{it}</option>)}
        </optgroup>
      ))}
      {customItems.length > 0 && (
        <optgroup label="✦ Saved (global)">
          {customItems.map((it, i) => <option key={`c-${i}`} value={it}>{it}</option>)}
          <option disabled>──────────</option>
          {customItems.map((it, i) => <option key={`d-${i}`} value={`__del__${it}`}>🗑  {it}</option>)}
        </optgroup>
      )}
      <option disabled>──────────</option>
      <option value="__add__">＋ Add to list (global)</option>
    </select>
  );
}

function GynecologyTemplate({ patient, updatePatient, episode, update, dictAPI, appSettings }) {
  const d = getData(episode);
  const set = (patch) => setData(update, episode, patch);
  const ixBundlesLive = useIxBundlesLive();

  const visits = d.visits || [];
  const orderedVisits = useMemo(
    () => [...visits].sort((a, b) => (a.date || "").localeCompare(b.date || "")),
    [visits]
  );

  const addVisit = () => {
    const v = {
      id: uid(), date: todayISO(),
      co: "", exam: "", plan: "", notes: "",
      investigations: "",
      imaging: [],
      extraFields: [], customSections: [],
    };
    set({ visits: [...visits, v] });
  };
  const updateVisit = (id, patch) => set({ visits: visits.map(v => v.id === id ? { ...v, ...patch } : v) });
  const deleteVisit = (id) => {
    if (!window.confirm("Delete this visit?")) return;
    set({ visits: visits.filter(v => v.id !== id) });
  };

  return (
    <div className="fms-sticky-template-root" style={{ display: "flex", flexDirection: "column", gap: 0, minHeight: 0 }}>
      <div className="fms-sticky-template-head" style={{
        position: "sticky", top: 0, zIndex: 8, background: T.paper,

          icon={<Microscope size={15} strokeWidth={1.6} />} accent={T.sage}>
          <div style={styles.formGrid}>
            <Field label={<>Menarche (years) · <span style={{ direction: "rtl", color: T.inkSoft }}>سن أول دورة</span></>}>

            </Field>
            <Field label={<>Cycle pattern · <span style={{ direction: "rtl", color: T.inkSoft }}>نمط الدورة</span></>}>
              <input style={styles.input} value={d.cycle || ""} onChange={(e) => set({ cycle: e.target.value })} placeholder="e.g. 28/4–5 regular" />
            </Field>
            <Field label={<>LMP · <span style={{ direction: "rtl", color: T.inkSoft }}>آخر دورة</span></>}>
              <input type="date" style={styles.input} value={d.lmp || ""} onChange={(e) => set({ lmp: e.target.value })} />
            </Field>

              <input style={styles.input} value={d.contraception || ""} onChange={(e) => set({ contraception: e.target.value })} />

      <FeedHeader

        countLabel={<>{orderedVisits.length} visit{orderedVisits.length === 1 ? "" : "s"}</>}

        titleAr="سجل الزيارات"
      />
      {orderedVisits.length === 0 ? (
        <FeedEmpty accent={T.sage} onAdd={addVisit} />
      ) : (
        <div style={styles.feedColumn}>
          {orderedVisits.map((v, idx) => (
            <GynaeVisitCard
              key={v.id}

// MEDIA CENTER — uploads, thumbnails, OCR, suggestions
// ============================================================
function MediaCenter({ patient, updatePatient, onClose, embedded }) {
  const fileInputRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [openPreview, setOpenPreview] = useState(null); // media id of image to preview
  const [filterKind, setFilterKind] = useState("all"); // all | image | pdf

  const media = patient.media || [];
  const totalBytes = media.reduce((s, m) => s + (m.sizeBytes || 0), 0);
  const STORAGE_LIMIT = 5 * 1024 * 1024; // 5 MB safe
  const overLimit = totalBytes > STORAGE_LIMIT * 0.85;

  const filtered = filterKind === "all" ? media : media.filter(m => m.kind === filterKind);

  const updateMedia = (id, patch) => {
    const next = media.map(m => m.id === id ? { ...m, ...patch } : m);
    updatePatient(patient.id, { media: next });
  };
  const removeMedia = (id) => {
    if (!window.confirm("Delete this file? This cannot be undone.")) return;
    updatePatient(patient.id, { media: media.filter(m => m.id !== id) });
  };

  const handleFiles = async (files) => {
    const list = Array.from(files);
    if (list.length === 0) return;
    setUploading(true);
    const newMedia = [];
    for (const file of list) {
      const isImage = /^image\//.test(file.type);
      const isPdf = file.type === "application/pdf";
      if (!isImage && !isPdf) {
        alert(`Skipped ${file.name}: only images (JPEG/PNG) and PDFs are supported.`);
        continue;
      }
      try {
        const dataUrl = await fileToBase64(file);
        const sizeBytes = dataUrlByteSize(dataUrl);
        newMedia.push({
          id: uid(),
          kind: isImage ? "image" : "pdf",
          filename: file.name,
          dataUrl,
          sizeBytes,
          uploadedAt: new Date().toISOString(),
          ocrText: "",
          ocrSuggestions: [],
          notes: "",
        });
      } catch (err) {
        console.error("Failed to read file", err);
        alert(`Could not read ${file.name}: ${err.message || err}`);
      }
    }
    if (newMedia.length > 0) {
      updatePatient(patient.id, { media: [...media, ...newMedia] });
    }
    setUploading(false);
  };

  const onFileChange = (e) => {
    handleFiles(e.target.files);
    e.target.value = "";
  };
  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    handleFiles(e.dataTransfer.files);
  };

  const previewMedia = openPreview ? media.find(m => m.id === openPreview) : null;

  const galleryPad = embedded ? "12px 14px 16px" : 20;
  const galleryScroll = (
        <div style={{ padding: galleryPad, overflow: "auto", flex: embedded ? 1 : undefined, minHeight: embedded ? 0 : undefined }}>
          {/* Upload zone */}
          <div
            onDrop={onDrop}
            onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onClick={() => fileInputRef.current?.click()}
            style={{
              padding: "28px 20px", borderRadius: 12,
              border: `2px dashed ${dragOver ? T.teal : T.line}`,
              background: dragOver ? T.tealSoft : T.paper,
              textAlign: "center", cursor: "pointer",
              transition: "all 0.15s", marginBottom: 16,
            }}>
            <input
              ref={fileInputRef}
              type="file"
              multiple
              accept="image/jpeg,image/png,image/jpg,application/pdf"
              onChange={onFileChange}
              style={{ display: "none" }}
            />
            <Upload size={32} strokeWidth={1.4} style={{ color: dragOver ? T.teal : T.inkSoft, marginBottom: 8 }} />
            <div style={{ fontFamily: "'Fraunces', Georgia, serif", fontSize: 16, fontWeight: 600, color: T.ink, marginBottom: 4 }}>
              {uploading ? "Reading files…" : "Drop files here or click to upload"}
            </div>
            <div style={{ fontSize: 12.5, color: T.inkSoft, marginBottom: 6 }}>
              Ultrasound images (JPEG/PNG) · Lab reports (PDF)
            </div>
            <div style={{ direction: "rtl", fontSize: 12, color: T.inkSoft }}>
              صور السونار (JPEG/PNG) · تقارير المعمل (PDF)
            </div>
          </div>

          {/* Storage stats */}
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            gap: 10, marginBottom: 14, padding: "10px 14px",
            borderRadius: 10, background: overLimit ? T.flagBg : T.paperWarm,
            border: `1px solid ${overLimit ? T.flag : T.lineSoft}`,
          }}>
            <div style={{ display: "flex", gap: 16, fontSize: 12, color: overLimit ? T.flag : T.inkSoft, flexWrap: "wrap" }}>
              <span><strong>{media.length}</strong> file{media.length === 1 ? "" : "s"}</span>
              <span><strong>{formatBytes(totalBytes)}</strong> stored</span>
              <span style={{ opacity: 0.7 }}>limit ~ 5 MB browser storage</span>
            </div>
            {/* Filter pills */}
            <div style={{ display: "inline-flex", gap: 4, padding: 3, background: T.card, borderRadius: 999, border: `1px solid ${T.line}` }}>
              {[
                { k: "all", l: "All" },
                { k: "image", l: "Images" },
                { k: "pdf", l: "PDFs" },
              ].map(f => (
                <button key={f.k} onClick={() => setFilterKind(f.k)} style={{
                  padding: "4px 12px", borderRadius: 999, border: "none",
                  background: filterKind === f.k ? T.teal : "transparent",
                  color: filterKind === f.k ? "#fff" : T.inkSoft,
                  fontSize: 11, fontWeight: 600, cursor: "pointer",
                }}>{f.l}</button>
              ))}
            </div>
          </div>

          {overLimit && (
            <div style={{
              padding: "10px 14px", borderRadius: 8,
              background: T.flagBg, border: `1px solid ${T.flag}`,
              color: T.flag, fontSize: 12.5, marginBottom: 14,
              display: "flex", alignItems: "flex-start", gap: 8,
            }}>
              <AlertCircle size={14} strokeWidth={2} style={{ flexShrink: 0, marginTop: 2 }} />
              <div>
                <strong>Approaching browser storage limit.</strong> Consider deleting older files. Cloud sync (if enabled) does not currently store media.
                <div style={{ direction: "rtl", marginTop: 2 }}>اقتراب من الحد الأقصى لمساحة المتصفح. يُنصح بحذف ملفات قديمة.</div>
              </div>
            </div>
          )}

          {/* Media list */}
          {filtered.length === 0 ? (
            <EmptyHint>
              {filterKind === "all" ? "No files uploaded yet." : `No ${filterKind === "image" ? "images" : "PDFs"} uploaded yet.`}
            </EmptyHint>
          ) : (
            <div style={{ display: "grid", gap: 12 }}>
              {filtered.map(m => (
                <MediaItem
                  key={m.id}
                  patient={patient}
                  updatePatient={updatePatient}
                  media={m}
                  onUpdate={(patch) => updateMedia(m.id, patch)}
                  onRemove={() => removeMedia(m.id)}
                  onPreview={() => setOpenPreview(m.id)}
                />
              ))}
            </div>
          )}
        </div>
  );

  const previewLayer = previewMedia && (
        <div onClick={() => setOpenPreview(null)} style={{
          position: "fixed", inset: 0, background: "rgba(14,42,43,0.85)",
          display: "grid", placeItems: "center", zIndex: embedded ? 260 : 250, padding: 30,
        }}>
          <div onClick={(e) => e.stopPropagation()} style={{ position: "relative", maxWidth: "95vw", maxHeight: "95vh" }}>
            <button onClick={() => setOpenPreview(null)} style={{
              position: "absolute", top: -40, right: 0,
              width: 32, height: 32, borderRadius: "50%",
              background: "#fff", border: "none", cursor: "pointer",
              display: "grid", placeItems: "center",
            }}>
              <X size={16} strokeWidth={2} />
            </button>
            {previewMedia.kind === "image" ? (
              <img src={previewMedia.dataUrl} alt={previewMedia.filename}
                style={{ maxWidth: "95vw", maxHeight: "90vh", borderRadius: 8, boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }} />
            ) : (
              <iframe src={previewMedia.dataUrl} title={previewMedia.filename}
                style={{ width: "90vw", height: "90vh", border: "none", borderRadius: 8, background: "#fff" }} />
            )}
          </div>
        </div>
  );

  if (embedded) {
    return (
      <div style={{ display: "flex", flexDirection: "column", flex: 1, minHeight: 200, background: T.paper }}>
        <div style={{
          padding: "10px 14px", borderBottom: `1px solid ${T.lineSoft}`,
          background: T.card, flexShrink: 0,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <Folder size={16} strokeWidth={1.6} style={{ color: T.ochre }} />
            <strong style={{ fontSize: 13, color: T.ink }}>Document gallery</strong>
            <span style={{ direction: "rtl", fontSize: 11, color: T.inkSoft }}>مرفقات · OCR</span>
          </div>
        </div>
        {galleryScroll}
        {previewLayer}
      </div>
    );
  }

  return (
    <div onClick={onClose} style={styles.cloudOverlay}>
      <div onClick={(e) => e.stopPropagation()} style={{ ...styles.cloudPanel, maxWidth: 980, width: "94vw" }}>
        <div style={styles.cloudHeader}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Folder size={18} strokeWidth={1.6} style={{ color: T.ochre }} />
            <strong style={{ fontFamily: "'Fraunces', Georgia, serif", fontSize: 18, color: T.ink }}>
              Media & Investigations
            </strong>
            <span style={{ direction: "rtl", fontSize: 13, color: T.inkSoft, fontWeight: 500 }}>· مركز الوسائط و التحاليل</span>
          </div>
          <button onClick={onClose} style={styles.iconBtn}><X size={13} strokeWidth={1.8} /></button>
        </div>
        {galleryScroll}
      </div>
      {previewLayer}
    </div>
  );
}

function MediaItem({ patient, updatePatient, media, onUpdate, onRemove, onPreview }) {
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [error, setError] = useState("");
  const [showText, setShowText] = useState(false);

  const runOCR = async () => {
    if (!window.Tesseract) {
      setError("OCR engine not loaded. Check internet connection and refresh.");
      return;
    }
    setRunning(true);
    setError("");
    setProgress(0);

    try {
      let combinedText = "";

      if (media.kind === "image") {
        const result = await window.Tesseract.recognize(media.dataUrl, "eng+ara", {
          logger: (m) => {
            if (m.status === "recognizing text" && typeof m.progress === "number") {
              setProgress(Math.round(m.progress * 100));
            }
          },
        });
        combinedText = result?.data?.text || "";
      } else if (media.kind === "pdf") {
        if (!window.pdfjsLib) {
          throw new Error("PDF engine not loaded.");
        }
        const base64 = media.dataUrl.split(",")[1];
        const binary = atob(base64);
        const len = binary.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
        const pdf = await window.pdfjsLib.getDocument({ data: bytes }).promise;
        const numPages = Math.min(pdf.numPages, 10); // limit to 10 pages for performance
        for (let pageNum = 1; pageNum <= numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const viewport = page.getViewport({ scale: 2 });
          const canvas = document.createElement("canvas");
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext("2d");
          await page.render({ canvasContext: ctx, viewport }).promise;
          const result = await window.Tesseract.recognize(canvas, "eng+ara", {
            logger: (m) => {
              if (m.status === "recognizing text" && typeof m.progress === "number") {
                const pageProgress = (pageNum - 1) / numPages;
                const thisProgress = m.progress / numPages;
                setProgress(Math.round((pageProgress + thisProgress) * 100));
              }
            },
          });
          combinedText += `\n\n--- Page ${pageNum} ---\n` + (result?.data?.text || "");
        }
      }

      const suggestions = extractOCRSuggestions(combinedText);
      onUpdate({ ocrText: combinedText.trim(), ocrSuggestions: suggestions });
      setShowText(true);
    } catch (err) {
      console.error("OCR failed", err);
      setError(err.message || String(err));
    } finally {
      setRunning(false);
      setProgress(0);
    }
  };

  const copySuggestion = (s) => {
    try {
      navigator.clipboard.writeText(`${s.label}: ${s.value}`);
    } catch (e) {}
  };

  return (
    <div style={{
      background: T.card, borderRadius: 12,
      border: `1px solid ${T.line}`,
      borderLeft: `4px solid ${media.kind === "image" ? T.rose : T.ochre}`,
      padding: 14, display: "grid",
      gridTemplateColumns: "120px 1fr auto", gap: 14, alignItems: "flex-start",
    }}>
      {/* Thumbnail */}
      <button onClick={onPreview} style={{
        width: 120, height: 120, borderRadius: 8,
        border: `1px solid ${T.line}`, background: T.paper,
        cursor: "pointer", overflow: "hidden", padding: 0,
        display: "grid", placeItems: "center",
      }}>
        {media.kind === "image" ? (
          <img src={media.dataUrl} alt={media.filename}
            style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        ) : (
          <div style={{ display: "grid", placeItems: "center", gap: 4, color: T.ochre }}>
            <FileText size={36} strokeWidth={1.4} />
            <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 0.4 }}>PDF</span>
          </div>
        )}
      </button>

      {/* Info + actions */}
      <div style={{ minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
          <span style={{ fontWeight: 600, fontSize: 13.5, color: T.ink, wordBreak: "break-word" }}>
            {media.filename}
          </span>
          <span style={{
            padding: "1px 8px", borderRadius: 999,
            background: media.kind === "image" ? T.roseSoft : T.ochreSoft,
            color: media.kind === "image" ? T.rose : T.ochre,
            fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
          }}>{media.kind.toUpperCase()}</span>
        </div>
        <div style={{ fontSize: 11.5, color: T.inkSoft, marginBottom: 8 }}>
          {formatBytes(media.sizeBytes)} · {fmtDate(media.uploadedAt)}
        </div>

        {/* Notes */}
        <input
          style={{ ...styles.input, padding: "6px 10px", fontSize: 12, marginBottom: 8 }}
          placeholder="Notes (e.g. 20-week anomaly scan, Lab from Dr. X clinic)…"
          value={media.notes || ""}
          onChange={(e) => onUpdate({ notes: e.target.value })}
        />

        {/* OCR action */}
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 8 }}>
          <button
            onClick={runOCR}
            disabled={running}
            style={{
              ...styles.miniBtn,
              background: running ? T.paperWarm : T.tealSoft,
              color: T.tealDeep, borderColor: T.teal,
              opacity: running ? 0.6 : 1, cursor: running ? "wait" : "pointer",
            }}>
            <ScanText size={11} strokeWidth={1.8} />
            {running ? `OCR ${progress}%` : (media.ocrText ? "Re-run OCR" : "Run OCR")}
          </button>
          {media.ocrText && (
            <button onClick={() => setShowText(s => !s)} style={styles.miniBtn}>
              <Eye size={11} strokeWidth={1.8} /> {showText ? "Hide text" : "Show text"}
            </button>
          )}
        </div>

        {error && (
          <div style={{
            padding: "6px 10px", borderRadius: 6,
            background: T.flagBg, color: T.flag,
            fontSize: 11.5, marginBottom: 8,
          }}>{error}</div>
        )}

        {/* Extracted suggestions chips */}
        {(media.ocrSuggestions || []).length > 0 && (
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: T.inkSoft, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", marginBottom: 4, display: "flex", alignItems: "center", gap: 4 }}>
              <Sparkles size={10} strokeWidth={2} /> Extracted values · click to copy
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
              {media.ocrSuggestions.map((s, i) => (
                <button key={i} onClick={() => copySuggestion(s)} title={`Click to copy: ${s.label}: ${s.value}`}
                  style={{
                    padding: "4px 10px", borderRadius: 999,
                    background: T.tealSoft, color: T.tealDeep,
                    border: `1px solid ${hexAlpha(T.teal, 0.3)}`,
                    fontSize: 11, fontWeight: 600, cursor: "pointer",
                    display: "inline-flex", alignItems: "center", gap: 4,
                  }}>
                  <strong>{s.label}:</strong> {s.value}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* OCR text body */}
        {showText && media.ocrText && (
          <div style={{ marginTop: 8 }}>
            <div style={{ fontSize: 10, color: T.inkSoft, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase", marginBottom: 4 }}>
              Extracted text (editable)
            </div>
            <textarea
              value={media.ocrText}
              onChange={(e) => onUpdate({ ocrText: e.target.value })}
              style={{
                width: "100%", minHeight: 140, padding: "10px 12px",
                borderRadius: 8, border: `1px solid ${T.line}`,
                background: T.paper, color: T.ink,
                fontFamily: "monospace", fontSize: 11.5, lineHeight: 1.5,
                resize: "vertical", outline: "none",
              }}
            />
          </div>
        )}
      </div>

      {/* Right action column */}
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        <button onClick={onPreview} style={styles.miniIconBtn} title="Preview">
          <Eye size={11} strokeWidth={1.8} />
        </button>
        <a href={media.dataUrl} download={media.filename} style={{
          ...styles.miniIconBtn, textDecoration: "none",
          display: "grid", placeItems: "center",
        }} title="Download">
          <Download size={11} strokeWidth={1.8} />
        </a>
        <button onClick={onRemove} style={{ ...styles.miniIconBtn, color: T.flag }} title="Delete">
          <Trash2 size={11} strokeWidth={1.8} />
        </button>
      </div>
    </div>
  );
}

        margin: "4px 0 4px", fontSize: 28, fontWeight: 600,

// Section-style context — every Card with a sectionId exposes its
// resolved style via this context so descendants (inputs, table cells, etc.)
// can opt in to per-section overrides if they want.
const SectionStyleContext = React.createContext(null);

// Clinical context — provided ONLY by ExamRoom around the chart.
// Exposes per-patient hidden-sections list + mutators.
// When a Card sits inside this context it auto-enables a collapse chevron
// and (if it has a sectionId) a delete icon.
const ClinicalContext = React.createContext(null);

function Card({ title, icon, accent, children, right, sectionId, collapsible, deletable, defaultCollapsed }) {
  // Read overrides from window.__appSettings (kept in sync by App via effect)
  const ss = (window.__appSettings && window.__appSettings.sectionStyles) || {};
  const ov = (sectionId && ss[sectionId]) || null;

  // In a clinical context, sections are collapsible and (if identifiable) deletable
  // by default. Outside clinical context (e.g. Settings, Intake), keep the original
  // behaviour: no chevron, no trash.
  const clinical = React.useContext(ClinicalContext);
  const allowCollapse = collapsible !== undefined ? collapsible : !!clinical;
  const allowDelete   = deletable   !== undefined ? deletable   : (!!clinical && !!sectionId);

  const [collapsed, setCollapsed] = useState(!!defaultCollapsed);

  // Hidden by patient — render a tiny placeholder so the doctor knows it can be restored
  if (clinical && sectionId && clinical.hiddenSections.includes(sectionId)) {
    return null; // ExamRoom shows a "restore hidden sections" banner separately
  }

  const finalAccent = (ov && ov.accent) || accent || T.teal;
  const finalBg     = (ov && ov.bgColor) || T.card;
  const finalColor  = (ov && ov.color) || T.ink;
  const finalFont   = (ov && ov.fontSize) || null;
  const finalBold   = ov ? ov.bold : null;

  const sectionStyle = {
    background: finalBg, borderRadius: 14,
    border: `1px solid ${T.line}`,
    borderTop: `3px solid ${finalAccent}`,
    padding: collapsed ? "10px 18px" : "16px 18px",
    boxShadow: `0 1px 8px ${hexAlpha(T.ink, 0.04)}`,
    color: finalColor,
    transition: "padding 0.15s ease",
    ...(finalFont ? { fontSize: finalFont } : {}),
    ...(finalBold === true ? { fontWeight: 600 } : (finalBold === false ? { fontWeight: 400 } : {})),
    position: "relative",
  };

  return (
    <SectionStyleContext.Provider value={ov}>
      <section style={sectionStyle} data-section-id={sectionId || ""}>
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "center",
          marginBottom: collapsed ? 0 : 14, gap: 10, flexWrap: "wrap",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0, flex: 1 }}>
            {allowCollapse && (
              <button
                onClick={() => setCollapsed(c => !c)}
                title={collapsed ? "Expand section" : "Collapse section"}
                style={{
                  width: 26, height: 26, borderRadius: 6,
                  border: `1px solid ${T.lineSoft}`,
                  background: T.paperWarm, color: T.inkSoft,
                  display: "grid", placeItems: "center",
                  cursor: "pointer", flexShrink: 0,
                  transition: "transform 0.15s ease",
                }}>
                {collapsed
                  ? <ChevronRight size={14} strokeWidth={2} />
                  : <ChevronDown  size={14} strokeWidth={2} />}
              </button>
            )}
            {icon && (
              <span style={{
                width: 28, height: 28, borderRadius: 8,
                display: "grid", placeItems: "center",
                background: hexAlpha(finalAccent, 0.12),
                color: finalAccent, flexShrink: 0,
              }}>{icon}</span>
            )}
            <h3 style={{
              margin: 0, fontFamily: "'Fraunces', Georgia, serif",
              fontSize: finalFont ? finalFont + 3 : 16.5,
              fontWeight: finalBold === false ? 500 : 600,
              color: finalColor, letterSpacing: "-0.005em",
              minWidth: 0, overflow: "hidden", textOverflow: "ellipsis",
            }}>{title}</h3>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {right}
            {allowDelete && clinical && (
              <button
                onClick={() => {
                  if (window.confirm("Hide this section from this patient's chart? You can restore it from the 'Hidden sections' banner.\n\nإخفاء هذا القسم من ملف المريض؟")) {
                    clinical.hideSection(sectionId);
                  }
                }}
                title="Hide section · إخفاء القسم"
                style={{
                  width: 26, height: 26, borderRadius: 6,
                  border: `1px solid ${hexAlpha(T.flag, 0.25)}`,
                  background: "transparent", color: T.flag,
                  display: "grid", placeItems: "center",
                  cursor: "pointer", flexShrink: 0,
                }}>
                <Trash2 size={12} strokeWidth={1.8} />
              </button>
            )}
          </div>
        </div>
        {!collapsed && <div>{children}</div>}
      </section>
    </SectionStyleContext.Provider>
  );
}

// AutoTextarea — auto-expanding. Supports redStyle + singleLineHint props.
function AutoTextarea({ value, onChange, placeholder, minRows = 2, redStyle, singleLineHint, title }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.height = "auto";
    el.style.height = Math.max(el.scrollHeight, singleLineHint ? 38 : 60) + "px";
  }, [value, singleLineHint]);
  const baseStyle = singleLineHint
    ? {
        ...styles.workspaceInput,
        resize: "none",
        overflow: "hidden",
        minHeight: 38,
        lineHeight: 1.45,
        fontFamily: "inherit",
      }
    : {
        width: "100%",
        padding: "10px 12px",
        borderRadius: 10,
        border: `1px solid ${T.line}`,
        background: T.card,
        color: T.ink,
        fontSize: 13,
        lineHeight: 1.55,
        outline: "none",
        resize: "none",
        overflow: "hidden",
        minHeight: 60,
        fontFamily: "inherit",
      };
  return (
    <textarea
      ref={ref}
      rows={minRows}
      style={{
        ...baseStyle,
        ...(redStyle ? { background: T.flagBg, color: T.flag, fontWeight: 700, border: `1.5px solid ${T.flag}` } : {}),
      }}
      value={value || ""}
      placeholder={placeholder}
      title={title}
      onChange={(e) => onChange(e.target.value)}
    />
  );
}
