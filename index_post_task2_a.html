function ObstetricsTemplate({ patient, updatePatient, episode, update, dictAPI, appSettings, clinicSettings }) {
  const d = getData(episode);
  const set = (patch) => setData(update, episode, patch);
  const [availableMeds, setAvailableMeds] = useState(() => {
    try {
      const raw = window.localStorage.getItem(RX_MEDS_KEY);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    } catch {}
    return DEFAULT_RX_MEDS;
  });
  const [rxBundles, setRxBundles] = useState(() => {
    try {
      const raw = window.localStorage.getItem(RX_BUNDLES_KEY);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    } catch {}
    return DEFAULT_RX_BUNDLES;
  });

  useEffect(() => {
    try { window.localStorage.setItem(RX_MEDS_KEY, JSON.stringify(availableMeds)); } catch {}
  }, [availableMeds]);
  useEffect(() => {
    try { window.localStorage.setItem(RX_BUNDLES_KEY, JSON.stringify(rxBundles)); } catch {}
  }, [rxBundles]);

  useEffect(() => {
    const syncRxCatalog = () => {
      try {
        const rawM = window.localStorage.getItem(RX_MEDS_KEY);
        const pm = rawM ? JSON.parse(rawM) : null;
        if (Array.isArray(pm)) setAvailableMeds(pm.length > 0 ? pm : DEFAULT_RX_MEDS);
      } catch {}
      try {
        const rawB = window.localStorage.getItem(RX_BUNDLES_KEY);
        const pb = rawB ? JSON.parse(rawB) : null;
        if (Array.isArray(pb)) setRxBundles(pb.length > 0 ? pb : DEFAULT_RX_BUNDLES);
      } catch {}
    };
    window.addEventListener("storage", syncRxCatalog);
    window.addEventListener("fms-rx-catalog-updated", syncRxCatalog);
    return () => {
      window.removeEventListener("storage", syncRxCatalog);
      window.removeEventListener("fms-rx-catalog-updated", syncRxCatalog);
    };
  }, []);

  const handleAddNewMed = useCallback(() => {
    const typed = window.prompt("Enter new medication (name - dose - frequency):");
    if (!typed) return -1;
    const med = typed.trim();
    if (!med) return -1;
    const existingIdx = availableMeds.findIndex((m) => String(m).toLowerCase() === med.toLowerCase());
    if (existingIdx >= 0) return existingIdx;
    const next = [...availableMeds, med];
    setAvailableMeds(next);
    return next.length - 1;
  }, [availableMeds]);

  const handleCreateBundle = useCallback((currentRxText) => {
    const bundleNameRaw = window.prompt("Bundle name (e.g., IVF Protocol):");
    if (!bundleNameRaw) return -1;
    const name = bundleNameRaw.trim();
    if (!name) return -1;
    const fromCurrent = String(currentRxText || "")
      .split("\n")
      .map(s => s.replace(/^\d+\.\s*/, "").trim())
      .filter(Boolean);
    let meds = fromCurrent;
    if (meds.length === 0) {
      const medsRaw = window.prompt("Enter medications (comma-separated):");
      if (!medsRaw) return -1;
      meds = medsRaw.split(",").map(s => s.trim()).filter(Boolean);
    }
    if (meds.length === 0) return -1;
    const existingIdx = rxBundles.findIndex((b) => String(b?.name || "").toLowerCase() === name.toLowerCase());
    if (existingIdx >= 0) return existingIdx;
    const next = [...rxBundles, { name, meds }];
    setRxBundles(next);
    meds.forEach((m) => {
      if (!availableMeds.some((x) => String(x).toLowerCase() === String(m).toLowerCase())) {
        setAvailableMeds((prev) => [...prev, m]);
      }
    });
    return next.length - 1;
  }, [rxBundles, availableMeds]);

  // Rx printing — when a visit row's "Print Rx" button is clicked we open
  // a modal preview of the prescription. The CSS @media print rule in
  // GlobalCSS hides everything except the #rx-print-area div, so window.print()
  // produces a clean Rx slip aligned to the doctor's pre-printed paper.
  const [rxPrintVisit, setRxPrintVisit] = useState(null);

  const origin = d.origin || "LMP";
  const anchor = d.anchorDate || "";
  const setOrigin = (key) => set({ origin: key });
  const setAnchor = (v) => set({ anchorDate: v });

  const currentGA = useMemo(() => gaFromOrigin(origin, anchor), [origin, anchor]);
  const computedEDD = useMemo(() => eddFromOrigin(origin, anchor), [origin, anchor]);
  const eddDisplay = d.eddOverride || computedEDD;

  const visits = d.visits || [];
  const orderedVisits = useMemo(
    () => [...visits].sort((a, b) => (a.date || "").localeCompare(b.date || "")),
    [visits]
  );

  const addVisit = () => {
    const today = todayISO();
    const ga = gaFromOrigin(origin, anchor, today);
    // Carry forward "Active Medications" — copy the Rx (tx) from the most
    // recent visit into the new visit so the doctor doesn't have to re-type
    // ongoing prescriptions. Sorted ascending so the last item is newest.
    const lastVisit = orderedVisits.length > 0 ? orderedVisits[orderedVisits.length - 1] : null;
    const carriedTx = lastVisit ? (lastVisit.tx || "") : "";
    const v = {
      id: uid(), date: today, ga: ga ? ga.label : "",
      bp: "", weight: "", co: "",
      examUS: "", tx: carriedTx, investigations: "", notes: "",
      labs: [],
      extraFields: [], customSections: [],
    };
    set({ visits: [...visits, v] });
  };
  const updateVisit = (id, patch) => {
    let nextPatch = patch;
    if (Object.prototype.hasOwnProperty.call(patch, "date")) {
      const ga = gaFromOrigin(origin, anchor, patch.date);
      nextPatch = { ...patch, ga: ga ? ga.label : "" };
    }
    set({ visits: visits.map(v => v.id === id ? { ...v, ...nextPatch } : v) });
  };
  const deleteVisit = (id) => {
    if (!window.confirm("Delete this visit?")) return;
    set({ visits: visits.filter(v => v.id !== id) });
  };

  // (The legacy "Milestone Scans" card was removed in v5.5 — its
  // data shape `d.milestones` is preserved on existing episode records
  // but is no longer rendered. Use the 1st Trimester / 2nd Trimester
  // accordion templates below instead.)

  const rhNeg = isRhNegative(patient.bloodGroup);
  const antiDDue = rhNeg && isAntiDWindow(currentGA);

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <Card sectionId="obs.dating" title={<>Pregnancy Origin & Dating · <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft }}>تاريخ الحمل</span></>}
        icon={<Calendar size={15} strokeWidth={1.6} />} accent={T.teal}>
        <div style={styles.dateGrid}>
          <Field label={<>Pregnancy Origin · <span style={{ direction: "rtl", color: T.inkSoft }}>المرجع</span></>}>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {ORIGIN_OPTIONS.map(opt => (
                <button key={opt.key} type="button" onClick={() => setOrigin(opt.key)}
                  style={{
                    padding: "7px 12px", borderRadius: 8,
                    border: `1px solid ${origin === opt.key ? T.teal : T.line}`,
                    background: origin === opt.key ? T.tealSoft : T.card,
                    color: origin === opt.key ? T.tealDeep : T.inkSoft,
                    fontSize: 12, fontWeight: origin === opt.key ? 700 : 500,
                    display: "flex", flexDirection: "column", gap: 2, alignItems: "flex-start", lineHeight: 1.2,
                    cursor: "pointer",
                  }}>
                  <span>{opt.label}</span>
                  <span style={{ direction: "rtl", fontSize: 10.5, opacity: 0.85 }}>{opt.arLabel}</span>
                </button>
              ))}
            </div>
          </Field>
          <Field label={<>Anchor date · <span style={{ direction: "rtl", color: T.inkSoft }}>التاريخ</span></>}>
            <input
              type="date"
              style={styles.input}
              value={anchor}
              onChange={(e) => {
                const newDate = e.target.value;
                const newLmp = originToLMP(origin, newDate);
                const newEdd = eddFromLMP(newLmp);
                set({
                  anchorDate: newDate,
                  calculatedLMP: newLmp,
                  calculatedEDD: newEdd,
                });
              }}
            />
          </Field>
          <Field label={<>EDD · <span style={{ direction: "rtl", color: T.inkSoft }}>موعد الولادة</span></>}>
            <input type="date" style={styles.input} value={eddDisplay} onChange={(e) => set({ eddOverride: e.target.value })} />
          </Field>
          <Field label={<>Current GA · <span style={{ direction: "rtl", color: T.inkSoft }}>سن الحمل</span></>}>
            <div style={{ ...styles.calcPill, background: T.tealSoft, color: T.tealDeep, borderColor: hexAlpha(T.teal, 0.3) }}>
              {currentGA ? `${currentGA.label} weeks` : "Set anchor →"}
            </div>
          </Field>
          <Field label={<>Confirmed gender · <span style={{ direction: "rtl", color: T.inkSoft }}>الجنس</span></>}>
            <input style={styles.input} value={d.gender || ""} onChange={(e) => set({ gender: e.target.value })} placeholder="e.g. Female (20 weeks)" />
          </Field>
        </div>
        {antiDDue && <AntiDBanner />}
      </Card>

      {/* ===== 1st Trimester Scan accordion (collapsed by default, 3-col grid) ===== */}
      <Card
        sectionId="obs.firstTriScan"
        title={<>1st Trimester Scan · <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft }}>سونار الثلث الأول</span> <span style={{ fontSize: 11, color: T.inkSoft, fontWeight: 500, marginLeft: 6 }}>(11–13<sup>+6</sup> wk)</span></>}
        icon={<Activity size={15} strokeWidth={1.6} />}
        accent={T.coral}
        collapsible defaultCollapsed>
        <FirstTrimesterScanFields
          data={d.firstTriScan || {}}
          onChange={(patch) => set({ firstTriScan: { ...(d.firstTriScan || {}), ...patch } })}
          patient={patient}
          updatePatient={updatePatient}
          flagScope={`obs:${episode.id}:firstTri`}
          flagLabel="1st Tri"
        />
      </Card>

      {/* ===== 2nd Trimester Anomaly Scan accordion (collapsed by default, 3-col grid) ===== */}
      <Card
        sectionId="obs.anomalyScan"
        title={<>2nd Trimester Anomaly Scan · <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft }}>سونار التشوهات</span> <span style={{ fontSize: 11, color: T.inkSoft, fontWeight: 500, marginLeft: 6 }}>(18–22 wk)</span></>}
        icon={<Microscope size={15} strokeWidth={1.6} />}
        accent={T.tealDeep}
        collapsible defaultCollapsed>
        <SecondTrimesterScanFields
          data={d.anomalyScan || {}}

        countLabel={<>{orderedVisits.length} visit{orderedVisits.length === 1 ? "" : "s"}</>}

// ============================================================
// VISIT / CHART IMAGE GALLERY (film strip + lightbox)
// Saved as { id, name?, dataUrl, addedAt }[] on episode.visit or episode root.
// ============================================================
function VisitImagingGallery({ images, onUpdateImages }) {
  const fileRef = useRef(null);
  const [lightboxIdx, setLightboxIdx] = useState(null);
  const list = Array.isArray(images) ? images : [];

  const addFiles = async (files) => {
    const picks = Array.from(files || []).filter((f) => f && f.type && f.type.startsWith("image/"));
    if (!picks.length) return;
    let next = [...list];
    for (const f of picks) {
      if (next.length >= 30) break;
      if (f.size > 6 * 1024 * 1024) {
        window.alert(`Skipping "${f.name}" (max ~6 MB).`);
        continue;
      }
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(f);
      });
      next.push({
        id: uid(),
        name: f.name || "Ultrasound",
        dataUrl,
        addedAt: new Date().toISOString(),
      });
    }
    onUpdateImages(next);
  };

  const cur = typeof lightboxIdx === "number" && list[lightboxIdx] ? list[lightboxIdx] : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 10 }}>
      <input
        ref={fileRef}
        type="file"
        accept="image/*"
        multiple
        style={{ display: "none" }}
        onChange={(e) => {
          addFiles(e.target.files);
          e.target.value = "";
        }}
      />
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
        <button type="button" onClick={() => fileRef.current && fileRef.current.click()}
          style={{
            display: "inline-flex", alignItems: "center", gap: 6,
            padding: "6px 12px", borderRadius: 8,
            background: hexAlpha(T.tealDeep, 0.08), color: T.tealDeep,
            border: `1px solid ${hexAlpha(T.tealDeep, 0.35)}`,
            fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit",
          }}>
          <Image size={14} strokeWidth={2} /> Add ultrasound / images
        </button>
        <span style={{ fontSize: 11, color: T.inkSoft }}>{list.length} file{list.length === 1 ? "" : "s"}</span>
      </div>
      {list.length > 0 && (
        <div style={{
          display: "flex", flexDirection: "row", gap: 8, overflowX: "auto",
          padding: "8px 4px", borderRadius: 10, background: T.paperWarm,
          border: `1px solid ${T.lineSoft}`, WebkitOverflowScrolling: "touch",
        }}>
          {list.map((im, idx) => (
            <div key={im.id || idx} style={{ position: "relative", flexShrink: 0, width: 88, height: 72 }}>
              <button type="button" onClick={() => setLightboxIdx(idx)}
                style={{
                  width: "100%", height: "100%", padding: 0, borderRadius: 8, overflow: "hidden",
                  border: `2px solid ${T.line}`, cursor: "pointer", background: T.card,
                }}>
                <img src={im.dataUrl} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
              </button>
              <button type="button" aria-label="Remove"
                onClick={() => {
                  onUpdateImages(list.filter((x) => x.id !== im.id));
                  setLightboxIdx(null);
                }}
                style={{
                  position: "absolute", top: 2, right: 2, width: 24, height: 24,
                  borderRadius: "50%", background: hexAlpha(T.ink, 0.68), color: "#fff",
                  border: "none", cursor: "pointer", fontSize: 14, fontWeight: 700,
                  display: "grid", placeItems: "center", lineHeight: 1,
                }}>×</button>
            </div>
          ))}
        </div>
      )}
      {cur && (
        <div role="presentation" onClick={() => setLightboxIdx(null)}
          style={{
            position: "fixed", inset: 0, background: hexAlpha(T.ink, 0.88), zIndex: 200,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
          }}>
          <button type="button" onClick={() => setLightboxIdx(null)}
            style={{
              position: "fixed", top: 16, right: 16, width: 44, height: 44, borderRadius: 999,
              background: "#fff", border: `1px solid ${T.line}`, cursor: "pointer",
              fontSize: 22, fontWeight: 700, color: T.ink,
            }} aria-label="Close">×</button>
          <div onClick={(e) => e.stopPropagation()} style={{ maxWidth: "100%", textAlign: "center" }}>
            <img src={cur.dataUrl} alt="" style={{ maxWidth: "100%", maxHeight: "82vh", objectFit: "contain", borderRadius: 6 }} />
            <div style={{ color: "#dbeae7", marginTop: 10, fontSize: 13 }}>{cur.name || "Imaging"}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function IxPopoverAnchor({ open, anchorRect, onClose, title, children }) {
  const panelRef = useRef(null);
  useLayoutEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    const onDown = (e) => {
      if (panelRef.current && panelRef.current.contains(e.target)) return;
      if (e.target.closest && e.target.closest(".fms-ix-badge")) return;
      onClose();
    };
    document.addEventListener("keydown", onKey);
    document.addEventListener("mousedown", onDown);
    return () => {
      document.removeEventListener("keydown", onKey);
      document.removeEventListener("mousedown", onDown);
    };
  }, [open, onClose]);
  if (!open || !anchorRect) return null;
  const top = Math.min(anchorRect.bottom + 8, window.innerHeight - 24);
  const left = Math.max(10, Math.min(anchorRect.left, window.innerWidth - 410));

function ObsLogbookRow({ visit, calculatedLMP, availableMeds, rxBundles, onAddNewMed, onCreateBundle, ordinal, appSettings, clinicSettings, patient, updatePatient, dictAPI, onUpdate, onDelete, onPrintRx }) {
  const v = visit;
  const bpHigh = isBPHigh(v.bp);
  const library = (appSettings && appSettings.labChips) || [];
  const ixBundlesObs = useIxBundlesLive();
  const gaLive = (calculatedLMP && v.date) ? gaFromLMP(calculatedLMP, v.date) : null;
  const gaLabel = gaLive ? gaLive.label : "";
  const [selectedMed, setSelectedMed] = useState("");
  const [selectedBundle, setSelectedBundle] = useState("");
  const [rxPadOpen, setRxPadOpen] = useState(false);
  const rxPadRef = useRef(null);

  // Lab Picker modal state — opens a centered overlay listing the
  // user's Lab Library so they can pick which labs to add to this
  // visit. Selected labs become structured rows (v.labs[]) with an
  // inline value input each; the free-text "investigations" textarea
  // is preserved below for any addenda that don't fit the structure.
  const [labPickerOpen, setLabPickerOpen] = useState(false);
  const [ixPop, setIxPop] = useState(null);

  // Structured labs for this visit. Each entry: { id, labelId, label, unit, value }
  const visitLabs = v.labs || [];

  const addLabsFromPicker = (chosen) => {
    const existingIds = new Set(visitLabs.map(l => l.labelId));
    const additions = chosen
      .filter(l => !existingIds.has(l.id))
      .map(l => ({
        id: uid(),
        labelId: l.id,
        label: l.label,
        unit: l.unit || "",
        value: "",
      }));
    if (additions.length > 0) {
      onUpdate({ labs: [...visitLabs, ...additions] });
    }
  };
  const updateLab = (labId, patch) => {
    onUpdate({ labs: visitLabs.map(l => l.id === labId ? { ...l, ...patch } : l) });
  };
  const removeLab = (labId) => {
    onUpdate({ labs: visitLabs.filter(l => l.id !== labId) });
  };

  // Apply parsed labs from the global Scan button. Maps OCR hits to
  // structured v.labs entries when matched against the user's Lab
  // Library (so they appear in the MIP pivot view), and appends a
  // human-readable summary line per hit to the free-text
  // investigations field (so the regex fallback also catches them).
  const applyOCRPayload = ({ structuredLabs, confirmedLines }) => {
    const existingIds = new Set(visitLabs.map(l => l.labelId).filter(Boolean));
    const newStructured = (structuredLabs || [])
      .filter(s => !existingIds.has(s.labelId))
      .map(s => ({ id: uid(), labelId: s.labelId, label: s.label, unit: s.unit || "", value: s.value || "" }));

    // For labs that already exist in this visit, update the value in place
    // rather than duplicating — keeps the pivot view clean.
    const updatedExisting = visitLabs.map(l => {
      const match = (structuredLabs || []).find(s => s.labelId === l.labelId);
      if (!match) return l;
      return { ...l, value: match.value, unit: match.unit || l.unit };
    });

    const nextLabs = [...updatedExisting, ...newStructured];

    // Append OCR summary lines to free-text investigations
    const stamp = `[Scanned ${fmtDateLab(todayISO())}]`;
    const newText = (confirmedLines || []).join("\n");
    const nextInvestigations = newText
      ? ((v.investigations || "").trim()
          ? `${v.investigations.trim()}\n\n${stamp}\n${newText}`
          : `${stamp}\n${newText}`)
      : v.investigations;

    onUpdate({ labs: nextLabs, investigations: nextInvestigations });
  };
  const rxItems = (v.tx || "")
    .split("\n")
    .map((s) => s.replace(/^\d+\.\s*/, "").trim())
    .filter(Boolean);
  const appendRxItems = (items) => {
    const cleaned = (items || []).map((x) => String(x || "").trim()).filter(Boolean);
    if (cleaned.length === 0) return;
    const merged = [...rxItems];
    cleaned.forEach((item) => {
      if (!merged.some((m) => m.toLowerCase() === item.toLowerCase())) merged.push(item);
    });
    onUpdate({ tx: merged.join("\n") });
  };
  const applyPrescriptionPad = () => {
    const b = selectedBundle;
    const m = selectedMed;
    if (b === "__create_new_bundle__") {
      const idx = typeof onCreateBundle === "function" ? onCreateBundle(v.tx || "") : -1;
      if (idx >= 0 && Array.isArray(rxBundles) && rxBundles[idx]) {
        appendRxItems(rxBundles[idx].meds || []);
      }
    } else if (b) {
      const bundle = (rxBundles || []).find((x) => x.name === b);
      if (bundle && Array.isArray(bundle.meds)) appendRxItems(bundle.meds);
    }
    if (b) setSelectedBundle("");
    if (m === "__add_new_med__") {
      const idx = typeof onAddNewMed === "function" ? onAddNewMed() : -1;
      if (idx >= 0 && Array.isArray(availableMeds) && availableMeds[idx]) {
        appendRxItems([availableMeds[idx]]);
      }
    } else if (m) {
      appendRxItems([m]);
    }
    if (m) setSelectedMed("");
  };

  useEffect(() => {
    if (!rxPadOpen) return;
    const onDocDown = (e) => {
      if (rxPadRef.current && !rxPadRef.current.contains(e.target)) setRxPadOpen(false);
    };
    document.addEventListener("mousedown", onDocDown);
    return () => document.removeEventListener("mousedown", onDocDown);
  }, [rxPadOpen]);
  const shareRxViaWhatsApp = () => {
    const phone = String(patient?.mobile || "").replace(/[^\d]/g, "");
    if (!phone) {
      alert("No mobile number on file for this patient.\nلا يوجد رقم موبايل مسجل.");
      return;
    }
    if (rxItems.length === 0) {
      alert("No medications to share yet.");
      return;
    }
    const numbered = rxItems.map((item, i) => `${i + 1}. ${item}`).join("\n");
    const head = formatClinicBrandingBlock(clinicSettings);
    const msg = (head ? `${head}\n\n` : "") + `Rx for ${patient?.nameEn || "Patient"} (${v.date || todayISO()}):\n${numbered}`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
  };

  return (
    <tr style={styles.obsLogTr}>
      <td data-label="#" style={{ ...styles.obsLogTd, textAlign: "center", fontWeight: 700, color: T.ochre, alignItems: "center", justifyContent: "center" }}>{ordinal}</td>

      {/* Date */}
      <td data-label="Date · التاريخ" style={styles.obsLogTd}>
        <input
          type="date"
          style={styles.obsLogInput}
          value={v.date || ""}
          onChange={(e) => onUpdate({ date: e.target.value })}
        />
      </td>

      {/* GA — auto-derived */}

// Compact auto-growing textarea used inside each visit row.
function ObsLogbookCell({ value, onChange, placeholder }) {

  );
}


// ============================================================
// AutocompleteCell — typing-driven dropdown for visit logbook cells.
//
// Behavior:
//  - Renders the same auto-grow textarea as ObsLogbookCell.
//  - When focused, shows a dropdown of suggestions filtered by the
//    text typed AFTER the last "·" or newline separator (so the user
//    can layer multiple findings into one cell — e.g. typing "Headache · nau"
//    suggests "Nausea / vomiting" matching just "nau").
//  - Clicking a suggestion APPENDS it (with " · " separator) so the
//    user can stack multiple findings without erasing what's there.
//  - "+ Add to library" appears when the typed fragment is non-empty
//    and doesn't exactly match an existing item — clicking saves it
//    globally via dictAPI.dictAddItem(dictionaryKey, ...) so it's
//    available for future visits AND manageable in Settings.
//
// All seed phrases (DICT_DEFAULTS) and user-saved phrases (dictAPI)
// are pooled into one searchable list. The dropdown is keyboard-friendly
// (↑/↓ to move, Enter to pick, Esc to close).
// ============================================================
function AutocompleteCell({ value, onChange, placeholder, dictAPI, dictionaryKey, defaults }) {
  const ref = useRef(null);
  const wrapRef = useRef(null);
  const [open, setOpen] = useState(false);
  const [highlight, setHighlight] = useState(0);

  // Auto-grow the textarea
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.height = "auto";
    el.style.height = Math.min(220, Math.max(36, el.scrollHeight)) + "px";
  }, [value]);

  // Pool every available suggestion: seed groups (editable in v6.8) + user-saved items.
  const allSuggestions = useMemo(() => {
    // Read live appSettings via window slot so seed edits are picked up
    // without prop-drilling through every visit row.
    const liveAppSettings = (typeof window !== "undefined" && window.__appSettings) ? window.__appSettings : null;
    const overriddenGroups = liveAppSettings ? resolveSeedGroups(liveAppSettings, dictionaryKey) : null;
    const groups = (overriddenGroups && overriddenGroups.length > 0)
      ? overriddenGroups
      : (defaults || DICT_DEFAULTS[dictionaryKey] || []);
    const flagSet = liveAppSettings ? flaggedPhrasesFor(liveAppSettings, dictionaryKey) : new Set();
    const out = [];
    groups.forEach(g => (g.items || []).forEach(it => out.push({
      text: it, group: g.group, flagged: flagSet.has(it),
    })));
    const custom = (dictAPI && dictAPI.dict && dictAPI.dict[dictionaryKey]) || [];
    custom.forEach(it => out.push({
      text: it, group: "Saved", custom: true, flagged: flagSet.has(it),
    }));
    return out;
  }, [defaults, dictionaryKey, dictAPI?.dict]);

  // Identify the "current fragment" — text after the last separator.
  // This is what we filter suggestions against and what we replace
  // when the user picks a suggestion.
  const fragmentInfo = useMemo(() => {
    const v = value || "";
    // Find the last separator: " · " or newline
    let sepIdx = -1;
    const dotSep = v.lastIndexOf(" · ");
    const nlSep = v.lastIndexOf("\n");
    sepIdx = Math.max(dotSep === -1 ? -1 : dotSep + 3, nlSep === -1 ? -1 : nlSep + 1);
    if (sepIdx < 0) sepIdx = 0;
    const prefix = v.slice(0, sepIdx);
    const fragment = v.slice(sepIdx);
    return { prefix, fragment };
  }, [value]);

  // Filter suggestions by the current fragment. Empty fragment = show all.
  const filtered = useMemo(() => {
    const q = fragmentInfo.fragment.trim().toLowerCase();
    if (!q) return allSuggestions.slice(0, 30);
    return allSuggestions.filter(s => s.text.toLowerCase().includes(q)).slice(0, 30);
  }, [allSuggestions, fragmentInfo.fragment]);

  const exactMatch = filtered.some(s => s.text.toLowerCase() === fragmentInfo.fragment.trim().toLowerCase());
  const canSaveNew = fragmentInfo.fragment.trim().length >= 2 && !exactMatch;

  // Reset highlight whenever the filtered list changes
  useEffect(() => { setHighlight(0); }, [fragmentInfo.fragment]);

  // Click-outside closes the dropdown
  useEffect(() => {
    if (!open) return;
    const onDocDown = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", onDocDown);
    return () => document.removeEventListener("mousedown", onDocDown);
  }, [open]);

  const pickSuggestion = (text) => {
    // Replace current fragment with the picked phrase. If there was previous
    // content and we're appending, the prefix already ends in " · " or "\n",
    // so just concatenate.
    const next = fragmentInfo.prefix + text;
    onChange(next);
    setOpen(false);
    // Re-focus the textarea so the user can continue typing
    setTimeout(() => { if (ref.current) ref.current.focus(); }, 0);
  };

  const saveAndPick = () => {
    const text = fragmentInfo.fragment.trim();
    if (!text || !dictAPI || !dictAPI.dictAddItem) return;
    dictAPI.dictAddItem(dictionaryKey, text);
    // Don't change the textarea content — the user already typed it.
    setOpen(false);
  };

  const onKeyDown = (e) => {
    if (!open && (e.key === "ArrowDown" || e.key === "ArrowUp")) {
      setOpen(true);
      e.preventDefault();
      return;
    }
    if (!open) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      setHighlight(h => Math.min(h + 1, filtered.length - 1));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setHighlight(h => Math.max(h - 1, 0));
    } else if (e.key === "Enter" && filtered[highlight]) {
      e.preventDefault();
      pickSuggestion(filtered[highlight].text);
    } else if (e.key === "Escape") {
      setOpen(false);
    }
  };

  return (
    <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
      <textarea
        ref={ref}
        value={value || ""}
        onChange={(e) => { onChange(e.target.value); if (!open) setOpen(true); }}
        onFocus={() => setOpen(true)}
        onKeyDown={onKeyDown}
        placeholder={placeholder}
        rows={1}
        style={{
          width: "100%",
          minHeight: 36,
          padding: "6px 8px",
          borderRadius: 6,
          border: `1px solid ${open ? T.teal : T.line}`,
          background: T.card,
          color: T.ink,
          fontSize: 12,
          lineHeight: 1.4,
          fontFamily: "inherit",
          resize: "vertical",
          outline: "none",
          boxSizing: "border-box",
        }}
      />

      {open && (filtered.length > 0 || canSaveNew) && (
        <div style={{
          position: "absolute",
          top: "calc(100% + 2px)", left: 0, right: 0,
          zIndex: 50,
          maxHeight: 240, overflowY: "auto",
          background: T.card,
          border: `1px solid ${T.teal}`,
          borderRadius: 8,
          boxShadow: `0 8px 24px ${hexAlpha(T.ink, 0.15)}`,
          padding: 4,
        }}>
          {filtered.map((s, i) => (
            <button
              key={`${s.text}-${i}`}
              type="button"
              onMouseDown={(e) => { e.preventDefault(); pickSuggestion(s.text); }}
              onMouseEnter={() => setHighlight(i)}
              style={{
                display: "flex", alignItems: "center", gap: 8,
                width: "100%", textAlign: "left",
                padding: "6px 10px", borderRadius: 5,
                border: "none",
                background: i === highlight ? T.tealSoft : (s.flagged ? hexAlpha(T.flag, 0.06) : "transparent"),
                color: T.ink,
                fontSize: 12, fontFamily: "inherit",
                cursor: "pointer",
              }}>
              {s.flagged && (
                <Flag size={10} strokeWidth={2.2} fill={T.flag} style={{ color: T.flag, flexShrink: 0 }} />
              )}
              <span style={{
                flex: 1, minWidth: 0,
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
              }}>
                {s.text}
              </span>
              <span style={{
                fontSize: 9.5,
                color: s.flagged ? T.flag : (s.custom ? T.coral : T.inkSoft),
                fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase",
                flexShrink: 0,
              }}>
                {s.flagged ? "Auto-flag" : (s.custom ? "Saved" : s.group)}
              </span>
            </button>
          ))}

          {canSaveNew && (
            <button
              type="button"
              onMouseDown={(e) => { e.preventDefault(); saveAndPick(); }}
              style={{
                display: "flex", alignItems: "center", gap: 8,
                width: "100%", textAlign: "left",
                padding: "8px 10px", borderRadius: 5,
                border: "none",
                marginTop: 4,
                borderTop: filtered.length > 0 ? `1px dashed ${T.lineSoft}` : "none",
                background: T.ochreSoft,
                color: T.ochre,
                fontSize: 12, fontFamily: "inherit", fontWeight: 700,
                cursor: "pointer",
              }}>
              <Plus size={11} strokeWidth={2.2} />
              <span>Add "<em style={{ color: T.ink, fontStyle: "normal" }}>{fragmentInfo.fragment.trim()}</em>" to library</span>
            </button>
          )}
        </div>
      )}
    </div>
  );
}


// ============================================================
// OCR — global investigation scanner
// Runs Tesseract on an image file or PDF, parses for labs, and
// returns the raw text + structured suggestions. Reused by the
// "Scan Labs" button on every Investigations cell across all
// templates (Obs / Infertility / Gynae / IVF Stim / FET).
// ============================================================
async function runOCROnFile(file, { onProgress } = {}) {
  if (!window.Tesseract) {
    throw new Error("OCR engine not loaded. Check your internet connection and refresh.");
  }
  const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name || "");
  let combinedText = "";

  if (isPdf) {
    if (!window.pdfjsLib) throw new Error("PDF engine not loaded. Refresh and try again.");
    const buf = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
    const pages = Math.min(pdf.numPages, 10); // cap for performance
    for (let pageNum = 1; pageNum <= pages; pageNum++) {
      const page = await pdf.getPage(pageNum);
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement("canvas");
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext("2d");
      await page.render({ canvasContext: ctx, viewport }).promise;
      const result = await window.Tesseract.recognize(canvas, "eng+ara", {
        logger: (m) => {
          if (m.status === "recognizing text" && typeof m.progress === "number" && onProgress) {
            const base = (pageNum - 1) / pages;
            const inc = m.progress / pages;
            onProgress(Math.round((base + inc) * 100));
          }
        },
      });
      combinedText += `\n--- Page ${pageNum} ---\n` + (result?.data?.text || "");
    }
  } else {
    // Image path — read into a data URL Tesseract can consume.
    const dataUrl = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = () => reject(r.error);
      r.readAsDataURL(file);
    });
    const result = await window.Tesseract.recognize(dataUrl, "eng+ara", {
      logger: (m) => {
        if (m.status === "recognizing text" && typeof m.progress === "number" && onProgress) {
          onProgress(Math.round(m.progress * 100));
        }
      },
    });
    combinedText = result?.data?.text || "";
  }

  const rawText = combinedText.trim();
  // Pattern-based extraction (fixed set of well-known labs)
  const patternHits = extractOCRSuggestions(rawText);
  return { rawText, suggestions: patternHits };
}

// ============================================================
// ScanLabsButton — global Camera/Scan button.
// Drops onto any Investigations cell. On click, prompts for an
// image or PDF, runs OCR, then opens ScanLabsConfirmModal so the
// doctor can review/edit the parsed values before applying. The
// onApply callback receives:
//   - rawText:        the full OCR text (for free-text storage)
//   - structuredLabs: array of { labelId, label, unit, value }
//                     mapped to the user's Lab Library so they
//                     populate v.labs cleanly when supported
//   - confirmedLines: array of "Label: value unit" lines to append
//                     into v.investigations free-text field
// ============================================================
function ScanLabsButton({ labLibrary, onApply, compact, accent }) {
  const fileInputRef = useRef(null);
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [error, setError] = useState("");
  const [parsed, setParsed] = useState(null); // { rawText, suggestions }

  const openPicker = () => {
    setError("");
    if (!window.Tesseract) {
      setError("OCR engine not loaded. Check internet connection and refresh.");
      return;
    }
    if (fileInputRef.current) fileInputRef.current.click();
  };

  const handleFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = ""; // reset so picking the same file again works
    if (!file) return;
    setRunning(true);
    setProgress(0);
    setError("");
    try {
      const out = await runOCROnFile(file, { onProgress: setProgress });
      setParsed(out);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setRunning(false);
      setProgress(0);
    }
  };

  const accentColor = accent || T.tealDeep;

  return (
    <>
      <input
        ref={fileInputRef}
        type="file"
        accept="image/*,application/pdf"
        capture="environment"
        onChange={handleFile}
        style={{ display: "none" }}
      />

      <button
        type="button"
        onClick={openPicker}
        disabled={running}
        title="Scan a lab report image or PDF — auto-extract values"
        style={{
          display: "inline-flex", alignItems: "center", gap: 5,
          padding: compact ? "4px 8px" : "5px 10px",
          borderRadius: 6,
          background: running ? T.paperWarm : hexAlpha(accentColor, 0.1),
          color: accentColor,
          border: `1px solid ${hexAlpha(accentColor, 0.4)}`,
          fontSize: compact ? 11 : 11.5,
          fontWeight: 700, cursor: running ? "wait" : "pointer",
          fontFamily: "inherit",
          opacity: running ? 0.7 : 1,
        }}>
        {running ? (
          <>
            <Loader size={11} strokeWidth={2.2} style={{ animation: "spin 1s linear infinite" }} />
            <span>Scanning {progress}%</span>
          </>
        ) : (
          <>
            <Camera size={11} strokeWidth={2} />
            <span>Scan{compact ? "" : " Labs"}</span>
          </>
        )}
      </button>

      {error && (
        <div style={{
          marginTop: 6, padding: "6px 10px", borderRadius: 6,
          background: T.flagBg, color: T.flag,
          border: `1px solid ${T.flag}`,
          fontSize: 11, fontWeight: 600,
        }}>
          OCR error: {error}
        </div>
      )}

      {parsed && (
        <ScanLabsConfirmModal
          rawText={parsed.rawText}
          suggestions={parsed.suggestions}
          labLibrary={labLibrary || []}
          onApply={(payload) => { onApply(payload); setParsed(null); }}
          onClose={() => setParsed(null)}
        />
      )}
    </>
  );
}

// ============================================================
// ScanLabsConfirmModal — review parsed values before applying
// Each suggestion gets: a checkbox, the auto-detected label/value,
// inline editable text, and a Lab Library mapping dropdown so the
// doctor can map an unfamiliar label (e.g. "Hemoglobin") to a
// library entry (e.g. "Hb"). Values mapped to the library become
// structured `v.labs` rows; everything else is appended to the
// free-text investigations cell.
// ============================================================
function ScanLabsConfirmModal({ rawText, suggestions, labLibrary, onApply, onClose }) {
  // For each parsed suggestion, build editable row state with an
  // auto-suggested mapping to the user's Lab Library if possible.
  const initialRows = useMemo(() => {
    const lib = labLibrary || [];
    return (suggestions || []).map((s, i) => {
      // Try to find a Lab Library match by case-insensitive label
      // similarity (exact or alias).
      const lower = (s.label || "").toLowerCase();
      const matched = lib.find(l => {
        const ll = (l.label || "").toLowerCase();
        if (ll === lower) return true;
        // Common aliases
        if (lower.includes("hemoglob") && ll === "hb") return true;
        if (ll.includes("hemoglob") && lower === "hb") return true;
        if (lower.includes("estradiol") && ll === "e2") return true;
        if (ll === "beta hcg" && /b?-?hcg|beta/.test(lower)) return true;
        return false;
      });
      // Split numeric value from possible unit fragment
      const v = String(s.value || "").trim();
      const m = v.match(/^([\d.,]+)\s*(.*)$/);
      const num = m ? m[1] : v;
      const unit = m && m[2] ? m[2].trim() : (matched?.unit || "");
      return {
        id: `scan-${i}`,
        keep: true,
        ocrLabel: s.label,
        labelId: matched?.id || "",
        label: matched?.label || s.label,
        unit,
        value: num,
        raw: s.raw,
      };
    });
  }, [suggestions, labLibrary]);

  const [rows, setRows] = useState(initialRows);
  const [showRaw, setShowRaw] = useState(false);

  useEffect(() => setRows(initialRows), [initialRows]);

  const updateRow = (id, patch) => setRows(rows.map(r => r.id === id ? { ...r, ...patch } : r));

  const apply = () => {
    const kept = rows.filter(r => r.keep && (r.value || "").trim());

    // Structured labs — only those mapped to the library
    const structuredLabs = kept
      .filter(r => r.labelId)
      .map(r => {
        const libEntry = (labLibrary || []).find(l => l.id === r.labelId);
        return {
          labelId: r.labelId,
          label: libEntry?.label || r.label,
          unit: r.unit || libEntry?.unit || "",
          value: r.value,
        };
      });

    // Confirmed text lines for the free-text investigations cell.
    // Always include EVERY kept row (mapped or not) so the existing
    // regex parser in MIP can also find them as a fallback.
    const confirmedLines = kept.map(r => {
      const unitStr = r.unit ? ` ${r.unit}` : "";
      return `${r.label}: ${r.value}${unitStr}`;
    });

    onApply({ rawText, structuredLabs, confirmedLines });
  };

  const matchedCount = rows.filter(r => r.keep && r.labelId).length;
  const unmappedCount = rows.filter(r => r.keep && !r.labelId).length;

  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0,
        background: hexAlpha(T.ink, 0.45),
        display: "grid", placeItems: "center",
        zIndex: 140, padding: 20,
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: T.card, borderRadius: 14,
          width: "100%", maxWidth: 720,
          maxHeight: "90vh", overflow: "hidden",
          boxShadow: `0 20px 60px ${hexAlpha(T.ink, 0.3)}`,
          border: `1px solid ${T.line}`,
          borderTop: `4px solid ${T.tealDeep}`,
          display: "flex", flexDirection: "column",
        }}>
        <div style={{
          padding: "14px 18px", borderBottom: `1px solid ${T.lineSoft}`,
          background: hexAlpha(T.teal, 0.05),
          display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10,
        }}>
          <div>
            <div style={{
              fontFamily: "'Fraunces', Georgia, serif",
              fontSize: 17, fontWeight: 600, color: T.ink,
              display: "flex", alignItems: "center", gap: 8,
            }}>
              <Sparkles size={15} strokeWidth={1.7} style={{ color: T.tealDeep }} />
              Review &amp; Map
              <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft, marginLeft: 6 }}>
                مراجعة وربط النتائج
              </span>
            </div>
            <div style={{ fontSize: 12, color: T.inkSoft, marginTop: 2 }}>
              {rows.length === 0
                ? "Map rows to your Lab Library, then Apply — values merge into the chart; raw text stays available below."
                : <>Detected <strong>{rows.length}</strong> value{rows.length === 1 ? "" : "s"} · <strong>{matchedCount}</strong> mapped to Lab Library{unmappedCount > 0 ? <> · <strong>{unmappedCount}</strong> as free-text</> : ""}</>}
            </div>
          </div>
          <button onClick={onClose} style={styles.iconBtn} title="Close">
            <X size={13} strokeWidth={1.8} />
          </button>
        </div>

        <div style={{ padding: 16, overflow: "auto", flex: 1 }}>
          {rows.length === 0 ? (
            <div style={{
              padding: 20, textAlign: "center", color: T.inkSoft,
              background: T.paper, border: `1px dashed ${T.lineSoft}`,
              borderRadius: 10, fontSize: 12, lineHeight: 1.55,
            }}>
              The OCR engine didn't auto-detect any known lab patterns.
              You can still copy the raw text below and paste manually.
              <br />
              <span style={{ direction: "rtl" }}>لم يتم التعرف على أي تحاليل تلقائياً.</span>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 8 }}>
              {rows.map(r => (
                <div key={r.id} style={{
                  display: "grid",
                  gridTemplateColumns: "auto 1fr 1fr 1fr",
                  gap: 8, alignItems: "center",
                  padding: "8px 10px",
                  background: r.keep ? T.paper : T.paperWarm,
                  border: `1px solid ${r.keep ? T.lineSoft : T.line}`,
                  borderRadius: 8,
                  opacity: r.keep ? 1 : 0.55,
                }}>
                  <button
                    onClick={() => updateRow(r.id, { keep: !r.keep })}
                    style={{
                      width: 20, height: 20, borderRadius: 4,
                      border: `1.5px solid ${r.keep ? T.teal : T.line}`,
                      background: r.keep ? T.teal : T.card,
                      display: "grid", placeItems: "center",
                      cursor: "pointer", flexShrink: 0,
                    }}
                    title={r.keep ? "Skip this row" : "Keep this row"}>
                    {r.keep && <CircleDot size={10} strokeWidth={3} style={{ color: "#fff" }} />}
                  </button>

                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 10.5, color: T.inkSoft, fontWeight: 700, letterSpacing: 0.3, textTransform: "uppercase", marginBottom: 2 }}>
                      OCR · {r.ocrLabel}
                    </div>
                    <select
                      style={{ ...styles.input, padding: "5px 8px", fontSize: 12 }}
                      value={r.labelId}
                      onChange={(e) => {
                        const lib = (labLibrary || []).find(l => l.id === e.target.value);
                        updateRow(r.id, {
                          labelId: e.target.value,
                          label: lib?.label || r.ocrLabel,
                          unit: r.unit || lib?.unit || "",
                        });
                      }}>
                      <option value="">— free-text only —</option>
                      {(labLibrary || []).map(l => (
                        <option key={l.id} value={l.id}>{l.label}{l.unit ? ` (${l.unit})` : ""}</option>
                      ))}
                    </select>
                  </div>

                  <input
                    style={{ ...styles.input, padding: "5px 8px", fontSize: 12 }}
                    value={r.value}
                    onChange={(e) => updateRow(r.id, { value: e.target.value })}
                    placeholder="value"
                    inputMode="decimal"
                  />
                  <input
                    style={{ ...styles.input, padding: "5px 8px", fontSize: 12 }}
                    value={r.unit}
                    onChange={(e) => updateRow(r.id, { unit: e.target.value })}
                    placeholder="unit"
                  />
                </div>
              ))}
            </div>
          )}

          <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px dashed ${T.lineSoft}` }}>
            <button
              onClick={() => setShowRaw(s => !s)}
              style={{
                ...styles.miniBtn, fontSize: 11.5,
                background: T.paperWarm, color: T.inkSoft, borderColor: T.lineSoft,
              }}>
              <ScanText size={11} strokeWidth={1.8} />
              {showRaw ? "Hide" : "Show"} raw OCR text
            </button>
            {showRaw && (
              <div style={{
                marginTop: 8, padding: 10, borderRadius: 6,
                background: T.paper, border: `1px solid ${T.lineSoft}`,
                fontSize: 11, lineHeight: 1.5, color: T.inkSoft,
                fontFamily: "ui-monospace, monospace",
                whiteSpace: "pre-wrap", maxHeight: 200, overflow: "auto",
              }}>
                {rawText || "(empty)"}
              </div>
            )}
          </div>
        </div>

        <div style={{
          padding: "12px 18px", borderTop: `1px solid ${T.lineSoft}`,
          background: T.paper,
          display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8,
        }}>
          <span style={{ fontSize: 12, color: T.inkSoft }}>
            {rows.filter(r => r.keep).length} of {rows.length} will be applied
          </span>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onClose} style={styles.ghostBtn}>Cancel · إلغاء</button>
            <button
              onClick={apply}
              disabled={rows.filter(r => r.keep).length === 0}
              style={{
                ...styles.primaryBtn,
                opacity: rows.filter(r => r.keep).length === 0 ? 0.5 : 1,
                cursor: rows.filter(r => r.keep).length === 0 ? "not-allowed" : "pointer",
              }}>
              <Sparkles size={12} strokeWidth={2} /> Apply{rows.filter(r => r.keep).length > 0 ? ` (${rows.filter(r => r.keep).length})` : ""}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}


// ============================================================
// LAB PICKER MODAL
// Centered overlay that lets the doctor choose which labs from
// their Lab Library (Settings → Lab Library) to add to a visit.
// Selected labs are returned via onPick — already-added labs are
// disabled to prevent duplicates.
// ============================================================
function LabPickerModal({ library, alreadyAdded, onPick, onClose }) {
  const [selected, setSelected] = useState(new Set());
  const [search, setSearch] = useState("");
  const addedSet = new Set(alreadyAdded || []);

  const filtered = (library || []).filter(l => {
    if (!l.label) return false;
    if (!search.trim()) return true;
    const q = search.trim().toLowerCase();
    return l.label.toLowerCase().includes(q) || (l.unit || "").toLowerCase().includes(q);
  });

  const toggle = (id) => {
    if (addedSet.has(id)) return;
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  const handleConfirm = () => {
    const chosen = (library || []).filter(l => selected.has(l.id));
    onPick(chosen);
  };

  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0,
        background: hexAlpha(T.ink, 0.45),
        display: "grid", placeItems: "center",
        zIndex: 130, padding: 20,
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: T.card, borderRadius: 14,
          width: "100%", maxWidth: 540,
          maxHeight: "85vh", overflow: "hidden",
          boxShadow: `0 20px 60px ${hexAlpha(T.ink, 0.3)}`,
          border: `1px solid ${T.line}`,
          borderTop: `4px solid ${T.tealDeep}`,
          display: "flex", flexDirection: "column",
        }}>
        <div style={{
          padding: "14px 18px", borderBottom: `1px solid ${T.lineSoft}`,
          background: hexAlpha(T.teal, 0.05),
        }}>
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8,
          }}>
            <strong style={{ fontFamily: "'Fraunces', Georgia, serif", fontSize: 16, color: T.ink }}>
              <FlaskConical size={14} strokeWidth={1.8} style={{ verticalAlign: "middle", marginRight: 6, color: T.tealDeep }} />
              Add Labs · إضافة تحاليل
            </strong>
            <button onClick={onClose} style={styles.iconBtn} title="Close">
              <X size={13} strokeWidth={1.8} />
            </button>
          </div>
          <input
            autoFocus
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Search your Lab Library… · بحث"
            style={{ ...styles.input, fontSize: 13 }}
          />
        </div>

        <div style={{ padding: 14, overflow: "auto", flex: 1 }}>
          {(library || []).length === 0 ? (
            <div style={{
              padding: 16, textAlign: "center", color: T.inkSoft,
              fontSize: 12, lineHeight: 1.55,
            }}>
              Your Lab Library is empty. Add labs in <strong>Settings → Lab Library</strong> first.
              <br />
              <span style={{ direction: "rtl" }}>المكتبة فارغة. أضف التحاليل من الإعدادات.</span>
            </div>
          ) : filtered.length === 0 ? (
            <div style={{
              padding: 16, textAlign: "center", color: T.inkSoft,
              fontSize: 12,
            }}>
              No labs match "{search}".
            </div>
          ) : (
            <div style={{ display: "grid", gap: 6 }}>
              {filtered.map(lab => {
                const isAdded = addedSet.has(lab.id);
                const isSelected = selected.has(lab.id);
                return (
                  <button
                    key={lab.id}
                    onClick={() => toggle(lab.id)}
                    disabled={isAdded}
                    style={{
                      display: "flex", alignItems: "center", gap: 10,
                      padding: "9px 12px", borderRadius: 8,
                      border: `1.5px solid ${isSelected ? T.teal : (isAdded ? T.lineSoft : T.line)}`,
                      background: isAdded ? T.paperWarm : (isSelected ? T.tealSoft : T.card),
                      color: isAdded ? T.inkSoft : T.ink,
                      cursor: isAdded ? "not-allowed" : "pointer",
                      fontFamily: "inherit",
                      textAlign: "left",
                      opacity: isAdded ? 0.6 : 1,
                    }}>
                    <span style={{
                      width: 18, height: 18, borderRadius: 4,
                      border: `1.5px solid ${isSelected ? T.teal : T.line}`,
                      background: isSelected ? T.teal : T.card,
                      display: "grid", placeItems: "center",
                      flexShrink: 0,
                    }}>
                      {isSelected && <CircleDot size={9} strokeWidth={3} style={{ color: "#fff" }} />}
                    </span>
                    <span style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>{lab.label}</span>
                    {lab.unit && (
                      <span style={{
                        fontSize: 10.5, color: T.inkSoft, fontWeight: 500,
                        background: T.paper, padding: "2px 6px", borderRadius: 4,
                      }}>
                        {lab.unit}
                      </span>
                    )}
                    {isAdded && (
                      <span style={{
                        fontSize: 10, color: T.tealDeep, fontWeight: 700,
                        background: T.tealSoft, padding: "2px 6px", borderRadius: 4,
                        letterSpacing: 0.4, textTransform: "uppercase",
                      }}>
                        Added
                      </span>
                    )}
                  </button>
                );
              })}
            </div>
          )}
        </div>

        <div style={{
          padding: "12px 18px", borderTop: `1px solid ${T.lineSoft}`,
          background: T.paper,
          display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8,
        }}>
          <span style={{ fontSize: 12, color: T.inkSoft }}>
            {selected.size === 0 ? "No labs selected" : `${selected.size} lab${selected.size === 1 ? "" : "s"} selected`}
          </span>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onClose} style={styles.ghostBtn}>Cancel · إلغاء</button>
            <button
              onClick={handleConfirm}
              disabled={selected.size === 0}
              style={{
                ...styles.primaryBtn,
                opacity: selected.size === 0 ? 0.5 : 1,
                cursor: selected.size === 0 ? "not-allowed" : "pointer",
              }}>
              <Plus size={12} strokeWidth={2} /> Add{selected.size > 0 ? ` (${selected.size})` : ""}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}


// ============================================================
// v6.8 — ADD LAB PICKER (INLINE, TEXT-MODE)
// A button that opens the same LabPickerModal used in the OB visit
// row, but writes the chosen labs into a free-text field as
//   "Label:  unit"
// so the existing regex parser in the Master Investigation Portal
// picks them up. Used by the Infertility, IVF, and Gynae templates
// where the investigations cell is a single textarea (no v.labs[]).
// ============================================================
function AddLabPickerInline({ library, currentText, onAppend, accent, compact }) {
  const [open, setOpen] = useState(false);
  const accentColor = accent || T.tealDeep;

  const handlePick = (chosen) => {
    if (!chosen || chosen.length === 0) { setOpen(false); return; }
    const lines = chosen.map(l => {
      const unit = l.unit ? ` ${l.unit}` : "";
      return `${l.label}: ${unit}`.trimEnd();
    });
    const block = lines.join("\n");
    const next = (currentText && currentText.trim())
      ? `${currentText.trimEnd()}\n${block}`
      : block;
    onAppend(next);
    setOpen(false);
  };

  return (
    <>
      <button
        type="button"
        onClick={() => setOpen(true)}
        title="Pick labs from your Lab Library — appends 'Label: ' so you only type the value"
        style={{
          display: "inline-flex", alignItems: "center", gap: 5,
          padding: compact ? "4px 8px" : "5px 10px",
          borderRadius: 6,
          background: hexAlpha(accentColor, 0.1),
          color: accentColor,
          border: `1px solid ${hexAlpha(accentColor, 0.4)}`,
          fontSize: compact ? 11 : 11.5,
          fontWeight: 700, cursor: "pointer",
          fontFamily: "inherit",
        }}>
        <ListPlus size={11} strokeWidth={2} />
        <span>Add Lab</span>
      </button>

      {open && (
        <LabPickerModal
          library={library || []}
          alreadyAdded={[]}
          onPick={handlePick}
          onClose={() => setOpen(false)}
        />
      )}
    </>
  );
}


// ============================================================
// RX PRINT MODAL
// Shows a clean preview of the prescription. The doctor can edit
// each line, optionally pull from saved drug presets (Settings →
// Rx Manager), then click Print. The CSS @media print rule in
// GlobalCSS hides everything except the #rx-print-area div.
// ============================================================
function RxPrintModal({ patient, visit, appSettings, clinicSettings, onClose }) {
  // Parse the visit's tx field into lines. Each non-empty line is one
  // drug entry. The doctor can add, remove, or edit before printing.
  const initialLines = useMemo(() => {
    const raw = (visit.tx || "")
      .split("\n")
      .map(s => s.replace(/^\s*[·•\-\*]\s*/, "").trim())
      .filter(Boolean);
    return raw.length > 0 ? raw : [""];
  }, [visit.tx]);

  const [lines, setLines] = useState(initialLines);
  const presets = appSettings?.rxPresets || [];
  const topMargin = Math.max(0, parseInt(appSettings?.rxPrintTopMargin, 10) || 0);
  const branding = formatClinicBrandingBlock(clinicSettings);
  const extraHeader = (appSettings?.rxPrintHeader || "").trim();
  const combinedPrintHeader = [branding, extraHeader].filter(Boolean).join("\n\n");

  const updateLine = (i, val) => setLines(lines.map((l, idx) => idx === i ? val : l));
  const removeLine = (i) => setLines(lines.filter((_, idx) => idx !== i));
  const addLine = (val = "") => setLines([...lines, val]);
  const insertPreset = (p) => {
    const text = p.instructions ? `${p.name} — ${p.instructions}` : p.name;
    addLine(text);
  };

  const handlePrint = () => {
    // Defer to allow React render with latest line values
    setTimeout(() => window.print(), 30);
  };

  const wifeName = patient.couple?.wife?.nameEn || patient.name || "Patient";
  const wifeNameAr = patient.couple?.wife?.nameAr || "";

  return (
    <div style={styles.rxOverlay} className="rx-no-print">
      <div style={styles.rxPanel} className="rx-no-print">
        <div className="rx-no-print" style={{ padding: "16px 20px", borderBottom: `1px solid ${T.lineSoft}`, background: T.paperWarm }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>

                Print Rx · طباعة وصفة

                Edit lines as needed, then click Print. Top margin from Settings: <strong>{topMargin}mm</strong>.
              </div>
            </div>
            <button onClick={onClose} style={styles.iconBtn} title="Close"><X size={14} strokeWidth={1.8} /></button>
          </div>
        </div>

        <div className="rx-no-print" style={{ padding: "16px 20px", maxHeight: "55vh", overflow: "auto" }}>
          <div style={{ display: "grid", gap: 8 }}>
            {lines.map((line, i) => (
              <div key={i} style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: T.inkSoft, width: 22, textAlign: "right" }}>{i + 1}.</span>
                <input
                  style={{ ...styles.input, flex: 1 }}
                  value={line}
                  onChange={(e) => updateLine(i, e.target.value)}
                  placeholder="e.g. Folic acid 5 mg — once daily"

                <button onClick={() => removeLine(i)} style={styles.miniIconBtn} title="Remove line">
                  <Trash2 size={11} strokeWidth={1.8} />

            <button onClick={() => addLine("")} style={{

              color: T.inkSoft, fontSize: 11.5, fontWeight: 600,
              display: "inline-flex", alignItems: "center", gap: 5,
              cursor: "pointer", fontFamily: "inherit",
            }}>
              <Plus size={11} strokeWidth={2} /> Add line · إضافة سطر

          {presets.length > 0 && (
            <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px dashed ${T.lineSoft}` }}>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {presets.map(p => (

          {presets.length === 0 && (

              background: T.paper, border: `1px dashed ${T.lineSoft}`,

              <strong>Tip:</strong> Save commonly-used drugs in <em>Settings → Rx Manager</em> to add them here with one click. ·
              <span style={{ direction: "rtl", display: "inline-block", marginLeft: 4 }}>
                احفظ الأدوية الشائعة من الإعدادات → مدير الوصفات.

        <div className="rx-no-print" style={{

          // Inline CSS variable picked up by the @media print rule

  );
}


// ============================================================
// COUPLE INTAKE TABLE (bilingual side-by-side Wife / Husband)
// ============================================================
const COUPLE_STANDARD_ROWS = [
  { id: "name",         labelEn: "Name",         labelAr: "الاسم",         type: "text" },
  { id: "dob",          labelEn: "Date of Birth", labelAr: "تاريخ الميلاد", type: "date" },
  { id: "age",          labelEn: "Age",          labelAr: "السن",          type: "auto-age" },
  { id: "marriageDate", labelEn: "Marriage Date", labelAr: "تاريخ الزواج",  type: "date" },
  { id: "job",          labelEn: "Job / Occupation", labelAr: "الوظيفة",   type: "text" },
];

function CoupleIntakeTable({ patient, updatePatient, appSettings, draft, setDraft }) {
  // Two modes:
  //   - "live": writes through updatePatient(patient.id, …)
  //   - "draft": writes through setDraft({...draft, …}) — used at intake before
  //     a patient record exists.
  const isDraft = !!setDraft;
  const couple = isDraft
    ? (draft || { wife: {}, husband: {}, customValues: {} })
    : (patient.couple || { wife: {}, husband: {}, customValues: {} });
  const wife = couple.wife || {};
  const husband = couple.husband || {};
  const customRows = (appSettings?.customCoupleRows || []);
  const customValues = couple.customValues || {};
  const hidden = appSettings?.hiddenCoupleRows || [];
  const cellSizes = appSettings?.coupleCellSizes || {};

  // Track last auto-transliteration so we don't overwrite manual edits.
  // Stored on couple object as `_transliterationMemo: { wifeAr, wifeEn, husbandAr, husbandEn }`
  const memo = couple._transliterationMemo || {};

  const writeCouple = (next) => {
    if (isDraft) setDraft(next);
    else updatePatient(patient.id, { couple: next });
  };

  const setSide = (side, key, value) => {
    const obj = side === "wife" ? wife : husband;
    const next = { ...couple, [side]: { ...obj, [key]: value } };
    writeCouple(next);
  };

  // Special-case Name with transliteration: when one side of the bilingual
  // pair is empty (or matches our last auto value), auto-fill the other.
  const setName = (side, lang, value) => {
    const obj = side === "wife" ? wife : husband;
    const otherLang = lang === "en" ? "ar" : "en";
    const fieldKey = lang === "en" ? "nameEn" : "nameAr";
    const otherKey = lang === "en" ? "nameAr" : "nameEn";
    const memoKey  = side + (lang === "en" ? "En" : "Ar");
    const otherMemoKey = side + (lang === "en" ? "Ar" : "En");

    let nextOther = obj[otherKey] || "";
    const otherIsEmpty = !nextOther.trim();
    const otherIsAutoValue = nextOther && nextOther === memo[otherMemoKey];

    if (otherIsEmpty || otherIsAutoValue) {
      const transliterated = lang === "en"
        ? transliterateEnToAr(value)
        : transliterateArToEn(value);
      if (transliterated) nextOther = transliterated;
    }

    const nextMemo = { ...memo, [memoKey]: value, [otherMemoKey]: nextOther };
    const nextSide = { ...obj, [fieldKey]: value, [otherKey]: nextOther };
    writeCouple({ ...couple, [side]: nextSide, _transliterationMemo: nextMemo });
  };

  const setCustomSide = (rowId, side, value) => {
    const cur = customValues[rowId] || {};
    const next = { ...couple, customValues: { ...customValues, [rowId]: { ...cur, [side]: value } } };
    writeCouple(next);
  };

  // Sizing helper — returns inline style for a wife/husband <td>
  const cellTdStyle = (rowId) => {
    const sz = cellSizes[rowId] || {};
    return {
      ...styles.coupleTd,
      ...(sz.width  ? { width:  sz.width,  minWidth:  sz.width  } : {}),
      ...(sz.height ? { height: sz.height } : {}),
    };
  };
  const inputStyleForRow = (rowId, baseExtras = {}) => {
    const sz = cellSizes[rowId] || {};
    return {
      ...styles.input,
      ...baseExtras,
      ...(sz.height ? { height: sz.height } : {}),
    };
  };

  const renderCell = (row, side) => {
    const sideObj = side === "wife" ? wife : husband;

    // Special row: Name — bilingual pair with transliteration.
    if (row.id === "name") {
      const enVal = sideObj.nameEn || "";
      const arVal = sideObj.nameAr || "";
      return (
        <div style={{ display: "grid", gap: 6 }}>
          <input
            style={inputStyleForRow(row.id, { padding: "8px 11px", fontSize: 13 })}
            placeholder="English name"
            value={enVal}
            onChange={(e) => setName(side, "en", e.target.value)}
          />
          <input
            style={inputStyleForRow(row.id, { padding: "8px 11px", fontSize: 13, direction: "rtl", textAlign: "right" })}
            placeholder="الاسم بالعربية"
            value={arVal}
            onChange={(e) => setName(side, "ar", e.target.value)}
          />
          <div style={{ fontSize: 9.5, color: T.inkSoft, letterSpacing: 0.4, textTransform: "uppercase", fontWeight: 600 }}>
            <ArrowRightLeft size={9} strokeWidth={2} style={{ verticalAlign: "middle", marginRight: 3 }} />
            Auto-transliterates
          </div>
        </div>
      );
    }

    if (row.type === "auto-age") {
      const dob = sideObj.dob;
      const age = ageFromDOB(dob);
      return (
        <div style={{
          padding: "8px 12px", borderRadius: 8,
          background: age !== "" ? T.tealSoft : T.paperWarm,
          color: age !== "" ? T.tealDeep : T.inkSoft,
          fontSize: 13, fontWeight: 700,
          display: "flex", alignItems: "center", gap: 6,
        }}>
          {age !== "" ? `${age} y` : "—"}
          <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: hexAlpha(T.teal, 0.15), color: T.tealDeep, fontWeight: 700, letterSpacing: 0.4 }}>AUTO</span>
        </div>
      );
    }
    return (
      <input
        type={row.type === "date" ? "date" : "text"}
        style={inputStyleForRow(row.id, side === "wife" ? { direction: "ltr" } : {})}
        value={sideObj[row.id] || ""}
        onChange={(e) => setSide(side, row.id, e.target.value)}
        placeholder={row.type === "date" ? "" : (side === "wife" ? row.labelEn : row.labelAr)}
      />
    );
  };

  const renderCustomCell = (row, side) => {
    const cur = customValues[row.id] || {};
    return (
      <input
        type="text"
        style={inputStyleForRow(row.id)}
        value={cur[side] || ""}
        onChange={(e) => setCustomSide(row.id, side, e.target.value)}
        placeholder={side === "wife" ? (row.en || row.labelEn || "") : (row.ar || row.labelAr || "")}
      />
    );
  };

  const visibleStandard = COUPLE_STANDARD_ROWS.filter(r => !hidden.includes(r.id));

  return (
    <div className="couple-intake-wrap" style={{ overflow: "auto", borderRadius: 12, border: `1px solid ${T.line}` }}>
      <table className="couple-intake-table" style={styles.coupleTable}>
        <thead>
          <tr>
            <th style={{ ...styles.coupleTh, width: 220, textAlign: "left" }}>
              <div style={{ fontSize: 10.5, color: T.inkSoft, letterSpacing: 0.6, textTransform: "uppercase", fontWeight: 700 }}>Field</div>
              <div style={{ direction: "rtl", fontSize: 11, color: T.inkSoft, fontWeight: 500 }}>الحقل</div>
            </th>
            <th style={{ ...styles.coupleTh, background: hexAlpha(T.rose, 0.08) }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: T.rose, fontWeight: 700 }}>
                <Heart size={14} strokeWidth={1.8} fill={T.rose} />
                <span>Wife</span>
                <span style={{ direction: "rtl", marginLeft: 6, fontWeight: 600 }}>الزوجة</span>
              </div>
            </th>
            <th style={{ ...styles.coupleTh, background: hexAlpha(T.teal, 0.08) }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: T.tealDeep, fontWeight: 700 }}>
                <Stethoscope size={14} strokeWidth={1.8} />
                <span>Husband</span>
                <span style={{ direction: "rtl", marginLeft: 6, fontWeight: 600 }}>الزوج</span>
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          {visibleStandard.map(row => (
            <tr key={row.id}>
              <td style={styles.coupleTdLabel}>
                <div style={{ fontSize: 12.5, fontWeight: 600, color: T.ink }}>{row.labelEn}</div>
                <div style={{ direction: "rtl", fontSize: 12, color: T.inkSoft }}>{row.labelAr}</div>
              </td>
              <td style={cellTdStyle(row.id)}>{renderCell(row, "wife")}</td>
              <td style={cellTdStyle(row.id)}>{renderCell(row, "husband")}</td>
            </tr>
          ))}
          {customRows.map(row => (
            <tr key={row.id}>
              <td style={{ ...styles.coupleTdLabel, background: hexAlpha(T.ochre, 0.04) }}>
                <div style={{ fontSize: 12.5, fontWeight: 600, color: T.ink, display: "flex", alignItems: "center", gap: 6 }}>
                  {row.en}
                  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: T.ochreSoft, color: T.ochre, fontWeight: 700, letterSpacing: 0.4 }}>CUSTOM</span>
                </div>
                <div style={{ direction: "rtl", fontSize: 12, color: T.inkSoft }}>{row.ar}</div>
              </td>
              <td style={cellTdStyle(row.id)}>{renderCustomCell(row, "wife")}</td>
              <td style={cellTdStyle(row.id)}>{renderCustomCell(row, "husband")}</td>
            </tr>
          ))}
        </tbody>
      </table>
      {visibleStandard.length === 0 && customRows.length === 0 && (
        <div style={{ padding: "10px 16px", fontSize: 11, color: T.inkSoft, fontStyle: "italic", borderTop: `1px dashed ${T.lineSoft}`, background: T.paper }}>
          All rows are hidden. Re-enable some from Settings → Layout Manager. · <span style={{ direction: "rtl" }}>كل الصفوف مخفية. أعد تفعيلها من الإعدادات.</span>
        </div>
      )}
    </div>
  );
}


// Read-only summary of the couple data captured at intake. Shown at the top

  const wife = couple.wife || {};
  const husband = couple.husband || {};
  const customRows = (appSettings?.customCoupleRows || []);

  const StripField = ({ label, labelAr, value, valueAr }) => (
    <div style={{ minWidth: 0 }}>
      <div style={{ fontSize: 9.5, color: T.inkSoft, letterSpacing: 0.6, textTransform: "uppercase", fontWeight: 700 }}>
        {label}{labelAr && <span style={{ direction: "rtl", marginLeft: 4, fontWeight: 500 }}> · {labelAr}</span>}

        {valueAr && <span style={{ direction: "rtl", color: T.inkSoft, marginLeft: 6, fontSize: 11.5 }}>{valueAr}</span>}
      </div>
    </div>
  );

  const Side = ({ side, accent, label, labelAr, icon }) => {
    const o = side === "wife" ? wife : husband;
    return (
      <div style={{
        flex: 1, minWidth: 260, padding: "12px 14px", borderRadius: 10,
        background: hexAlpha(accent, 0.04), border: `1px solid ${hexAlpha(accent, 0.2)}`,
      }}>

          <span style={{
            width: 22, height: 22, borderRadius: 6,
            background: hexAlpha(accent, 0.15), color: accent,
            display: "grid", placeItems: "center",
          }}>{icon}</span>
          <strong style={{ color: accent, fontSize: 12, letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</strong>

          <StripField label="Name" labelAr="الاسم" value={o.nameEn || o.nameAr} />
          <StripField label="DOB"  labelAr="الميلاد" value={o.dob || ""} />
          <StripField label="Age"  labelAr="السن" value={ageFromDOB(o.dob) !== "" ? `${ageFromDOB(o.dob)} y` : ""} />

              label={r.en} labelAr={r.ar}
              value={(customValues[r.id] || {})[side]} />

        </div>

  const inner = (
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      <Side side="wife"    accent={T.rose}     label="Wife"    labelAr="الزوجة" icon={<Heart size={12} strokeWidth={1.8} fill={T.rose} />} />
      <Side side="husband" accent={T.tealDeep} label="Husband" labelAr="الزوج"  icon={<Stethoscope size={12} strokeWidth={1.8} />} />

  if (embed) {
    return (
      <div style={{
        padding: "10px 0 0",
        borderTop: `1px dashed ${T.lineSoft}`,
      }}>
        <div style={{ fontSize: 10.5, fontWeight: 700, color: T.inkSoft, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 8 }}>
          Demographics (Intake) · <span style={{ direction: "rtl", fontWeight: 600 }}>البيانات من الاستقبال</span>

        {inner}
        <div style={{ fontSize: 10.5, color: T.inkSoft, fontStyle: "italic", marginTop: 8 }}>
          Edit at Intake · <span style={{ direction: "rtl" }}>التعديل من الاستقبال</span>
        </div>
      </div>
    );
  }

  return (
    <Card sectionId="inf.history"
      title={<>Couple at a glance · <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft }}>الزوجان</span></>}
      icon={<Users size={15} strokeWidth={1.6} />} accent={T.rose}

          Edit at Intake · <span style={{ direction: "rtl" }}>التعديل من الاستقبال</span>

function emptyStimWorksheet() {
  return {
    visits: [], cycleStart: "", stimStart: "", protocol: "",
    transferDate: "", transferDay: 5,
    customColumns: [], labReports: "", labImaging: [],
  };
}

function worksheetHasStimContent(ws) {
  if (!ws || typeof ws !== "object") return false;
  if ((ws.visits || []).length) return true;
  if ((ws.cycleStart || "").trim()) return true;
  if ((ws.stimStart || "").trim()) return true;
  if ((ws.transferDate || "").trim()) return true;
  if ((ws.labReports || "").trim()) return true;
  if ((ws.protocol || "").trim()) return true;
  return false;
}
