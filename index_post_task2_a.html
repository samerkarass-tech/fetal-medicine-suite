}


// ============================================================
// LAB LIBRARY CARD
// Manages the list of labs that drive both the Quick-Chips above
// each visit's investigation cell AND the row-grouping in the
// Master Investigation Portal at the top of the patient file.
// ============================================================
function LabLibraryCard({ appSettings, update }) {
  const labs = appSettings.labChips || [];

  const addLab = () => {
    update({ labChips: [...labs, { id: uid(), label: "", unit: "" }] });
  };
  const updateLab = (id, patch) => {
    update({ labChips: labs.map(l => l.id === id ? { ...l, ...patch } : l) });
  };
  const removeLab = (id) => {
    update({ labChips: labs.filter(l => l.id !== id) });
  };
  const moveLab = (id, dir) => {
    const idx = labs.findIndex(l => l.id === id);
    if (idx < 0) return;
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= labs.length) return;
    const next = [...labs];
    [next[idx], next[newIdx]] = [next[newIdx], next[idx]];
    update({ labChips: next });
  };

  return (
    <Card title={<>Lab Library · <span style={{ direction: "rtl", fontWeight: 500, color: T.inkSoft, fontSize: 13 }}>مكتبة التحاليل</span></>}
      icon={<FlaskConical size={15} strokeWidth={1.6} />} accent={T.tealDeep}
      right={
        <button onClick={addLab} style={{ ...styles.miniBtn, background: T.tealDeep, color: "#fff", borderColor: T.tealDeep }}>
          <Plus size={11} strokeWidth={2.2} /> Add lab · إضافة تحليل
        </button>
      }>
      <div style={{ fontSize: 12, color: T.inkSoft, marginBottom: 12, lineHeight: 1.55 }}>
        Each lab here becomes a one-tap chip above the <strong>Investigations</strong> cell in every
        Obstetrics visit row, and groups results in the <strong>Master Investigation Portal</strong>
        at the top of the patient file. Tapping a chip inserts <code>Label: </code> so you only
        type the numerical value. Toggle the <strong>flag icon</strong> to <strong>auto-pin</strong> a lab
        to the Active Flags rail whenever a value is entered.
        <br />
        <span style={{ direction: "rtl" }}>
          كل تحليل هنا يظهر كاختيار سريع فوق خانة التحاليل في زيارة الحمل، ويُجمع نتائجه في "مركز التحاليل الموحد". فعّل أيقونة العَلم لتثبيت التحليل تلقائياً في شريط التنبيهات.
        </span>
      </div>

      {labs.length === 0 ? (
        <EmptyHint>
          No labs in your library. Click "Add lab" to start (e.g. TSH, AMH, FSH, HbA1c).
          <br />
          <span style={{ direction: "rtl" }}>
            المكتبة فارغة. اضغط "إضافة تحليل" لبدء (مثل TSH، AMH، FSH، HbA1c).
          </span>
        </EmptyHint>
      ) : (
        <div style={{ display: "grid", gap: 8 }}>
          {labs.map((l, i) => (
            <div key={l.id} style={{
              display: "grid", gridTemplateColumns: "auto 2fr 1fr auto auto auto auto",
              gap: 8, alignItems: "center",
              padding: "8px 10px", borderRadius: 8,
              background: l.flag ? hexAlpha(T.flag, 0.06) : T.paper,
              border: `1px solid ${l.flag ? hexAlpha(T.flag, 0.3) : T.lineSoft}`,
            }}>
              <span style={{
                width: 24, height: 24, borderRadius: 6,
                background: T.tealSoft, color: T.tealDeep,
                display: "grid", placeItems: "center",
                fontSize: 11, fontWeight: 700,
              }}>{i + 1}</span>
              <input
                style={{ ...styles.input, padding: "6px 10px", fontSize: 12 }}
                placeholder="Lab name (e.g. TSH)"
                value={l.label || ""}
                onChange={(e) => updateLab(l.id, { label: e.target.value })}
              />
              <input
                style={{ ...styles.input, padding: "6px 10px", fontSize: 12 }}
                placeholder="Unit (e.g. mIU/L)"
                value={l.unit || ""}
                onChange={(e) => updateLab(l.id, { unit: e.target.value })}
              />
              {/* v6.8 — Flag toggle. When ON, any value entered for this lab in
                  any visit auto-pins to the Active Flags rail. */}
              <button
                onClick={() => updateLab(l.id, { flag: !l.flag })}
                title={l.flag ? "Auto-flag ON · click to disable" : "Auto-flag OFF · click to enable — pin this lab to the Active Flags rail whenever a value is entered"}
                style={{
                  ...styles.miniIconBtn,
                  width: 28, height: 28,
                  background: l.flag ? T.flagBg : "transparent",
                  color: l.flag ? T.flag : T.inkSoft,
                  borderColor: l.flag ? T.flag : T.line,
                  opacity: l.flag ? 1 : 0.55,
                }}>
                <Flag size={12} strokeWidth={2} fill={l.flag ? T.flag : "none"} />
              </button>
              <button onClick={() => moveLab(l.id, -1)} style={styles.miniIconBtn} title="Move up" disabled={i === 0}>
                <ChevronLeft size={11} strokeWidth={1.8} style={{ transform: "rotate(90deg)" }} />
              </button>
              <button onClick={() => moveLab(l.id, +1)} style={styles.miniIconBtn} title="Move down" disabled={i === labs.length - 1}>
                <ChevronRight size={11} strokeWidth={1.8} style={{ transform: "rotate(90deg)" }} />
              </button>
              <button onClick={() => removeLab(l.id)} style={styles.miniIconBtn} title="Remove">
                <Trash2 size={11} strokeWidth={1.8} />
              </button>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}


// ============================================================
// PHRASE LIBRARY CARD — manage the autocomplete dictionaries that
// power the C/O · US Exam · Rx · Notes cells in the obstetrics
// visit logbook (and other quick-insert hooks across the app).
// Each tab here corresponds to one DICT_DEFAULTS key. Built-in
// seed phrases are read-only; user-saved phrases (added via the
// "+ Add to library" hint in any AutocompleteCell) appear at the
// bottom and can be removed here.
// ============================================================
const PHRASE_LIBRARY_TABS = [
  { key: "obs.co",           label: "C/O · الشكوى",        icon: "💬" },
  { key: "obs.exam",         label: "US Exam · السونار",   icon: "📐" },
  { key: "obs.treatment",    label: "Rx · العلاج",         icon: "💊" },
  { key: "obs.notes",        label: "Notes · ملاحظات",     icon: "📝" },
  { key: "obs.investigations", label: "Investigations · التحاليل", icon: "🧪" },
  { key: "inf.history",      label: "Infertility — History", icon: "📋" },
  { key: "inf.plan",         label: "Infertility — Plan",   icon: "🎯" },
  { key: "ivf.plan",         label: "IVF — Stim plan",      icon: "🔬" },
  { key: "fet.plan",         label: "FET — Plan",           icon: "❄️" },
  { key: "gyn.exam",         label: "Gynae — Exam",         icon: "🩺" },
  { key: "gyn.plan",         label: "Gynae — Plan",         icon: "📌" },
];

function PhraseLibraryCard({ dictAPI, appSettings, setAppSettings }) {
  const [activeKey, setActiveKey] = useState(PHRASE_LIBRARY_TABS[0].key);
  const [draft, setDraft] = useState("");
  const [editingSeed, setEditingSeed] = useState(null); // { groupIdx, itemIdx, value }
  const [addingGroup, setAddingGroup] = useState(false);
  const [newGroupName, setNewGroupName] = useState("");
  const [addingToGroup, setAddingToGroup] = useState(null); // groupIdx
  const [newItemText, setNewItemText] = useState("");

  if (!dictAPI) {
    return (
      <Card title={<>Phrase Library · <span style={{ direction: "rtl", fontWeight: 500, color: T.inkSoft, fontSize: 13 }}>مكتبة العبارات</span></>}
        icon={<BookOpen size={15} strokeWidth={1.6} />} accent={T.rose}>
        <EmptyHint>
          Phrase Library not available in this context.
        </EmptyHint>
      </Card>
    );
  }

  // v6.8 — seeds are now resolved through appSettings.phraseSeeds (override map)
  // and fall back to DICT_DEFAULTS. We deep-clone groups when first editing so
  // the user has a real, mutable copy. The original DICT_DEFAULTS is never
  // mutated — Reset restores a key by removing the override.
  const seedGroups = resolveSeedGroups(appSettings, activeKey);
  const customItems = (dictAPI.dict && dictAPI.dict[activeKey]) || [];
  const isOverridden = !!(appSettings && appSettings.phraseSeeds && appSettings.phraseSeeds[activeKey]);

  // Helper: write a fresh copy of seedGroups for activeKey into appSettings
  const writeSeeds = (groups) => {
    if (typeof setAppSettings === "function") {
      writePhraseSeeds(appSettings, setAppSettings, activeKey, groups);
    }
  };
  const cloneGroups = () => seedGroups.map(g => ({ group: g.group, items: [...(g.items || [])] }));

  const addItem = () => {
    const text = draft.trim();
    if (!text) return;
    dictAPI.dictAddItem(activeKey, text);
    setDraft("");
  };
  const removeItem = (item) => {
    if (!window.confirm(`Remove "${item}" from this list (for ALL patients)?`)) return;
    dictAPI.dictRemoveItem(activeKey, item);
  };

  // Built-in seed mutators — all write through writeSeeds with a clone.
  const renameSeedItem = (groupIdx, itemIdx, newText) => {
    const t = (newText || "").trim();
    if (!t) return;
    const groups = cloneGroups();
    const oldText = groups[groupIdx].items[itemIdx];
    groups[groupIdx].items[itemIdx] = t;
    writeSeeds(groups);
    // Migrate the per-item flag if it was set
    if (oldText !== t && isPhraseFlagged(appSettings, activeKey, oldText)) {
      setPhraseFlag(appSettings, setAppSettings, activeKey, oldText, false);
      setPhraseFlag(appSettings, setAppSettings, activeKey, t, true);
    }
  };
  const removeSeedItem = (groupIdx, itemIdx) => {
    const groups = cloneGroups();
    const removed = groups[groupIdx].items[itemIdx];
    if (!window.confirm(`Remove "${removed}" from the built-in seeds?\n\nهل تريد حذف "${removed}" من العبارات المبنية؟`)) return;
    groups[groupIdx].items.splice(itemIdx, 1);
    writeSeeds(groups);
    if (isPhraseFlagged(appSettings, activeKey, removed)) {
      setPhraseFlag(appSettings, setAppSettings, activeKey, removed, false);
    }
  };
  const removeSeedGroup = (groupIdx) => {
    const groups = cloneGroups();
    const removed = groups[groupIdx];
    if (!window.confirm(`Remove the entire "${removed.group}" group and all ${(removed.items || []).length} phrases under it?`)) return;
    (removed.items || []).forEach(it => {
      if (isPhraseFlagged(appSettings, activeKey, it)) {
        setPhraseFlag(appSettings, setAppSettings, activeKey, it, false);
      }
    });
    groups.splice(groupIdx, 1);
    writeSeeds(groups);
  };
  const renameSeedGroup = (groupIdx, newName) => {
    const t = (newName || "").trim();
    if (!t) return;
    const groups = cloneGroups();
    groups[groupIdx].group = t;
    writeSeeds(groups);
  };
  const addSeedGroup = () => {
    const t = newGroupName.trim();
    if (!t) { setAddingGroup(false); return; }
    const groups = cloneGroups();
    groups.push({ group: t, items: [] });
    writeSeeds(groups);
    setNewGroupName("");
    setAddingGroup(false);
  };
  const addSeedItemToGroup = (groupIdx) => {
    const t = newItemText.trim();
    if (!t) { setAddingToGroup(null); return; }
    const groups = cloneGroups();
    if (!groups[groupIdx].items) groups[groupIdx].items = [];
    groups[groupIdx].items.push(t);
    writeSeeds(groups);
    setNewItemText("");
    setAddingToGroup(null);
  };
  const resetSeedsForKey = () => {
    if (!window.confirm("Reset the built-in seeds for this category to the original list?\n\nاستعادة العبارات الأصلية لهذا التصنيف؟")) return;
    if (typeof setAppSettings === "function") {
      resetPhraseSeeds(appSettings, setAppSettings, activeKey);
    }
  };

  const togglePhraseFlag = (phrase) => {
    if (typeof setAppSettings !== "function") return;
    const cur = isPhraseFlagged(appSettings, activeKey, phrase);
    setPhraseFlag(appSettings, setAppSettings, activeKey, phrase, !cur);
  };

  const totalSeed = seedGroups.reduce((sum, g) => sum + (g.items || []).length, 0);

  return (
    <Card title={<>Phrase Library · <span style={{ direction: "rtl", fontWeight: 500, color: T.inkSoft, fontSize: 13 }}>مكتبة العبارات</span></>}
      icon={<BookOpen size={15} strokeWidth={1.6} />} accent={T.rose}>
      <div style={{ fontSize: 12, color: T.inkSoft, marginBottom: 12, lineHeight: 1.55 }}>
        Phrases here power the autocomplete dropdowns in the visit logbook
        (C/O · US Exam · Rx · Notes …). Tap a tab to manage that list.
        <strong> v6.8:</strong> Built-in seeds are <strong>fully editable</strong> — rename, delete, or add new ones.
        Toggle the <strong>flag icon</strong> next to any phrase to <strong>auto-pin</strong> it to the
        Active Flags rail whenever it's typed or selected in any visit.
        <br />
        <span style={{ direction: "rtl" }}>
          العبارات المبنية أصبحت قابلة للتعديل بالكامل. فعّل أيقونة العَلم لتثبيت العبارة تلقائياً في شريط التنبيهات عند كتابتها أو اختيارها.
        </span>
      </div>

      {/* Tab strip */}
      <div style={{
        display: "flex", flexWrap: "wrap", gap: 4,
        marginBottom: 14, paddingBottom: 10,
        borderBottom: `1px solid ${T.lineSoft}`,
      }}>
        {PHRASE_LIBRARY_TABS.map(t => {
          const userCount = ((dictAPI.dict && dictAPI.dict[t.key]) || []).length;
          const seedCount = resolveSeedGroups(appSettings, t.key).reduce((s, g) => s + (g.items || []).length, 0);
          const active = activeKey === t.key;
          return (
            <button
              key={t.key}
              onClick={() => { setActiveKey(t.key); setDraft(""); setEditingSeed(null); setAddingToGroup(null); setAddingGroup(false); }}
              style={{
                padding: "5px 10px", borderRadius: 6,
                background: active ? T.rose : T.paperWarm,
                color: active ? "#fff" : T.ink,
                border: `1px solid ${active ? T.rose : T.lineSoft}`,
                fontSize: 11.5, fontWeight: 600, cursor: "pointer",
                fontFamily: "inherit",
                display: "inline-flex", alignItems: "center", gap: 5,
              }}>
              <span style={{ fontSize: 13 }}>{t.icon}</span>
              {t.label}
              <span style={{
                fontSize: 10, fontWeight: 700,
                padding: "1px 6px", borderRadius: 999,
                background: active ? "rgba(255,255,255,0.25)" : T.tealSoft,
                color: active ? "#fff" : T.tealDeep,
              }}>
                {seedCount + userCount}
              </span>
            </button>
          );
        })}
      </div>

      {/* Add new phrase (saved-only) */}
      <Field label={<>Add a saved phrase · <span style={{ direction: "rtl", color: T.inkSoft }}>إضافة عبارة محفوظة</span></>}>
        <div style={{ display: "flex", gap: 6 }}>
          <input
            style={{ ...styles.input, flex: 1 }}
            placeholder="Type a new phrase, then Enter or Add"
            value={draft}
            onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addItem(); } }}
          />
          <button
            onClick={addItem}
            disabled={!draft.trim()}
            style={{
              ...styles.miniBtn,
              background: T.rose, color: "#fff", borderColor: T.rose,
              opacity: draft.trim() ? 1 : 0.4,
              cursor: draft.trim() ? "pointer" : "not-allowed",
            }}>
            <Plus size={11} strokeWidth={2.2} /> Add
          </button>
        </div>
      </Field>

      {/* Saved phrases list (existing chips with X + Flag) */}
      <div style={{ marginTop: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: T.ink, marginBottom: 8, letterSpacing: 0.4, textTransform: "uppercase" }}>
          ✦ Saved phrases · {customItems.length}
        </div>
        {customItems.length === 0 ? (
          <EmptyHint>
            No saved phrases for this category yet. Add one above, or use the "+ Add to library" hint in any visit cell.
          </EmptyHint>
        ) : (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {customItems.map(it => {
              const flagged = isPhraseFlagged(appSettings, activeKey, it);
              return (
                <span key={it} style={{
                  display: "inline-flex", alignItems: "center", gap: 4,
                  padding: "4px 4px 4px 10px",
                  background: flagged ? T.flagBg : T.coralSoft,
                  color: flagged ? T.flag : T.coral,
                  border: `1px solid ${flagged ? T.flag : hexAlpha(T.coral, 0.3)}`,
                  borderRadius: 999,
                  fontSize: 12, fontWeight: 600,
                }}>
                  {it}
                  <button
                    onClick={() => togglePhraseFlag(it)}
                    title={flagged ? "Auto-flag ON · click to disable" : "Auto-flag OFF · click to enable"}
                    style={{
                      width: 18, height: 18, borderRadius: "50%",
                      background: flagged ? T.flag : "transparent",
                      color: flagged ? "#fff" : T.coral,
                      border: "none", display: "grid", placeItems: "center",
                      cursor: "pointer", opacity: flagged ? 1 : 0.6,
                    }}>
                    <Flag size={9} strokeWidth={2.2} fill={flagged ? "#fff" : "none"} />
                  </button>
                  <button
                    onClick={() => removeItem(it)}
                    title="Remove"
                    style={{
                      width: 18, height: 18, borderRadius: "50%",
                      background: hexAlpha(flagged ? T.flag : T.coral, 0.15),
                      color: flagged ? T.flag : T.coral,
                      border: "none", display: "grid", placeItems: "center",
                      cursor: "pointer",
                    }}>
                    <X size={10} strokeWidth={2.2} />
                  </button>
                </span>
              );
            })}
          </div>
        )}
      </div>

      {/* v6.8 — Editable Built-in seeds */}
      <div style={{ marginTop: 18, paddingTop: 14, borderTop: `1px dashed ${T.lineSoft}` }}>
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "center",
          marginBottom: 10, gap: 8, flexWrap: "wrap",
        }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: T.tealDeep, letterSpacing: 0.4, textTransform: "uppercase" }}>
            Built-in seeds · {totalSeed}
            {isOverridden && (
              <span style={{
                marginLeft: 8, fontSize: 9.5, fontWeight: 700,
                padding: "1px 6px", borderRadius: 999,
                background: T.ochreSoft, color: T.ochre, letterSpacing: 0.4,
              }}>
                EDITED
              </span>
            )}
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button
              onClick={() => setAddingGroup(true)}
              style={{ ...styles.miniBtn, background: T.tealDeep, color: "#fff", borderColor: T.tealDeep }}>
              <Plus size={11} strokeWidth={2.2} /> Add group
            </button>
            {isOverridden && (
              <button
                onClick={resetSeedsForKey}
                style={{ ...styles.miniBtn, background: T.paperWarm, color: T.inkSoft, borderColor: T.line }}
                title="Restore the original built-in seeds for this category">
                <ArrowRightLeft size={11} strokeWidth={1.8} /> Reset
              </button>
            )}
          </div>
        </div>

        {addingGroup && (
          <div style={{
            display: "flex", gap: 6, marginBottom: 10,
            padding: "8px 10px", borderRadius: 6,
            background: T.tealSoft, border: `1px solid ${hexAlpha(T.teal, 0.3)}`,
          }}>
            <input
              autoFocus
              style={{ ...styles.input, flex: 1 }}
              placeholder="New group name (e.g. Routine, Red flags)"
              value={newGroupName}
              onChange={(e) => setNewGroupName(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Enter") addSeedGroup();
                if (e.key === "Escape") { setAddingGroup(false); setNewGroupName(""); }
              }}
            />
            <button onClick={addSeedGroup} disabled={!newGroupName.trim()}
              style={{ ...styles.miniBtn, background: T.tealDeep, color: "#fff", borderColor: T.tealDeep, opacity: newGroupName.trim() ? 1 : 0.5 }}>
              <Plus size={11} strokeWidth={2.2} /> Add
            </button>
            <button onClick={() => { setAddingGroup(false); setNewGroupName(""); }} style={styles.miniIconBtn}>
              <X size={11} strokeWidth={1.8} />
            </button>
          </div>
        )}

        <div style={{ display: "grid", gap: 8 }}>
          {seedGroups.length === 0 ? (
            <EmptyHint>
              All groups have been removed. Click "Add group" to start a new one, or "Reset" to restore the original seeds.
            </EmptyHint>
          ) : seedGroups.map((g, gi) => (
            <div key={gi} style={{
              padding: "8px 10px", borderRadius: 6,
              background: T.paper, border: `1px solid ${T.lineSoft}`,
            }}>
              <div style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                marginBottom: 8, gap: 6,
              }}>
                <input
                  defaultValue={g.group}
                  onBlur={(e) => { if (e.target.value !== g.group) renameSeedGroup(gi, e.target.value); }}
                  onKeyDown={(e) => { if (e.key === "Enter") e.target.blur(); }}
                  style={{
                    flex: 1, padding: "2px 6px",
                    border: `1px dashed ${T.line}`,
                    background: "transparent", color: T.tealDeep,
                    borderRadius: 3,
                    fontSize: 10.5, fontWeight: 700, letterSpacing: 0.3, textTransform: "uppercase",
                    outline: "none", fontFamily: "inherit",
                  }}
                />
                <button
                  onClick={() => { setAddingToGroup(gi); setNewItemText(""); }}
                  style={{ ...styles.miniIconBtn, background: T.tealSoft, color: T.tealDeep, borderColor: T.teal }}
                  title="Add phrase to this group">
                  <Plus size={11} strokeWidth={2.2} />
                </button>
                <button onClick={() => removeSeedGroup(gi)} style={styles.miniIconBtn} title="Delete entire group">
                  <Trash2 size={11} strokeWidth={1.8} />
                </button>
              </div>

              {addingToGroup === gi && (
                <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                  <input
                    autoFocus
                    style={{ ...styles.input, flex: 1, padding: "5px 9px", fontSize: 12 }}
                    placeholder="Type new phrase…"
                    value={newItemText}
                    onChange={(e) => setNewItemText(e.target.value)}
                    onKeyDown={(e) => {
                      if (e.key === "Enter") addSeedItemToGroup(gi);
                      if (e.key === "Escape") { setAddingToGroup(null); setNewItemText(""); }
                    }}
                  />
                  <button onClick={() => addSeedItemToGroup(gi)} disabled={!newItemText.trim()}
                    style={{ ...styles.miniBtn, background: T.teal, color: "#fff", borderColor: T.teal, opacity: newItemText.trim() ? 1 : 0.5 }}>
                    <Plus size={11} strokeWidth={2.2} />
                  </button>
                  <button onClick={() => { setAddingToGroup(null); setNewItemText(""); }} style={styles.miniIconBtn}>
                    <X size={11} strokeWidth={1.8} />
                  </button>
                </div>
              )}

              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {(g.items || []).map((it, ii) => {
                  const flagged = isPhraseFlagged(appSettings, activeKey, it);
                  const isEditingThis = editingSeed && editingSeed.groupIdx === gi && editingSeed.itemIdx === ii;
                  if (isEditingThis) {
                    return (
                      <span key={`edit-${gi}-${ii}`} style={{
                        display: "inline-flex", alignItems: "center", gap: 4,
                        padding: 2, borderRadius: 4,
                        border: `1.5px solid ${T.teal}`, background: T.card,
                      }}>
                        <input
                          autoFocus
                          defaultValue={it}
                          onBlur={(e) => { renameSeedItem(gi, ii, e.target.value); setEditingSeed(null); }}
                          onKeyDown={(e) => {
                            if (e.key === "Enter") { renameSeedItem(gi, ii, e.target.value); setEditingSeed(null); }
                            if (e.key === "Escape") setEditingSeed(null);
                          }}
                          style={{
                            padding: "2px 6px",
                            border: "none", outline: "none",
                            background: "transparent", color: T.ink,
                            fontSize: 11, fontWeight: 600, fontFamily: "inherit",
                            minWidth: 200,
                          }}
                        />
                      </span>
                    );
                  }
                  return (
                    <span key={`${it}-${ii}`} style={{
                      display: "inline-flex", alignItems: "center", gap: 3,
                      padding: "3px 4px 3px 8px",
                      background: flagged ? T.flagBg : T.tealSoft,
                      color: flagged ? T.flag : T.tealDeep,
                      border: `1px solid ${flagged ? T.flag : hexAlpha(T.teal, 0.2)}`,
                      borderRadius: 4, fontSize: 11, fontWeight: 500,
                    }}>
                      <button
                        onClick={() => setEditingSeed({ groupIdx: gi, itemIdx: ii })}
                        title="Click to rename"
                        style={{
                          background: "transparent", border: "none", padding: 0,
                          color: "inherit", font: "inherit", cursor: "text",
                        }}>
                        {it}
                      </button>
                      <button
                        onClick={() => togglePhraseFlag(it)}
                        title={flagged ? "Auto-flag ON · click to disable" : "Auto-flag OFF · click to enable"}
                        style={{
                          width: 16, height: 16, borderRadius: 3,
                          background: flagged ? T.flag : "transparent",
                          color: flagged ? "#fff" : T.tealDeep,
                          border: "none", display: "grid", placeItems: "center",
                          cursor: "pointer", opacity: flagged ? 1 : 0.55,
                        }}>
                        <Flag size={8} strokeWidth={2.2} fill={flagged ? "#fff" : "none"} />
                      </button>
                      <button
                        onClick={() => removeSeedItem(gi, ii)}
                        title="Delete this phrase"
                        style={{
                          width: 16, height: 16, borderRadius: 3,
                          background: "transparent", color: "inherit",
                          border: "none", display: "grid", placeItems: "center",
                          cursor: "pointer", opacity: 0.55,
                        }}>
                        <X size={9} strokeWidth={2} />
                      </button>
                    </span>
                  );
                })}
                {(g.items || []).length === 0 && (
                  <span style={{ fontSize: 10.5, color: T.inkSoft, fontStyle: "italic" }}>
                    No phrases in this group. Click + to add one.
                  </span>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>
    </Card>
  );
}


// ============================================================
// LAYOUT MANAGER — controls couple-table row visibility, custom rows, and cell sizes
// ============================================================
function LayoutManagerCard({ appSettings, update }) {
  const hidden = appSettings.hiddenCoupleRows || [];
  const sizes  = appSettings.coupleCellSizes || {};
  const customRows = appSettings.customCoupleRows || [];

  const toggleHidden = (id) => {
    const next = hidden.includes(id) ? hidden.filter(x => x !== id) : [...hidden, id];
    update({ hiddenCoupleRows: next });
  };
  const setCellSize = (id, dim, value) => {
    const cur = sizes[id] || {};
    const v = value === "" ? null : parseInt(value, 10);
    const nextRow = { ...cur };
    if (v === null || Number.isNaN(v)) delete nextRow[dim]; else nextRow[dim] = v;
    update({ coupleCellSizes: { ...sizes, [id]: nextRow } });
  };
  const resetSize = (id) => {
    const next = { ...sizes };
    delete next[id];
    update({ coupleCellSizes: next });
  };
  const addCustomRow = () => {
    update({
      customCoupleRows: [
        ...customRows,
        { id: uid(), en: "New field", ar: "حقل جديد" },
      ],
    });
  };
  const updateCustomRow = (id, patch) => {
    update({ customCoupleRows: customRows.map(r => r.id === id ? { ...r, ...patch } : r) });
  };
  const removeCustomRow = (id) => {
    update({ customCoupleRows: customRows.filter(r => r.id !== id) });
    const ns = { ...sizes }; delete ns[id];
    update({ coupleCellSizes: ns });
  };

  // All rows together, with metadata
  const allRows = [
    ...COUPLE_STANDARD_ROWS.map(r => ({ id: r.id, labelEn: r.labelEn, labelAr: r.labelAr, isCustom: false })),
    ...customRows.map(r => ({ id: r.id, labelEn: r.en, labelAr: r.ar, isCustom: true, raw: r })),
  ];

  const RowEditor = ({ r }) => {
    const isHidden = hidden.includes(r.id);
    const sz = sizes[r.id] || {};
    return (
      <div style={{
        display: "grid",
        gridTemplateColumns: "auto 1fr 80px 80px auto",
        gap: 8, alignItems: "center",
        padding: "8px 10px", borderRadius: 8,
        background: isHidden ? hexAlpha(T.flag, 0.05) : T.paper,
        border: `1px solid ${isHidden ? hexAlpha(T.flag, 0.2) : T.lineSoft}`,
        opacity: isHidden ? 0.7 : 1,
      }}>
        <button onClick={() => toggleHidden(r.id)} style={{
          ...styles.miniIconBtn,
          background: isHidden ? T.flagBg : T.tealSoft,
          color: isHidden ? T.flag : T.tealDeep,
          borderColor: isHidden ? T.flag : T.teal,
          width: 28, height: 28,
        }} title={isHidden ? "Show row" : "Hide row"}>
          {isHidden ? <X size={12} strokeWidth={2.2} /> : <Eye size={12} strokeWidth={2} />}
        </button>
        <div style={{ minWidth: 0 }}>
          {r.isCustom ? (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              <input
                style={{ ...styles.input, padding: "5px 9px", fontSize: 12 }}
                value={r.raw.en}
                onChange={(e) => updateCustomRow(r.id, { en: e.target.value })}
                placeholder="English label" />
              <input
                style={{ ...styles.input, padding: "5px 9px", fontSize: 12, direction: "rtl", textAlign: "right" }}
                value={r.raw.ar}
                onChange={(e) => updateCustomRow(r.id, { ar: e.target.value })}
                placeholder="التسمية" />
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: T.ink }}>{r.labelEn}</div>
              <div style={{ direction: "rtl", fontSize: 11.5, color: T.inkSoft }}>{r.labelAr}</div>
            </div>
          )}
        </div>
        <input type="number" min={80} max={500} step={10}
          placeholder="auto"
          value={sz.width || ""}
          onChange={(e) => setCellSize(r.id, "width", e.target.value)}
          style={{ ...styles.input, padding: "5px 8px", fontSize: 11, textAlign: "center" }}
          title="Width in pixels" />
        <input type="number" min={28} max={200} step={4}
          placeholder="auto"
          value={sz.height || ""}
          onChange={(e) => setCellSize(r.id, "height", e.target.value)}
          style={{ ...styles.input, padding: "5px 8px", fontSize: 11, textAlign: "center" }}
          title="Height in pixels" />
        <div style={{ display: "flex", gap: 4 }}>
          {(sz.width || sz.height) && (
            <button onClick={() => resetSize(r.id)} style={styles.miniIconBtn} title="Reset size">
              <ArrowRightLeft size={11} strokeWidth={1.8} />
            </button>
          )}
          {r.isCustom && (
            <button onClick={() => removeCustomRow(r.id)} style={{ ...styles.miniIconBtn, color: T.flag }} title="Delete row">
              <Trash2 size={11} strokeWidth={1.8} />
            </button>
          )}
        </div>
      </div>
    );
  };

  return (
    <Card sectionId="settings.layout"
      title={<>Layout Manager · <span style={{ direction: "rtl", fontWeight: 500, color: T.inkSoft, fontSize: 13 }}>مدير التخطيط</span></>}
      icon={<Columns3 size={15} strokeWidth={1.6} />} accent={T.tealDeep}
      right={
        <button onClick={addCustomRow} style={{ ...styles.miniBtn, background: T.tealDeep, color: "#fff", borderColor: T.tealDeep }}>
          <Plus size={11} strokeWidth={2.2} /> Add field · إضافة
        </button>
      }>
      <div style={{ fontSize: 12, color: T.inkSoft, marginBottom: 12, lineHeight: 1.55 }}>
        Show, hide, resize, or delete fields in the bilingual <strong>Couple Intake</strong> table.
        Width and height are in pixels (leave empty for auto). Hiding standard rows is reversible.
        Custom rows can be deleted entirely.
        <br />
        <span style={{ direction: "rtl", display: "inline-block", marginTop: 4 }}>
          إظهار وإخفاء وتغيير حجم وحذف حقول جدول الزوجين. القياسات بالبكسل (اتركها فارغة للحجم التلقائي).
        </span>
      </div>

      <div style={{
        display: "grid",
        gridTemplateColumns: "auto 1fr 80px 80px auto",
        gap: 8, padding: "0 10px 6px",
        fontSize: 9.5, color: T.inkSoft, fontWeight: 700, letterSpacing: 0.6, textTransform: "uppercase",
      }}>
        <span>VIS</span>
        <span>FIELD · الحقل</span>
        <span style={{ textAlign: "center" }}>W (px)</span>
        <span style={{ textAlign: "center" }}>H (px)</span>
        <span></span>
      </div>

      <div style={{ display: "grid", gap: 6 }}>
        {allRows.map(r => <RowEditor key={r.id} r={r} />)}
      </div>

      {hidden.length > 0 && (
        <div style={{
          marginTop: 12, padding: "8px 12px", borderRadius: 8,
          background: hexAlpha(T.flag, 0.06), border: `1px dashed ${hexAlpha(T.flag, 0.3)}`,
          fontSize: 11.5, color: T.flag,
        }}>
          {hidden.length} row{hidden.length === 1 ? "" : "s"} currently hidden ·
          <button onClick={() => update({ hiddenCoupleRows: [] })}
            style={{ marginLeft: 8, padding: "1px 8px", borderRadius: 4, border: "none", background: T.flag, color: "#fff", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>
            Show all
          </button>
        </div>
      )}
    </Card>
  );
}


// ============================================================
// SECTION STYLES — per-section bold / font-size / colors
// ============================================================
function SectionStylesCard({ appSettings, update }) {
  const styles_map = appSettings.sectionStyles || {};
  const [activeId, setActiveId] = useState(SECTION_REGISTRY[0].id);
  const cur = styles_map[activeId] || {};

  const setVal = (key, val) => {
    const next = { ...cur };
    if (val === null || val === "" || val === undefined) delete next[key];
    else next[key] = val;
    const allNext = { ...styles_map };
    if (Object.keys(next).length === 0) delete allNext[activeId];
    else allNext[activeId] = next;
    update({ sectionStyles: allNext });
  };
  const reset = () => {
    const next = { ...styles_map };
    delete next[activeId];
    update({ sectionStyles: next });
  };

  const overriddenIds = Object.keys(styles_map).filter(id => Object.keys(styles_map[id] || {}).length);

  return (
    <Card sectionId="settings.styles"
      title={<>Section styles · <span style={{ direction: "rtl", fontWeight: 500, color: T.inkSoft, fontSize: 13 }}>تنسيق الأقسام</span></>}
      icon={<Palette size={15} strokeWidth={1.6} />} accent={T.coral}
      right={
        overriddenIds.length > 0 && (
          <span style={{
            padding: "3px 9px", borderRadius: 999,
            background: T.coralSoft, color: T.coral,
            fontSize: 11, fontWeight: 700,
          }}>
            {overriddenIds.length} customized
          </span>
        )
      }>
      <div style={{ fontSize: 12, color: T.inkSoft, marginBottom: 12, lineHeight: 1.55 }}>
        Pick a section, then override its bold weight, font size, text color, accent stripe, or background — separately from the global theme.
        <br />
        <span style={{ direction: "rtl", display: "inline-block", marginTop: 4 }}>
          اختر قسماً وعدّل خطه ولونه وخلفيته بشكل مستقل.
        </span>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "240px 1fr", gap: 14 }}>
        {/* Sections list */}
        <div style={{
          maxHeight: 360, overflow: "auto",
          border: `1px solid ${T.lineSoft}`, borderRadius: 10,
          background: T.paper, padding: 6,
        }}>
          {SECTION_REGISTRY.map(s => {
            const has = !!styles_map[s.id] && Object.keys(styles_map[s.id]).length > 0;
            const active = s.id === activeId;
            return (
              <button key={s.id} onClick={() => setActiveId(s.id)} style={{
                display: "block", width: "100%", textAlign: "left",
                padding: "8px 10px", borderRadius: 6, border: "none",
                background: active ? T.tealSoft : "transparent",
                color: active ? T.tealDeep : T.ink,
                cursor: "pointer", marginBottom: 2,
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: active ? 700 : 500 }}>
                  {has && <span style={{ width: 6, height: 6, borderRadius: 999, background: T.coral }} />}
                  <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.en}</span>
                </div>
                <div style={{ direction: "rtl", fontSize: 10.5, color: active ? T.tealDeep : T.inkSoft, marginTop: 2 }}>{s.ar}</div>
              </button>
            );
          })}
        </div>

        {/* Style controls for the active section */}
        <div style={{ display: "grid", gap: 12 }}>
          <Field label={<>Bold · <span style={{ direction: "rtl", color: T.inkSoft }}>خط عريض</span></>}>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => setVal("bold", null)} style={{
                ...styles.miniBtn,
                background: cur.bold === undefined ? T.tealSoft : T.card,
                color: cur.bold === undefined ? T.tealDeep : T.ink,
                borderColor: cur.bold === undefined ? T.teal : T.line,
              }}>Default</button>
              <button onClick={() => setVal("bold", true)} style={{
                ...styles.miniBtn,
                background: cur.bold === true ? T.tealSoft : T.card,
                color: cur.bold === true ? T.tealDeep : T.ink,
                borderColor: cur.bold === true ? T.teal : T.line,
                fontWeight: 700,
              }}><Bold size={11} strokeWidth={2.2} /> Bold ON</button>
              <button onClick={() => setVal("bold", false)} style={{
                ...styles.miniBtn,
                background: cur.bold === false ? T.tealSoft : T.card,
                color: cur.bold === false ? T.tealDeep : T.ink,
                borderColor: cur.bold === false ? T.teal : T.line,
              }}>Bold OFF</button>
            </div>
          </Field>

          <Field label={<>Font size · <span style={{ direction: "rtl", color: T.inkSoft }}>حجم الخط</span> {cur.fontSize ? <strong style={{ color: T.tealDeep }}> · {cur.fontSize}px</strong> : <span style={{ color: T.inkSoft }}> · default</span>}</>}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <input type="range" min={11} max={22} step={1}
                value={cur.fontSize || 14}
                onChange={(e) => setVal("fontSize", parseInt(e.target.value, 10))}
                style={{ flex: 1, accentColor: T.teal }} />
              {cur.fontSize && (
                <button onClick={() => setVal("fontSize", null)} style={styles.miniBtn} title="Reset">
                  <X size={11} strokeWidth={1.8} /> Default
                </button>
              )}
            </div>
          </Field>

          <Field label={<>Text color · <span style={{ direction: "rtl", color: T.inkSoft }}>لون النص</span></>}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <input type="color"
                value={cur.color || T.ink}
                onChange={(e) => setVal("color", e.target.value)}
                style={{ width: 40, height: 30, padding: 0, border: `1px solid ${T.lineSoft}`, borderRadius: 6, cursor: "pointer" }} />
              <code style={{ fontSize: 11, fontFamily: "monospace", color: T.inkSoft }}>{cur.color || "default"}</code>
              {cur.color && (
                <button onClick={() => setVal("color", null)} style={styles.miniBtn} title="Reset">
                  <X size={11} strokeWidth={1.8} />
                </button>
              )}
            </div>
          </Field>

          <Field label={<>Background color · <span style={{ direction: "rtl", color: T.inkSoft }}>لون الخلفية</span></>}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <input type="color"
                value={cur.bgColor || T.card}
                onChange={(e) => setVal("bgColor", e.target.value)}
                style={{ width: 40, height: 30, padding: 0, border: `1px solid ${T.lineSoft}`, borderRadius: 6, cursor: "pointer" }} />
              <code style={{ fontSize: 11, fontFamily: "monospace", color: T.inkSoft }}>{cur.bgColor || "default"}</code>
              {cur.bgColor && (
                <button onClick={() => setVal("bgColor", null)} style={styles.miniBtn} title="Reset">
                  <X size={11} strokeWidth={1.8} />
                </button>
              )}
            </div>
          </Field>

          <Field label={<>Accent stripe · <span style={{ direction: "rtl", color: T.inkSoft }}>الشريط العلوي</span></>}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <input type="color"
                value={cur.accent || T.teal}

function StorageStats() {
  const [stats, setStats] = useState(null);
  useEffect(() => {
    try {
      const raw = window.localStorage.getItem(STORAGE_KEY) || "";
      const bytes = new Blob([raw]).size;
      const parsed = raw ? JSON.parse(raw) : {};
      const patientsCount = (parsed.patients || []).length;
      let mediaCount = 0, mediaBytes = 0;
      (parsed.patients || []).forEach(p => {
        (p.media || []).forEach(m => {
          mediaCount++;
          mediaBytes += dataUrlByteSize(m.dataUrl || "");
        });
      });
      setStats({ totalBytes: bytes, patientsCount, mediaCount, mediaBytes });
    } catch (e) {
      setStats({ error: e.message });
    }
  }, []);
  if (!stats) return <div style={{ fontSize: 12, color: T.inkSoft }}>Calculating…</div>;
  if (stats.error) return <div style={{ fontSize: 12, color: T.flag }}>Error: {stats.error}</div>;
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
      <StatBox label="Total stored" labelAr="الحجم الكلي" value={formatBytes(stats.totalBytes)} accent={T.teal} />
      <StatBox label="Patients" labelAr="مرضى" value={stats.patientsCount} accent={T.rose} />
      <StatBox label="Files uploaded" labelAr="ملفات مرفوعة" value={stats.mediaCount} accent={T.coral} />
      <StatBox label="Files size" labelAr="حجم الملفات" value={formatBytes(stats.mediaBytes)} accent={T.ochre} />
    </div>
  );
}
function StatBox({ label, labelAr, value, accent }) {
  return (
    <div style={{
      padding: 14, borderRadius: 10,
      background: hexAlpha(accent, 0.06),
      border: `1px solid ${hexAlpha(accent, 0.25)}`,
    }}>
      <div style={{
        fontSize: 10, letterSpacing: 0.6, textTransform: "uppercase",

      <div style={{ fontSize: 22, fontWeight: 700, color: T.ink, fontFamily: "'Fraunces', Georgia, serif" }}>{value}</div>
      <div style={{ direction: "rtl", fontSize: 11, color: T.inkSoft }}>{labelAr}</div>
    </div>
  );
}

const SUPABASE_SQL_SETUP = `-- Run this once in your Supabase SQL Editor.
-- Safe to re-run if you need to re-apply or recover.

create table if not exists patients_demographics (
  id text primary key,
  data jsonb not null,
  updated_at timestamptz not null default now()
);
create table if not exists patients_clinical (
  id text primary key,
  data jsonb not null,
  updated_at timestamptz not null default now()
);
create table if not exists appts (
  id text primary key,
  data jsonb not null,
  updated_at timestamptz not null default now()
);
create table if not exists bills (
  id text primary key,
  data jsonb not null,
  updated_at timestamptz not null default now()
);
create table if not exists app_state (
  key text primary key,
  data jsonb not null,
  updated_at timestamptz not null default now()
);

alter table patients_demographics enable row level security;
alter table patients_clinical     enable row level security;
alter table appts                 enable row level security;
alter table bills                 enable row level security;
alter table app_state             enable row level security;

drop policy if exists "anon all" on patients_demographics;
drop policy if exists "anon all" on patients_clinical;
drop policy if exists "anon all" on appts;
drop policy if exists "anon all" on bills;
drop policy if exists "anon all" on app_state;

create policy "anon all" on patients_demographics for all to anon using (true) with check (true);
create policy "anon all" on patients_clinical     for all to anon using (true) with check (true);
create policy "anon all" on appts                 for all to anon using (true) with check (true);
create policy "anon all" on bills                 for all to anon using (true) with check (true);
create policy "anon all" on app_state             for all to anon using (true) with check (true);

do $$
declare t text;
begin
  for t in select unnest(array[
    'patients_demographics','patients_clinical','appts','bills','app_state'
  ])
  loop
    begin
      execute format('alter publication supabase_realtime add table %I', t);
    exception when duplicate_object then
      null;
    end;
  end loop;
end $$;
`;

  const procList = (procedureOptions && procedureOptions.length > 0) ? procedureOptions : SURGERY_OPTIONS;
  const isCustom = procList[procIdx]?.en === "Other / Custom";

    if (!date || !time) return false;

                <input type="date" style={styles.input} value={date} onChange={(e) => setDate(e.target.value)} />
              </Field>
              <Field label={<>Time · <span style={{ direction: "rtl", color: T.inkSoft }}>الوقت</span></>}>
                <input type="time" style={styles.input} value={time} onChange={(e) => setTime(e.target.value)} />
              </Field>
            </div>

            <Field label={<>Procedure · <span style={{ direction: "rtl", color: T.inkSoft }}>الإجراء</span></>}>
              <select
                style={styles.input}
                value={String(procIdx)}
                onChange={(e) => {
                  const v = e.target.value;
                  if (v === "__add_new__") {
                    if (onAddProcedureOption) {
                      const addedIndex = onAddProcedureOption();
                      if (typeof addedIndex === "number" && addedIndex >= 0) setProcIdx(addedIndex);
                    }
                    return;
                  }
                  setProcIdx(Number(v));
                }}>
                {procList.map((o, i) => (
                  <option key={i} value={i}>{o.en} · {o.ar}</option>
                ))}
                <option value="__add_new__">+ Add New...</option>
              </select>
            </Field>

            {isCustom && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }} className="surgery-grid-2col">
                <Field label="Custom procedure (English)">
                  <input style={styles.input} value={customProcEn}
                    onChange={(e) => setCustomProcEn(e.target.value)}
                    placeholder="e.g. Vaginoplasty" />
                </Field>
                <Field label={<span style={{ direction: "rtl" }}>الإجراء (عربي)</span>}>
                  <input style={{ ...styles.input, direction: "rtl" }} value={customProcAr}
                    onChange={(e) => setCustomProcAr(e.target.value)}
                    placeholder="مثلاً: عملية رأب المهبل" />
                </Field>
              </div>
            )}

            <Field label={<>Location · <span style={{ direction: "rtl", color: T.inkSoft }}>المكان</span></>}>
              <select
                style={styles.input}
                value={location}
                onChange={(e) => {
                  const v = e.target.value;
                  if (v === "__add_new_location__") {
                    if (onAddLocationOption) {
                      const addedValue = onAddLocationOption();
                      if (typeof addedValue === "string" && addedValue.trim()) setLocation(addedValue);
                    }
                    return;
                  }
                  setLocation(v);
                }}>
                {locationList.map((o, i) => {
                  const lab = locationOptionLabel(o);
                  return <option key={i} value={lab}>{lab}</option>;
                })}
                <option value="__add_new_location__">+ Add New...</option>
              </select>
            </Field>

            <Field label={<>Surgeon / Team · <span style={{ direction: "rtl", color: T.inkSoft }}>الطبيب / الفريق</span></>}>
              <input style={styles.input} value={surgeon}
                onChange={(e) => setSurgeon(e.target.value)}
                placeholder="Lead surgeon name (optional)" />
            </Field>

            <Field label={<>Notes · <span style={{ direction: "rtl", color: T.inkSoft }}>ملاحظات</span></>}>
              <textarea
                style={{ ...styles.input, minHeight: 60, resize: "vertical", fontFamily: "inherit" }}
                value={notes}
                onChange={(e) => setNotes(e.target.value)}
                placeholder="Pre-op notes, anesthesia, indication, …"
              />
            </Field>
          </div>
        </div>

        {/* Footer */}
        <div style={{
          padding: "12px 20px",
          borderTop: `1px solid ${T.lineSoft}`,
          background: T.card,
          display: "flex", justifyContent: "flex-end", gap: 8,
        }}>
          <button onClick={onClose} style={styles.ghostBtn}>
            Cancel · إلغاء
          </button>
          <button
            onClick={submit}
            disabled={!valid}
            style={{
              ...styles.primaryBtn,
              background: T.rose,
              opacity: valid ? 1 : 0.5,
              cursor: valid ? "pointer" : "not-allowed",
            }}>
            <Save size={13} strokeWidth={1.8} />
            Add to Master Diary · حفظ
          </button>
        </div>
      </div>
    </div>
  );
}


// Master Diary — persisted dropdown catalog (reasons / procedures / locations)
const MASTER_DIARY_REASON_LS = "masterDiaryReasonOptions";
const MASTER_DIARY_PROCEDURE_LS = "masterDiaryProcedureOptions";
const MASTER_DIARY_LOCATION_LS = "masterDiaryLocationOptions";

// ============================================================
// MasterDiary — Unified Daily Diary
// Section A: Clinic appointments (from `appts`)
// Section B: OR / Surgical procedures (from `surgeries`)
// Both sections support:
//   • clickable rows that open the patient's file
//   • bilingual WhatsApp confirmation buttons
// ============================================================
function MasterDiary({ patients, appts, setAppts, surgeries, setSurgeries, clinicSettings, setClinicSettings, onOpenPatient }) {
  const [date, setDate] = useState(todayISO());
  const [viewMode, setViewMode] = useState("day");
  const [selectedViewDate, setSelectedViewDate] = useState(todayISO());
  const [pickPatientFor, setPickPatientFor] = useState(null);
  const [scheduleForPt, setScheduleForPt] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [reasonOptions, setReasonOptions] = useState(() => {
    try {
      const raw = localStorage.getItem(MASTER_DIARY_REASON_LS);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    } catch {}
    return REASON_OPTIONS;
  });
  const [procedureOptions, setProcedureOptions] = useState(() => {
    try {
      const raw = localStorage.getItem(MASTER_DIARY_PROCEDURE_LS);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    } catch {}
    return SURGERY_OPTIONS;
  });
  const [locationOptions, setLocationOptions] = useState(() => {
    try {
      const raw = localStorage.getItem(MASTER_DIARY_LOCATION_LS);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    } catch {}
    return SURGERY_LOCATIONS;
  });

  const reloadDiaryListsFromStorage = useCallback(() => {
    try {
      const raw = localStorage.getItem(MASTER_DIARY_REASON_LS);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed) && parsed.length > 0) setReasonOptions(parsed);
    } catch {}
    try {
      const raw = localStorage.getItem(MASTER_DIARY_PROCEDURE_LS);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed) && parsed.length > 0) setProcedureOptions(parsed);
    } catch {}
    try {
      const raw = localStorage.getItem(MASTER_DIARY_LOCATION_LS);
      const parsed = raw ? JSON.parse(raw) : null;
      if (Array.isArray(parsed) && parsed.length > 0) setLocationOptions(parsed);
    } catch {}
  }, []);

  useEffect(() => {
    const ev = () => reloadDiaryListsFromStorage();
    window.addEventListener("fms-master-diary-catalog-updated", ev);
    window.addEventListener("storage", ev);
    return () => {
      window.removeEventListener("fms-master-diary-catalog-updated", ev);
      window.removeEventListener("storage", ev);
    };
  }, [reloadDiaryListsFromStorage]);

  useEffect(() => {
    try { localStorage.setItem(MASTER_DIARY_REASON_LS, JSON.stringify(reasonOptions)); } catch {}
  }, [reasonOptions]);
  useEffect(() => {
    try { localStorage.setItem(MASTER_DIARY_PROCEDURE_LS, JSON.stringify(procedureOptions)); } catch {}
  }, [procedureOptions]);
  useEffect(() => {
    try { localStorage.setItem(MASTER_DIARY_LOCATION_LS, JSON.stringify(locationOptions)); } catch {}
  }, [locationOptions]);

  const handleAddReasonOption = () => {
    const name = window.prompt("Enter new appointment type:");
    if (!name) return -1;
    const trimmed = name.trim();
    if (!trimmed) return -1;
    const idx = reasonOptions.findIndex((r) => (r?.en || "").toLowerCase() === trimmed.toLowerCase());
    if (idx >= 0) return idx;
    const next = [...reasonOptions, { en: trimmed, ar: trimmed }];
    setReasonOptions(next);
    return next.length - 1;
  };
  const handleAddProcedureOption = () => {
    const name = window.prompt("Enter new OR procedure:");
    if (!name) return -1;
    const trimmed = name.trim();
    if (!trimmed) return -1;
    const idx = procedureOptions.findIndex((p) => (p?.en || "").toLowerCase() === trimmed.toLowerCase());
    if (idx >= 0) return idx;
    const next = [...procedureOptions, { en: trimmed, ar: trimmed }];
    setProcedureOptions(next);
    return next.length - 1;
  };
  const handleAddLocationOption = () => {
    const name = window.prompt("Enter new place/location:");
    if (!name) return "";
    const trimmed = name.trim();
    if (!trimmed) return "";
    const existing = locationOptions.find((p) => String(p).toLowerCase() === trimmed.toLowerCase());
    if (existing) return existing;
    const next = [...locationOptions, trimmed];
    setLocationOptions(next);
    return trimmed;
  };

  const slots = useMemo(() => buildSlots(clinicSettings), [clinicSettings]);
  const [monthCursor, setMonthCursor] = useState(() => (todayISO().slice(0, 7)));
  useEffect(() => {
    if (selectedViewDate && selectedViewDate !== date) setDate(selectedViewDate);
  }, [selectedViewDate]);
  const dayAppts = (appts || []).filter(a => a.date === date)
    .sort((a, b) => (a.slot || "").localeCompare(b.slot || ""));
  const daySurgeries = (surgeries || []).filter(s => s.date === date)
    .sort((a, b) => (a.time || "").localeCompare(b.time || ""));
  const monthCounts = useMemo(() => {
    const [y, m] = monthCursor.split("-").map(Number);
    const prefix = `${y}-${String(m).padStart(2, "0")}-`;
    const map = {};
    (appts || []).forEach((a) => {
      if (!a?.date || !a.date.startsWith(prefix)) return;
      const day = Number(a.date.slice(8, 10));
      if (!map[day]) map[day] = { appts: 0, ors: 0 };
      map[day].appts += 1;
    });
    (surgeries || []).forEach((s) => {
      if (!s?.date || !s.date.startsWith(prefix)) return;
      const day = Number(s.date.slice(8, 10));
      if (!map[day]) map[day] = { appts: 0, ors: 0 };
      map[day].ors += 1;
    });
    return map;
  }, [appts, surgeries, monthCursor]);
  const monthMeta = useMemo(() => {
    const [y, m] = monthCursor.split("-").map(Number);
    const first = new Date(y, m - 1, 1);
    const days = new Date(y, m, 0).getDate();
    return {
      year: y,
      month: m,
      firstWeekday: first.getDay(),
      daysInMonth: days,
      label: first.toLocaleDateString("en-GB", { month: "long", year: "numeric" }),
    };
  }, [monthCursor]);

  const findPt = (id) => patients.find(p => p.id === id);

  const removeAppt = (id) => setAppts(arr => arr.filter(a => a.id !== id));
  const updateApptStatus = (id, status) => setAppts(arr => arr.map(a => a.id === id ? { ...a, status } : a));

  const removeSurgery = (id) => {
    if (!window.confirm("Remove this surgery from the diary?\nهل تريد حذف هذه العملية من المفكرة؟")) return;
    setSurgeries(arr => arr.filter(s => s.id !== id));
  };
  const updateSurgeryStatus = (id, status) => setSurgeries(arr => arr.map(s => s.id === id ? { ...s, status } : s));

  // WhatsApp templates — bilingual; clinic vs surgery have different copy.
  const sendWhatsAppClinic = (appt, p) => {
    if (!p) return;
    const msg = `السلام عليكم ${p.nameAr || p.nameEn}،\nنذكّر حضرتك بموعدك في العيادة يوم ${fmtDateAr(appt.date)} الساعة ${appt.slot}.\nبرجاء الحضور قبل الموعد بـ 10 دقائق.\nشكراً لكم.${waFooterFromClinic(clinicSettings)}`;
    const phone = (p.mobile || "").replace(/[^\d]/g, "");
    if (!phone) return alert("No mobile number on file for this patient.\nلا يوجد رقم موبايل مسجل.");
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
  };
  const sendWhatsAppSurgery = (s, p) => {
    const proc = renderProcedure(s.procedure);
    const nameAr = (p && p.nameAr) || s.patientNameAr || s.patientNameEn || "";
    const msgAr =
      `السلام عليكم ${nameAr}،\n` +
      `نذكّر حضرتك بموعد العملية (${proc.ar}) يوم ${fmtDateAr(s.date)} الساعة ${s.time}.\n` +
      `المكان: ${s.location || "—"}.\n` +
      `برجاء الصيام قبل العملية بـ 8 ساعات.\n` +
      `للاستفسار يرجى التواصل مع العيادة.${waFooterFromClinic(clinicSettings)}`;
    const phone = ((p && p.mobile) || s.patientMobile || "").replace(/[^\d]/g, "");
    if (!phone) return alert("No mobile number on file for this patient.\nلا يوجد رقم موبايل مسجل.");
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msgAr)}`, "_blank");
  };

  const goToPatient = (id) => {
    if (id && onOpenPatient) onOpenPatient(id);
  };

  const goToday = () => setDate(todayISO());
  const shiftDay = (delta) => {
    const d = new Date(date); d.setDate(d.getDate() + delta);
    const iso = d.toISOString().slice(0, 10);
    setDate(iso);
    setSelectedViewDate(iso);
  };
  const goToPrevMonth = () => {
    const [y, m] = monthCursor.split("-").map(Number);
    const d = new Date(y, m - 2, 1);
    setMonthCursor(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
  };
  const goToNextMonth = () => {
    const [y, m] = monthCursor.split("-").map(Number);
    const d = new Date(y, m, 1);
    setMonthCursor(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
  };
  const openDayFromMonth = (dayNum) => {
    const iso = `${monthMeta.year}-${String(monthMeta.month).padStart(2, "0")}-${String(dayNum).padStart(2, "0")}`;
    setSelectedViewDate(iso);
    setDate(iso);
    setViewMode("day");
  };
  const openAppointmentForm = () => setPickPatientFor(slots[0] || clinicSettings.startTime);
  const isToday = date === todayISO();

  return (
    <div>
      <PageHeader
        eyebrow={<>Front desk · <span style={{ direction: "rtl" }}>الاستقبال</span></>}
        title={<>Master Diary · <span style={{ direction: "rtl", fontFamily: "'Fraunces', Georgia, serif" }}>المفكرة الرئيسية</span></>}
        sub={<>
          Unified daily view — clinic appointments + OR procedures together. Tap any row to jump to the patient's file.
          <br />
          <span style={{ direction: "rtl", display: "inline-block", marginTop: 4 }}>
            عرض يومي موحد للمواعيد والعمليات. اضغط على أي صف للذهاب إلى ملف المريض.
          </span>
        </>}
      />

      {/* Date picker bar — sticky at the top of the diary */}
      <div className="diary-datebar" style={styles.diaryDateBar}>
        <button style={styles.iconBtn} onClick={() => shiftDay(-1)} title="Previous day">
          <ChevronLeft size={14} strokeWidth={1.8} />
        </button>
        <input
          type="date" value={date}
          onChange={(e) => setDate(e.target.value)}
          style={{ ...styles.input, padding: "8px 12px", fontWeight: 600 }}
        />
        <button style={styles.iconBtn} onClick={() => shiftDay(1)} title="Next day">
          <ChevronRight size={14} strokeWidth={1.8} />
        </button>
        <button
          onClick={goToday}
          style={{
            ...styles.miniBtn,
            background: isToday ? T.tealDeep : T.tealSoft,
            color: isToday ? "#fff" : T.tealDeep,
            borderColor: T.teal,
            fontWeight: 700, padding: "6px 12px",
          }}
          title="Jump to today">
          Today · اليوم
        </button>
        <div style={{
          display: "inline-flex",
          alignItems: "center",
          background: T.card,
          border: `1px solid ${T.line}`,
          borderRadius: 999,
          padding: 3,
          gap: 3,
        }}>
          <button
            onClick={() => setViewMode("month")}
            style={{
              ...styles.miniBtn,
              padding: "5px 10px",
              borderRadius: 999,
              background: viewMode === "month" ? T.tealDeep : "transparent",
              color: viewMode === "month" ? "#fff" : T.inkSoft,
              borderColor: "transparent",
              fontWeight: 700,
            }}>
            Month View
          </button>
          <button
            onClick={() => setViewMode("day")}
            style={{
              ...styles.miniBtn,
              padding: "5px 10px",
              borderRadius: 999,
              background: viewMode === "day" ? T.tealDeep : "transparent",
              color: viewMode === "day" ? "#fff" : T.inkSoft,
              borderColor: "transparent",
              fontWeight: 700,
            }}>
            Day View
          </button>
        </div>
        <button
          onClick={openAppointmentForm}
          style={{ ...styles.miniBtn, background: T.tealDeep, color: "#fff", borderColor: T.tealDeep, fontWeight: 700 }}
          title="Add appointment quickly">
          <Plus size={11} strokeWidth={2.2} /> Add Appointment
        </button>
        <button
          onClick={() => setScheduleForPt({ pseudoOpen: true })}
          style={{ ...styles.miniBtn, background: T.rose, color: "#fff", borderColor: T.rose, fontWeight: 700 }}
          title="Schedule OR quickly">
          <Plus size={11} strokeWidth={2.2} /> Schedule OR
        </button>
        <div style={styles.diaryDateLabel}>
          <div style={{ fontFamily: "'Fraunces', Georgia, serif", fontSize: 15, fontWeight: 600 }}>
            {fmtDate(date)}
          </div>
          <div style={{ direction: "rtl", fontSize: 11.5, color: T.inkSoft }}>
            {fmtDateAr(date)}
          </div>
        </div>
        <div style={styles.diaryCounts}>
          <span style={{ ...styles.diaryCountChip, background: T.ochreSoft, color: T.ochre }}>
            <Calendar size={11} strokeWidth={2} /> Clinic · {dayAppts.length}
          </span>
          <span style={{ ...styles.diaryCountChip, background: T.roseSoft, color: T.rose }}>
            <Syringe size={11} strokeWidth={2} /> OR · {daySurgeries.length}
          </span>
        </div>
      </div>

      {viewMode === "month" && (
        <Card
          title={
            <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
              <Calendar size={15} strokeWidth={1.6} />
              {monthMeta.label}
            </span>
          }
          accent={T.teal}
          right={
            <div style={{ display: "flex", gap: 8 }}>
              <button style={styles.miniIconBtn} onClick={goToPrevMonth} title="Previous month">
                <ChevronLeft size={12} strokeWidth={2} />
              </button>
              <button style={styles.miniIconBtn} onClick={goToNextMonth} title="Next month">
                <ChevronRight size={12} strokeWidth={2} />
              </button>
            </div>
          }>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, minmax(0,1fr))", gap: 8, marginBottom: 8 }}>
            {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((d) => (
              <div key={d} style={{ textAlign: "center", fontSize: 11, color: T.inkSoft, fontWeight: 700 }}>{d}</div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, minmax(0,1fr))", gap: 8 }}>
            {Array.from({ length: monthMeta.firstWeekday }).map((_, i) => (
              <div key={`spacer-${i}`} style={{ minHeight: 96, borderRadius: 12, border: `1px dashed ${T.lineSoft}`, background: hexAlpha(T.paperWarm, 0.4) }} />
            ))}
            {Array.from({ length: monthMeta.daysInMonth }).map((_, i) => {
              const day = i + 1;
              const iso = `${monthMeta.year}-${String(monthMeta.month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
              const counts = monthCounts[day] || { appts: 0, ors: 0 };
              const selectedDay = selectedViewDate === iso;
              return (
                <button
                  key={iso}
                  onClick={() => openDayFromMonth(day)}
                  style={{
                    minHeight: 96,
                    borderRadius: 12,
                    border: `1px solid ${selectedDay ? T.teal : T.lineSoft}`,
                    background: selectedDay ? hexAlpha(T.tealSoft, 0.45) : T.card,
                    textAlign: "left",
                    padding: 8,
                    display: "flex",
                    flexDirection: "column",
                    gap: 6,
                    cursor: "pointer",
                  }}>
                  <div style={{ fontWeight: 800, fontSize: 13, color: selectedDay ? T.tealDeep : T.ink }}>{day}</div>
                  {counts.appts > 0 && (
                    <span style={{
                      display: "inline-flex", alignItems: "center",
                      width: "fit-content",
                      padding: "3px 8px", borderRadius: 999,
                      background: hexAlpha("#3B82F6", 0.14),
                      color: "#1E40AF", border: `1px solid ${hexAlpha("#3B82F6", 0.35)}`,
                      fontSize: 10.5, fontWeight: 700,
                    }}>
                      {counts.appts} Appt{counts.appts === 1 ? "" : "s"}
                    </span>
                  )}
                  {counts.ors > 0 && (
                    <span style={{
                      display: "inline-flex", alignItems: "center",
                      width: "fit-content",
                      padding: "3px 8px", borderRadius: 999,
                      background: T.roseSoft,
                      color: T.rose, border: `1px solid ${hexAlpha(T.rose, 0.35)}`,
                      fontSize: 10.5, fontWeight: 700,
                    }}>
                      {counts.ors} OR
                    </span>
                  )}
                </button>
              );
            })}
          </div>
        </Card>
      )}

      {viewMode === "day" && (
        <div style={{ position: "relative", marginTop: 2 }}>
          <div style={{
            position: "absolute", left: 16, top: 12, bottom: 12, width: 2,
            background: `linear-gradient(180deg, ${hexAlpha(T.teal, 0.3)} 0%, ${hexAlpha(T.rose, 0.3)} 100%)`,
            borderRadius: 999,
          }} />
          <div style={{ display: "grid", gap: 14, paddingLeft: 18 }}>
            <div style={{ position: "relative" }}>
              <div style={{
                position: "absolute", left: -10, top: 18, width: 10, height: 10,
                borderRadius: 999, background: T.tealDeep, border: `2px solid ${T.card}`,
                boxShadow: `0 0 0 2px ${hexAlpha(T.teal, 0.35)}`,
              }} />
      {/* SECTION A — Clinic appointments */}
      <Card
        title={<>Clinic appointments · <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft }}>مواعيد العيادة</span></>}
        icon={<Calendar size={15} strokeWidth={1.6} />}
        accent={T.ochre}
        right={
          <span style={{ ...styles.countPill, background: T.ochreSoft, color: T.ochre }}>
            {dayAppts.length}
          </span>
        }>
        <ClinicSettingsBar
          settings={clinicSettings}
          setSettings={setClinicSettings}
          open={settingsOpen}
          onToggle={() => setSettingsOpen(o => !o)}
        />

        {/* Slot grid view (preserved from Scheduling) so the secretary
            can still book any open slot. */}
        {slots.length === 0 ? (
          <EmptyHint>
            Clinic end time must be after start time. Please check your clinic hours above.
            <br />
            <span style={{ direction: "rtl" }}>وقت إنهاء العيادة يجب أن يكون بعد وقت البدء.</span>
          </EmptyHint>
        ) : (
          <div style={styles.slotGrid}>
            {slots.map((slot) => {
              const a = dayAppts.find(x => x.slot === slot);
              const p = a ? findPt(a.patientId) : null;
              const reason = a ? renderReason(a.reason) : null;

              if (!a) {
                return (
                  <div key={slot} style={styles.slot}>
                    <div style={styles.slotTime}>
                      <Clock size={11} strokeWidth={1.8} /> {slot}
                    </div>
                    <button style={styles.slotEmpty} onClick={() => setPickPatientFor(slot)}>
                      <Plus size={12} strokeWidth={1.8} /> Book · <span style={{ direction: "rtl" }}>حجز</span>
                    </button>
                  </div>
                );
              }

              return (

const splitMedLine = (line) => {
  const s = String(line || "");
  for (const sep of [" — ", " – ", " - "]) {
    const i = s.indexOf(sep);
    if (i > 0) return { name: s.slice(0, i).trim(), dosage: s.slice(i + sep.length).trim() };
  }
  return { name: s.trim(), dosage: "" };
};
const joinMedLine = (row) => {
  const d = (row.dosage || "").trim();
  const n = (row.name || "").trim();
  return d ? `${n} — ${d}` : n;
};
const medEditorRowFromStorage = (m) => {
  if (typeof m === "string") return splitMedLine(m);
  if (m && typeof m === "object") return { name: String(m.name || "").trim(), dosage: String(m.dosage || m.sig || "").trim() };
  return { name: "", dosage: "" };
};
const normDiaryBi = (row) => {
  if (typeof row === "string") return { en: row.trim(), ar: row.trim(), defaultDurationMin: "" };
  const en = String(row.en || "").trim();
  const ar = String(row.ar || row.en || "").trim();
  const d = row.defaultDurationMin;
  const dm = d === "" || d == null ? "" : Math.max(5, Math.min(720, parseInt(d, 10) || ""));
  return { en, ar, defaultDurationMin: dm === "" ? "" : dm };
};
const serializeDiaryBi = (r) => {
  const base = { en: String(r.en || "").trim(), ar: String(r.ar || r.en || "").trim() };
  const dm = parseInt(r.defaultDurationMin, 10);
  if (Number.isFinite(dm) && dm >= 5) return { ...base, defaultDurationMin: dm };
  return base;
};

    try {
      const raw = localStorage.getItem(RX_MEDS_KEY);

      if (Array.isArray(arr) && arr.length) return arr.map(medEditorRowFromStorage);

    return DEFAULT_RX_MEDS.map((m) => medEditorRowFromStorage(m));
  });
  const [bundles, setBundles] = useState(() => {

      const raw = localStorage.getItem(RX_BUNDLES_KEY);

        return arr.map((b) => ({ name: String(b.name || ""), meds: Array.isArray(b.meds) ? b.meds.map(String) : [] }));
      }
    } catch {}
    return DEFAULT_RX_BUNDLES.map((b) => ({ name: b.name, meds: [...b.meds] }));
  });
  const [ixBundles, setIxBundles] = useState(() => {
    try {
      const raw = localStorage.getItem(IX_BUNDLES_KEY);
      const arr = raw ? JSON.parse(raw) : null;

        return arr.map((b) => ({ name: String(b.name || ""), labs: Array.isArray(b.labs) ? b.labs.map(String) : [] }));

    return DEFAULT_IX_BUNDLES.map((b) => ({ name: b.name, labs: [...b.labs] }));

function Intake({ patients, setPatients, appts, setAppts, clinicSettings, appSettings }) {
  // The intake screen now drives the bilingual couple table directly.
  // We hold a "draft" couple object until the user clicks Register.
  const emptyDraft = { wife: {}, husband: {}, customValues: {} };
  const [draft, setDraft] = useState(emptyDraft);
  const [reason, setReason] = useState("");
  const [mobile, setMobile] = useState("");
  const [search, setSearch] = useState("");
  const slots = useMemo(() => buildSlots(clinicSettings), [clinicSettings]);

  // Preview the next ID that will be assigned, so the user sees it before clicking Register
  const nextId = useMemo(() => generatePatientId(patients), [patients]);

  const nextFreeSlot = (existing) => {
    const taken = new Set(existing.filter(a => a.date === todayISO()).map(a => a.slot));
    return slots.find(s => !taken.has(s)) || (slots[0] || clinicSettings.startTime);
  };

  const wifeName = (draft.wife && (draft.wife.nameEn || draft.wife.nameAr)) || "";

  const addPatient = (alsoCheckIn = false) => {
    const wife = draft.wife || {};
    const husband = draft.husband || {};
    if (!wife.nameEn && !wife.nameAr) {
      return alert("Please enter the wife's name (English or Arabic).\nمن فضلك أدخل اسم الزوجة.");
    }
    const newId = generatePatientId(patients);
    // Patient header info is derived from the wife (the clinical patient)
    const p = {
      id: uid(),
      patientId: newId,
      nameEn: wife.nameEn || "",
      nameAr: wife.nameAr || "",
      mobile, dob: wife.dob || "", bloodGroup: "",
      gpa: { g: 0, p: 0, a: 0 }, chronic: [], meds: [], flags: {},
      couple: {
        wife: { ...wife },
        husband: { ...husband },
        customValues: draft.customValues || {},
        _transliterationMemo: draft._transliterationMemo || {},
      },
      media: [],
      episodes: [makeGynaeTrunk()],
    };
    setPatients((arr) => [p, ...arr]);
    if (alsoCheckIn) {
      setAppts((arr) => [
        ...arr,
        { id: uid(), patientId: p.id, date: todayISO(), slot: nextFreeSlot(arr), duration: clinicSettings.slotDuration, reason: reason || "Walk-in", status: "checked-in" },
      ]);
    }
    setDraft(emptyDraft);
    setReason("");
    setMobile("");
  };

  const filtered = patients.filter(p => {
    const q = search.trim().toLowerCase();
    if (!q) return true;
    return (p.nameEn || "").toLowerCase().includes(q) ||
           (p.nameAr || "").includes(q) ||
           (p.mobile || "").includes(q) ||
           (p.patientId || "").toLowerCase().includes(q);
  });

  return (
    <div>
      <PageHeader eyebrow={<>Front desk · <span style={{ direction: "rtl" }}>الاستقبال</span></>}
        title={<>Patient Intake · <span style={{ direction: "rtl", fontFamily: "'Fraunces', Georgia, serif" }}>استقبال المرضى</span></>}
        sub={<>Register a couple. Names auto-transliterate between Arabic and English. Patient IDs auto-generate as SK-YYYY-NNN. <br />
        <span style={{ direction: "rtl", display: "inline-block", marginTop: 4 }}>تسجيل الزوجين. الأسماء تُنقَل تلقائياً بين العربية والإنجليزية.</span></>} />

      {/* Primary view: the bilingual couple table */}
      <Card sectionId="intake.couple"
        title={<>Couple intake · <span style={{ direction: "rtl", fontSize: 13, fontWeight: 500, color: T.inkSoft }}>بيانات الزوجين</span></>}
        icon={<Users size={15} strokeWidth={1.6} />} accent={T.rose}
        right={
          <span style={{
            padding: "4px 10px", borderRadius: 999,
            background: T.tealSoft, color: T.tealDeep,
            fontSize: 11.5, fontWeight: 700, letterSpacing: 0.5,
            fontFamily: "monospace",
          }}>
            Next ID · {nextId}
          </span>
        }>
        <CoupleIntakeTable
          appSettings={appSettings}
          draft={draft}
          setDraft={setDraft}
